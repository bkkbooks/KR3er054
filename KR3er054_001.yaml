body:
  text: 卷之一醫論命門水火圖說愚按造化之機水火而已人身之要氣血而已氣血之本元氣而已在陽為天為日為火為熱為氣為神在陰為地為月為水為寒為血為精陽以陰為體陰以陽為用無陽則陰無以生無陰則陽無以化陰陽相生水火交濟天人一理此本然也周子所謂太極指神而言神無所不統該變化故為太極而陰陽水火皆寓其中乃合而未分一氣之所渾成者而人身具有太極命門是也命門為精神之舍居下丹田關元氣海之際水火宅焉故精為水而屬陰司於左腎神為火而屬陽司於右腎右腎為元陽之根左腎為真陰之主則皆統歸於命門者也內經雖未明指命門而已隱揚其義矣奈何難經誤以命門偏系右腎致後明哲輩出歷詆其非再考黃庭經有云上有黃庭下關元後有幽闕前命門是深得水火皈宿之地近世李瀕湖著命門考張景岳作命門辨累累千言反覆辨釋皆備闡內經未闡之旨從此而探造化之蘊窮萬病之機便得悟從心解何待筆舌之罄也此理前賢亦疊有言第未顯敷其說故學者習而弗察蓋有形易見無形難識固無怪其然也籲使能知地下有雷聲方悟得春光彌宇宙因著圖說五氣圖說衛氣者升由元氣為皮毛腠理之司而護衛於身體之外主包羅一身者也衛氣不固則病汗泄汗即氣也畏冒風寒衛氣不能外御也暴病久病而汗大泄或泄不至足者主亡陽此乃元氣外脫命盡無期又有盜汗雖屬陰虛亦為陽不御陰所致故六黃湯君以黃耆義可見矣其有形寒飲冷傷肺哮喘咳逆皆衛氣之疏也宗氣者亦升由元氣居膻中與衛氣皆主於肺乃一身上下內外諸氣之宗其左乳下動應衣者為宗氣泄此陰虛之病氣不歸原也營氣者亦升由元氣主於脾脾為氣血之本故營氣者營運血氣而宣灌於經絡臟腑肌肉俞穴關節筋骸之內者也胃氣者亦升由元氣主中焦為中氣氣即胃氣胃氣充則勞不解㑊飲食多食而不傷過時而不飢輸納運化無失常度故特借外之穀氣以滋養元氣元氣既受滋養諸藏真氣皆無不足六脈便見不大不小不浮不沉不徐不疾無太過不及之診和緩有神是有胃氣非惟關於脈實為元氣之徵也設使元氣既虛胃氣安能自盛元氣者其體地天交於地地中有天陽主於陰陰中生陽為胃氣營氣宗氣衛氣之根動則充塞於三焦靜則仍藏於命門命門為三焦之本三焦為命門之標門以命稱在父母生我為生命之本而我生男女為立命之原故人從胞胎中雖稟於精血便有此點真陽蘊蓄其間必在父母先天精血堅厚生我則元氣充實便見胃氣強盛營氣灌濡宗氣升健衛氣固密內而脈氣外而形氣無一非實也真陽真陰交濟於中生化不窮神氣且昌雖有六氣不能侵害過勞過飢亦可耐受若我後天勤加修攝不妄作勞非惟身心康泰足臻上壽而誕育後胤亦無傾危夭扎之患如先天元氣本虛童孩之時每多羸疾及長精血不榮少年如同老態飲食少進腥葷饜飫胃氣餒矣肢體虛瘦精彩匪揚營氣衰矣頭傾視深稍勞汗泄少動喘生虛脹填膺宗氣陷矣未寒思溫未熱圖涼六氣頻仍患即留連錯投寒劑生死反掌衛氣疏矣多愁少喜健忘驚忡心氣消矣陽痿精薄筋柔骨脆肝腎之氣憊矣少有不慎大命殉之倘知堅持修謹佐以善劑亦可支持偷生歲月幸致下壽縱由天命亦兼人事耳今之醫者不管元氣虛實並察諸氣衰旺只循病氣重輕而特見病治病如是熱者固宜投以寒劑而假熱之治法窮矣寒者固宜投以熱劑而假寒之見理昧矣同一熱也而脈之屬陰屬陽為異同一寒也而脈之有力無力不同病之寒熱由乎脈脈之虛實由乎氣氣之盛衰由先天之元氣陰陽水火皆統御於元氣而元氣為陰陽水火之根則寒熱之所從生也而寒熱又為百病之根百病之蜂起叵測即寒熱之變幻無窮耳惟能察寒熱之真假便識元氣之虛實顧何慮治道之不精詳乎倘元氣不一加察雖根深者固錯治無妨至中虧者而妄攻何忍乎明醫王應震曰見痰休治痰見血休治血無汗不發汗有熱莫攻熱喘生休耗氣精遺不澀泄明得箇中趣方是醫中傑行醫不識氣治法從何據堪笑道中人未到知音處此真知本達原之言也學者省之論膀胱者州都之官津液藏焉氣化則能出矣餘二十年來讀經至此始悟造化之蘊至矣微矣益見內經千言萬語翻來覆去橫說直說都是為此一二字上靈通變化何等奧渺又何等明白夫既曰膀胱為津液之府意必積滿當自出何須借氣始能化因化而方出乎至上文三焦者決瀆之官水道出焉奈何獨不需氣乎彼此印證細究其義夫三焦既主相火水道之出無非稟氣以為決也不曰能出而曰出焉蓋氣本自化不待化於氣而始能出也今津液主水膀胱司水水不自化而化於氣此陰以陽為用未免少費工夫故不曰出焉而曰則能出矣語意之決又包許多妙用今夫津液固全資氣化設使氣一凝滯不運則膀胱雖滿積而不能出矣氣一虛陷無制則膀胱不待積滿淋瀝頻數隨泌而隨出矣又氣一浮越不守則膀胱絕陽無氣可化津液隨脫便不知而自出矣嗟夫一氣耳無處不到無息不運無物不司何獨膀胱明言氣化方知是氣化三焦主氣不明言氣化亦知是氣化若大腸傳導而出變化小腸受盛而出化物何莫非氣化也至乎心為君主之官肺為相傅之官肝為將軍之官膽為中正之官膻中為臣使之官脾胃為倉稟之官腎為作強之官使非氣化何以能神明出焉治節出焉謀慮出焉決斷出焉喜樂出焉五味出焉伎巧出焉思至此則人一身皆氣化也萬物皆氣化也六合以內以外亦無非氣化也學者試潛心詳玩悟到化景政如釋氏所云得㘞然一聲便立證菩提矣論補脾補腎愚按李東垣謂補腎不如補脾許學士謂補脾不如補腎二賢著論各有深意而世之醫者不分腎之有兩議之各殊則曰二者皆是也豈知東垣之說蓋謂腎藥膏膩雖優於腎特妨於脾不如健補中氣以資生化飲食既充精血自旺由是脾獲補而俾腎受益此言腎者乃左腎也至叔微之說乃謂脾氣虛弱不能轉輸脾氣虛寒不能生長良因母氣不充子脾失資而世醫僅扶中氣藐不見效以故立法補母特創四神二神之屬溫命門之火滋生戊己尋源究本迥絕常法此言腎者乃右腎也故腎有兩而治各不同夫東垣補脾之法固誠善然特為腎未傷而獨脾弱者論也設使精血衰耗陰虛發熱恐非壯水無以救燎原非補腎無以固根荄而亦可以迂緩之劑借稱王道優遊望效獨支中氣已乎雖然虛癆損腎即脾氣亦為之虧矣法不能捨脾而專治腎者故苦寒黃柏知母之屬甘寒二冬玄參之屬益見非陰虛所宜而適以戕陰而已六味丸雖曰補腎其所用山藥茯苓石棗乃兼益脾之品熟地固云膏膩而假以蒸曬火力尤於胃氣無犯未有先犯胃氣更能為之運布藥力以施於四藏者是六味丸補兼脾腎不待智者而知之矣其右腎真陽不足而為神昏氣怯動作喘乏或畏寒禁冷陽事不舉或脾胃虛寒飲食少進或嘔惡痞脹臍腹沉痛或大便不實吐利頻作歷歷固屬脾病實因母虛所致俱宜益火之源而培右腎之真陽法無逾此也竊意靈樞素難字字皆陰陽奧義語語悉水火玄機千載而下能通其說而會其真者在晉有王太僕在唐有許叔微在明有薛立齋張景岳寥寥數子悟道獨真闡命門之蘊窮水火之辨立論敷治大越諸賢其他前輩雖能窮談陰陽水火之理及著之施行渺無定識率多附會依違矯強立言況自劉守真主火之說行而假熱者受害朱丹溪以苦寒為補陰而腎虛者喪命然東垣老人垂十六字之訓謂實火可瀉芩連之屬虛火可補參耆之屬釐晰虛實葆和脾胃不至混劑誤世差強二子一著而獨未見敷揚陰陽水火之義洵缺陷事至傷寒辨惑猶為有功於世也張景岳有云使劉朱之言不息則軒岐之澤不彰是誠斯道之丈魔生民之厄運也奈何斯世昧識圓機偏主劉朱爭相宗尚戕伐生命枉害無辜長夢莫醒此景岳所以力辟邪說宣明正教而獨毅然不能已於好辨也余因而有感焉治血貴靜甚哉陰陽之理微而陰陽之治難也陰陽之病則變亂閃爍而莫可捉摸者也今以失血言之血主陰氣主陽陽之性動陰之體靜陽之氣熱陰之性寒而陰陽則相維為既濟之水火也故氣行則血亦行氣止則血亦止氣盛則血亦盛氣衰則血亦衰氣熱則血燥氣寒則血凝氣盛而逆則血因從上見血虛而陷則氣亦隨下脫其為治也逆於上者降之陷於下者升之初病陰陽錯亂者平之寒熱不調者和之嗣究其原應寒則寒應熱則熱應補則補應瀉則瀉法難定執治隨人施耳夫血既外溢則陽動之太過也治專主寒則陰制之有餘也益氣固云救血未免動而復動了無歸息之日瀉陰雖曰抑陽乃至靜而益靜殊絕生髮之機均非有得乎治血之窾而亦未識其所以為靜之體矣雖然血固種種不一總當循元氣脈氣形氣病氣而精辨之也獨怪河澗作俑謬稱諸血無寒致今庸流混治殺人遺菑不小殊可悲恨豈知寒劑治血惟上古形病俱實者宜之犀角地黃湯乃專治胃經積熱實證只可暫用中病便止而非療血之綱劑也四物湯雖為血藥用芎歸則通血之壅滯也白芍則收血之耗散也生地則制火動之陽光也而非益陰之品且芍性酸寒尚伐生氣亦惟血凝滯及耗散者用之相應設使陽焰正熾而辛竄之芌歸不益助其上炎之火性乎失血甫定尚留停瘀最忌固斂若生地芩連雖賦性沉寒固可撲未滅之餘焰獨不思脾虛而血不統血脫而脾愈虛敢用此而輕瀉脾陽乎脾本虛而復虛則陰不受攝而血愈脫矣察唯諸氣俱實得有犀角四物本症始可用耳又有陽焰未熄而遽投補氣之劑是反以動乎陰尤非福也亦須察果元氣頓虛色脈兩虧而補中歸脾四君十全之屬是所必需甚至虛寒與氣俱脫參附八味忍緩投乎此則一偏於涼瀉一偏於溫補乃為通變之機權而非正治之活法也惟必明乎為靜之體與夫失靜之由庶可語乎治靜之之方矣血主乎陰以靜為體陰中蘊陽靜處寓動蓋此靜非沉寂之靜乃生化之靜今立一方不專以寒者恐愈痼真陰也又不驟以溫者恐益助邪陽也議以不濡不燥中和恬靜之品非惟天一可復且令水火兩平得葆其靜之體而益完其靜之神者也治本常法藥非奇草推求仲景之腎氣允為療血之佳珍設曰熟地膏潤不宜遽補豈知血脫陰虧內傷非補何以填陰丹皮甘香生新消瘀之良藥也且制燎原然真陰既耗元陽少附脾失資生土氣餒矣必用山藥茯苓平扶胃氣而非歸術溫補之比也澤瀉引虛熱以下行石棗固藏血之本經加炙草則平五火益黑梔以斂二絡術無逾此試亦屢效倘逢肺胃鬱熱方增麥芩而減山萸若療肝腎實焰不辭連柏而佐芍藥即君主凡火之動苦寒必需倘命宮真陽將謝溫熱恐後久餌平劑不愈必加益氣之參朮錯投降火增劇莫緩升陽之蒡耆第病情變幻而成方難守當熟察元氣之虛實色脈之吉凶與夫病氣之重輕陽中陰易扶陰中陰難療陰屬經易治陽屬藏亦危及至用藥溫涼補瀉新久順逆隨宜輒應庶瞭然無疑於胸中方可逃枉治之重愆此特鄙人蠡見宜詳立齋全案廣嗣方論愚意艱子之家非婦人陰血乖羸則男子精氣衰憊在婦人久媾不孕便當廣置妾媵擇其氣血充盛者代舉至男子則須調適心身久餌善劑直待功深行滿亦可什一期許若論男子不是左腎血燥精枯便由右腎氣寒神餒夫曰血燥則陽盛不能滋陰曰精枯則水竭不能制陽也曰氣寒則陰凝不能溫精曰神餒則力疲不能直射子宮也生來根本之虧故致華實之稀肯施下手工夫全在此處作用滋左腎當潤以純甘壯水之劑扶右腎宜暖以甘溫益火之品總要六味為主莫失化源之資存熟地石棗懷山茯苓通益兩腎之精氣去散血丹皮利水澤瀉直補一元之神機在左尚佐以人參當歸龜膠杜仲枸杞之屬在右亦侑以人參當歸鹿膠巴戟熟附之屬蓋左腎陰虛而非人參長陽不能生陰也右腎陽衰而非熟附化陰不能益陽也倘陰精浮渙而不沉堅則又益以沙苑蒺藜菟絲之屬抑陽氣沉陷而不升發則莫外乎箭梗黃耆白朮之品龍火焱動黃柏知母斷不敢需神光寂靜蛇床葫巴豈其所宜一味之炙甘草能除假熱半匕之宜州桂最起沉寒精薄每見陷遺五味當先氣消不能握固骨脂勿後若其神形兩衰精氣俱微此固不必分以屬左屬右為陰為陽而人胞之峻補真元肭臍之急療虛竭不能緩也雖然人胞固為以人補人精得其精即龔雲林亦云草木無情惟血氣之屬可以補人若人乳人胞阿膠鹿膠之類是也二論誠不誣豈知用一人胞便損一孩命艱子之夫宜存陰隲不如代以鹿茸鹿髓則尤滋益無比鹿壽千齡氣通督脈茸髓最珍可廣瓜瓞世人罕識也此余方論抒自生平積想而非膠柱古方然特大法耳當詳診脈證再為加減則全善也至若婦人雖專主血亦有氣虛不能攝精氣寒不能溫精氣壅不能通精者與男子治法不甚懸殊推求脈症庶無混投論諸痿內經論五臟之痿諄諄以肺熱為主而治痿則獨取陽明陽明與太陰相表裡為五臟六腑之海主潤宗筋束骨而利機關合沖帶督三脈而又為陰陽之總會故人身有真陽升降運行強健不息精神氣血性情魂魄無委靡不振之患鹹得其闔闢動靜之常者也夫痿者痿弱不勁舉動不力也蓋金不能生水致腎失作強之用痿斯見矣肺主皮毛心主血脈脾主肌肉肝主筋膜腎主骨髓肺為諸臟之長為心之蓋痿則內葉焦而皮毛不榮金為火燥水難衛母熱氣留著必及於筋脈骨肉則病生痿疒躄也心痿脈上逆而下虛樞析挈脛縱不任地為脈痿肝痿則膽泄口苦筋膜乾而攣急為筋痿脾痿則胃干而渴肌肉不仁為肉痿腎痿則腰脊不舉骨枯髓減為骨痿此經之言諸痿也仲景金匱有謂肺痿者以熱在上焦因咳而為痿得之或從汗出或從嘔吐或從消渴小便利數或從便難或被快藥下利重亡津液故寸口脈數而虛口中反有濁唾涎沫原其意從內經痿條推廣在臟氣虛不得布榮衛行津液反冤郁為熱蘊結涎沫濁唾而後咳故附方或用炙甘草湯或用生薑人參大棗湯所治大意似之矣又謂肺痿吐涎沫而不咳其人不渴必遺尿水便數亦以上虛不能制下故也此為肺冷咳多涎唾甘草生薑湯以溫之若服湯已渴屬消渴則此所治便與前條上焦熱者不同矣上焦熱則冤鬱而肺之玄府燥澀氣不利則咳津不布則渴此云肺中冷者非形寒飲冷之邪在其中由上焦無陽故曰冷陽氣不足則不成熱不熱則不咳亦不渴唯氣虛而不能約制其水道之行也肺與腎連肺虛則腎亦虛故水入咽直達於腎腎亦不能以水精四布於五臟而徑出於溺矣此仲景之為肺冷咳也大都肺焦而迫於熱良由腎水衰不能制火此為真藏之患當與諸藏熱痿從壯水之劑而治其右腎火衰致巳土失資而肺金寡衛冒觸外邪不渴而咳唾涎沫背成龜胸者特以下虛而不能奉上也雖曰不熱不咳此為因寒致逆不得以熱論治宜益火之源或巳土自虛不能生子皮毛日瘁或咳或唾從中虧論至仲景所云冷痿者則宜升舉其陽而溫存之若形寒飲冷而痿者則須溫散其寒資養化源劉河澗亦論氣血者人之神若氣血或鬱結或衰虛不能宣通則神無所用而不遂其機故劣弱也當隨其虛實補瀉之使氣血宣行則神自清利而應機能為用矣東垣有謂暑月痿厥者乃獨舉四肢痿軟熱厥及衝脈氣逆而論治以清燥去濕熱之藥或生脈飲合四苓散加黃柏知母不知此乃濕熱成痿不足中有餘之病也故宜滲泄若夫精血枯涸筋脈衰弛肌肉日削而成痿此不足中之復不足也全須峻補之劑法大異耳察諸書又以痿痹不仁每每混同立論此為因內經脾痿中肌肉不仁安得執以合痿痹為一病蓋痛則為痹不痛則為痿痹實痿虛痹為風寒濕所成氣滯不行而痿則血少氣虛此甚懸絕亦有誤作風治濕治者病之似同而實異者以此經又嘗舉其端所謂腎風而不能食善驚驚已心氣痿者死又太陰司天濕氣下臨腎氣上從陰痿氣太衰而不起此從所司之內症而論也若仲景更明肺藏所生氣之虛實者又如此則肝脾二臟雖無明文觀此亦可例舉矣愚以為內經諸痿則真痿症也仲景從而推明之又有謂為冷痿者東垣有謂濕熱痿者又有從火衰而致者土虛而得者飲冷而得者此非真痿乃如痿也如痿真痿不可不詳辨也胃氣當察愚按內經千言萬語諄諄教人以胃氣為本有胃氣曰生無胃氣曰死胃氣少曰病又曰脾胃為氣血之本東垣云胃中元氣勝則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾虛而邪氣盛也又有善食而瘦者胃中伏火邪於氣分則能食脾虛則肌削即食㑊也叔和云多食亦飢者虛立齋先生曰人以脾胃為本納五穀化精液其清者入營濁者入胃陰陽得此謂之槖籥故陽則發於四肢陰則行於五臟土旺於四時善載乎萬物人得土以養百骸身失土以枯四肢又云愚按大病後谷消水去精散衛亡多致便利枯竭宜當補中益氣為要蓋脾為中州澆灌四傍與胃行其津液者也況大腸主津小腸主液亦皆稟氣於胃胃氣一充津液自行矣愚竊以為胃氣者元氣之用也元氣者胃氣之主也然必藉穀氣以資養元氣元氣既盛胃氣自充故氣義有二曰先天氣曰後天氣先天者真一之氣氣化於虛因虛化形此氣從虛無中來後天者血氣之氣氣化於谷因形化氣此氣從調攝中來然而運化調攝政所以葆全其虛無之本胃氣其可不重乎辨利痢脈病之殊愚按仲景傷寒論有三陰自利證有協熱下利症自利為陰寒宜溫以辛熱下利為傳經三陰熱糜之證宜從清解自利脈微小緩弱相合之脈也下利則脈沉而有力或洪實和緩乃邪熱入里之症也至所謂痢者內經謂之腸澼金匱謂之滯下迥與傷寒病機不同也此從濕熱所致為腸胃實積之病多見於溽暑熏蒸之候故治法從苦寒滌盪攻積破瘀既屬陽病則脈宜從陽診余每療此病多有洪大滑數或沉實者治卻易愈而脈見沉小遲弱及浮大無力者殊為乖候大費心力極意溫補始得漸瘥奈何高陽生之脈訣乃謂下痢微小卻為生脈大浮洪無瘥日此非積熱實病乎既為積熱實病乃陽病也陽病而得微小陰脈而投以苦寒果可得全生乎不通害理莫此為甚雖然痢固為積熱實病矣而胃氣未傷六脈有神飲食如常無別蒹證七日經盡厥疾自瘳設若元氣胃氣兩虛病氣獨熾尤須察氣施治必先扶元為主或少佐以清熱之品可期後效甚有虛痢而脈病俱虧此經所謂五虛者是勢屬危困令人束手敢曰積熱為患尚須清滌乎故立齋有云夫人以胃氣為主未有脾胃實而能患瘧痢者若專主發表攻裡降火導痰是治其末而忘其本也以上蓋救正高陽生解脈之誤也大都傷寒雜病須覘元氣虛實至若錯認病機愈支離枉謬耳治病求本愚按玉機微義曰經云治病必求其本本於四時五臟之根也故潔古張先生云五臟子母鬼邪微正若不達其旨意不易得而入焉徐用誠先生云凡心臟得病必先調其肝腎二臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏此心病先求於肝清其源也五臟受病必傳其所勝水能勝火則腎之受邪必傳於心故先治其腎逐其邪也故有退腎邪益肝氣兩方或診其脈肝腎兩臟俱和而心自主疾然後察其心家虛實治之張景岳先生曰本者原也始也世未有無源之流無根之木澄其源而流自清灌其根而枝乃茂無非求本之道今姑舉其略曰死以生為本欲救其死勿傷其生邪以正為本欲攻其邪必顧其正陰以陽為本陽存則生陽盡則死靜以動為本有動則活無動則止血以氣為本氣來則行氣去則凝證以脈為本脈吉則吉脈凶則凶先者後之本從此來者須從此去急者緩之本孰急可憂孰緩無慮內者外之本內實者何傷中敗者堪畏下者上之本滋苗者先固其根伐下者必枯其上虛者實之本有餘者拔之何難不足者攻之何忍真者假之本淺陋者只循像跡精妙者洞別玄微至若醫家之本在學力學力不到安能格物致知而尤忌者不畏難而自足病家之本在知醫遇士無禮不可以得賢而尤忌者好雜用而自專凡此者雖未足以盡求本之妙而一隅三反從可類推總之求本之道無他也求勿傷其生而已矣蘇子瞻曰夫國之長短如人之壽夭人之壽夭在元氣國之長短在風俗世有尫羸而壽考亦有壯盛而暴亡若元氣猶存則尫羸而無害及其已耗則壯盛而愈危是以善養生者慎起居節飲食導引關節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害者則五臟和平而壽命長不善養生者薄節慎之功遲吐納之效厭上藥而用下品伐真氣而用強陽根本已危僵仆無日天下之勢與此無異此坡公借醫喻國其理一也籲萬事有本何獨治病求本有道何專藥石故黃帝曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也則又曰治病必求其本愚以為元氣者生身之本也病氣者元氣之賊也治法者御賊之兵也藥之良毒者攻守之資也醫之賢庸者智愚之將也攻必元氣病氣兩實始可用毒劑守則為元氣既虛病氣獨實雖有可攻之勢必先主守之方以待敵愾之衰益壯我壘之堅而藥之良者所不敢後即攻亦無多費力也若其元氣潛消根本已搖攻無可攻守莫能守薄節養為迂緩藐導引非善基反事搏鷙之雄妄異旦夕之效即縱形盛何識中虧其不致僨轍者少矣再考啟玄子釋注求屬之論有云益火之源以消陰翳壯水之主以制陽光又曰臟腑之原有寒熱溫涼之主取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可故或治熱以熱治寒以寒萬舉萬全孰知其意此王氏之心得也然求其所謂益與壯者即溫養陽氣填補真陰也求其所謂源與主者即所謂求其屬也屬即本也根本之謂水火之本則皆在命門之中耳捨命門何處覓尋夫曰本曰求本曰必求又不曰治本而先曰求本蓋惟求始可得本得本始可論治吾願世之學醫者一深長思也駁諸家癆瘵治法之謬百病惟癆瘵為最重邇來患者既多治者愈舛若朱丹溪以苦寒補陰戕伐生命百載而下屢有非之者固無庸喙矣至乎葛可久之十藥神書王宇泰之證治準繩無論賢愚皆稱為善余獨以為非也夫病者既誤投劍戟叢中而醫者復操刀挾矢而躡其後安望其有復甦之理乎蓋瘵乃虛怯之謂亦猶年荒歲歉而又缺壞不完之意也嬰疾到此黃泉日近何啻膏肓之篤可不凜然寒心哉夫病有輕重深淺之不同也始曰弱繼曰虛曰衰曰損曰瘵但瘵甚於損損甚於衰衰甚於虛虛甚於弱初起因循不治而弱必至於虛虛必至於衰衰必至於損損必至於瘵至瘵則已入死法而又不即死者也然病又有經絡臟腑之不同也臟深於腑腑深於經經深於絡其初起也則必由絡入經由經入腑由腑入臟至入臟則生機已絕殗殢待盡矣雖然臟有五而腎為要腎有兩而左為重蓋左腎為元陽之母為真陰之主為天乙之宗為生化之源儲精握血造命生身此處一傷根本傾搖矣而吾又詳究其致病之因與夫諸家治法之謬也經云五臟者主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死又曰腎屬水受五臟六腑之精而藏之又曰主蟄封藏之本腎之處也故凡男子色欲過度施泄無禁而或先天稟薄胎瘞虛瘦精血未滿早被斫喪或沉湎醉鄉毒潰骨髓蓋由腎屬陰而主水水即精也水竭火盛勢必然也火盛爍金金水不能相生虛陽失制發而為燎原假熱之火此火為壯火為邪火為龍雷之火為無根之火而非君火凡火可得以苦寒沉陰黃柏知母之屬而直折之也其發熱也或倏忽往來時作時止或晝見夜伏夜見晝止不時而動或唾痰咯血喘嗽不休或喉癢燥渴或失汗遺精或二便不調或飲食少進或肌肉日脫總緣精枯水涸因致見症令人疑惑難以名狀是皆陰不足以制陽病在陰中之水也王太僕曰寒之不寒責其無水又曰壯水之主以制陽光立齋先生曰無水者宜用六味地黃丸填補真陰張景岳亦用純甘至靜之劑二賢無失化源之治灼有千古獨識然真陰損竭而非熟地膏膩石棗溫潤滋補空虛何以復生精血乎經曰精不足者補之以味是也抑陰既虧矣真陽無附脾失資生故用甘平之山藥茯苓扶益胃氣枸杞阿膠巴戟甘草皆壯水之品或可臣佐但非侑以人參則無陽而陰無以生也丹皮固骨蒸所需澤瀉為利水而設性主補瀉兼行亦須斟酌採擇水旺則骨蒸自除何必行血之丹皮金盛而上源既裕寧資通淋之澤瀉又未有陰虛而脾胃能獨實者也天麥二冬雖云療嗽獨其冷滑瀉陽不宜輕用玄參地骨固優退熱亦屬甘寒犯胃是所必忌桑白乃瀉肺火之有餘獨不思火既有餘水便不足而可重瀉其表乎若生地藕汁童便人乳此亦寒滑妨脾在治實火得矣獨不思龍雷虛焰遇水愈熾而可混投乎薏苡仁乃理腳氣除風濕消肺癰之藥而此陰虛咳嗽金水俱敗可用滲利乎痰為腎津不能四布挾虛火以上溢乃如痰而非真痰也奈何妄用泄郁之貝母乎甚至橘紅款冬亦敢亂施枇杷葉輕飄薄質果能滋腎保金耶虛煩莫寐火爍陰也而與療膽熱不眠之棗仁何干再詳麥冬固清肺金雖同五味人參為生脈之飲獨不思孫真人立此方者為因暑月火熱傷氣而非可藉以治土敗金虧之嗽也甚至投薄荷汁以清熱取杏仁膏而治喘乃復用此苦辛泄陽香燥傷陰之味愈支離莫解矣竹瀝清鬱火之痰涎也與此腎津上溢者何關乎大黃玄明粉為治傷寒胃府燥滿實堅之熱症也桃仁韭汁乃破瘀行血之峻劑也而可施於陰虛肝臟已敗脅肋俱疼之危候乎奈何尚不知熟地黃之為挽陰回生之聖藥乎生地初固甘寒滯胃而假以九轉功夫鼎爐變化精微妙用大能健土生精則曰泥膈難化或因火候未足制煉乖方耳豈識此藥面目哉喘甚者虛里應衣火不歸源也何又妄投腹皮蘿蔔蘇子葶藶之屬哉病一飲寒熱益燎原忍復益以連翹梔子三黃之類大瀉真陽耶柴胡乃解少陽表熱治此則反令汗出愈傷元氣青蒿味苦主泄果能令幾微胃氣護保無虞乎穴灸四花徒接內火以升焱藥投蕊石反能停瘀而生災以上蓋葛可久王宇泰諸家治癆之妄法也切此乃真藏為患而非經府之病也根本已虧而非枝葉之雕也真陰缺壞不完而非氣血虛弱之媲也五臟有傷至腎為極真陰已敗元陽亦滅而又有水盛火衰與夫陰陽兩虛之病不可不察如何今昔諸家昧本徇標見病治病非惟搏刮無術致今速死有期嗚呼種杏乎種棘乎一部治世奇書幾為宜府鬼籙矣王宇泰曰丹溪論勞瘵主乎陰虛者蓋自子至巳屬陽自午至亥屬陰陰虛則熱在午後子前寤屬陽寐屬陰陰虛則汗泛寐時盜出也升屬陽降屬陰陰虛則氣不降氣不降則痰涎上逆而連綿吐出不絕也脈浮屬陽沉屬陰陰虛則浮之洪大沉之空虛也此皆陰虛之症用四物湯加黃柏知母主之然世醫遵用治疾乃百無一效者何哉蓋陰既虛矣心火上炎而當歸川芎皆味辛氣大溫非滋陰降火之藥又川芎上竄尤非虛炎短乏者所宜地黃泥鬲非胃弱食少痰多者所宜黃柏知母苦辛大寒雖曰滋陰其實燥而損血雖曰降火其實苦先入心久而增氣反能助火至其敗胃所不待言用藥如此烏能奏功哉余每用薏苡仁百合天門冬麥門冬桑白皮地骨皮枇杷葉五味子酸棗仁之屬佐以生地藕汁乳汁童子小便如咳嗽則多用桑皮枇杷葉有痰則增貝母有血則多用苡仁百合增阿膠熱甚則多用地骨皮食少則用苡仁至八九錢而麥門冬常為之主以保肺金而滋生化之源無不應手而效蓋諸藥皆稟燥降收之氣氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也以施於陰虛火動之症猶當溽暑伊鬱之時而商飈颯然倏動炎敲如失矣與治白虎湯同意然彼是外感而有餘故用寒沉藏之藥而後能輔其偏此是內傷為不足但用燥降收之藥而已得其平矣此用藥之權衡也又云虛勞之疾百脈空虛非黏膩之物填之不能實也精血枯涸非滋濕之物潤之不能潤也宜用人參黃耆地黃天麥門冬枸杞子五味子之屬各煎膏另用青蒿以童便熬膏及生地汁白蓮藕汁人乳汁薄荷汁隔湯煉過酌定多少並麋角膠霞天膏合和成劑每用數匙湯化服之如欲行瘀血加入醋製大黃末子玄明粉桃仁泥韭汁之屬欲止血加入金墨之屬欲行痰加入竹瀝之屬凡虛勞之症大抵心下引脅俱疼蓋滯血不消新血無以養之也尤宜用膏加韭汁桃仁泥大略前言苡仁之屬治肺虛後言參耆地黃膏子之類治腎虛蓋肝心屬陽肺腎屬陰陰虛則肺腎虛矣故補肺腎則是補陰非四物黃柏知母之類也又云治虛勞當以脾腎二臟為要何以言之腎乃系元氣也脾乃養形體者也經曰形不足溫之以氣者也謂真氣有少火之溫以生育形體然此火不可使之熱熱則壯壯則反耗真氣也候其火之壯少皆在兩腎間經又曰精不足者補之以味五味入胃各從所喜之藏而歸之以生津液輸納於腎者若五味一有過節反成其藏有餘勝克之禍起矣候其五味之寒熱初在脾胃次在其所歸之藏即當補其不足瀉其有餘謹守精氣調其陰陽使神內藏夫如是則天樞開發而胃和脈生故榮衛以周於內外無不被滋養而病愈矣檇李黃暗齋曰以上數條乃王宇泰先生治虛癆之法迥異時流予曾遵服亦有效故並志之也竊謂宇泰先生文章品望業已標鵠中原而留心方技著集準繩一書無非惠濟群生其用心亦可謂仁而勤矣獨是業非專習至夫虛勞一症治率從標且黃暗齋先生又從而附會之強稱為美不揣政恐天下後世庸工俗子念以為此方法出自名公大人拘守遵用遺誤非少至十藥神書編定甲乙丙丁十號兼投針灸金石執方待病尤屬謬戾及遍閱諸家方書所稱癆注二十四種三十六種或九十九種病機叢繁皆創言詭幻巧立名色欺世惑人好事者為之豈知萬病皆生於寒熱寒熱總由於水火水火偏勝原本一虧便成不可捉摸而為彌天亙地之勢矣不全此處根究更從何地著力故特表而出之為之駁正醫貴廣識語云吳牛喘月蜀犬吠日然非親履其地罔識其謬也夔巫陽巴之東門戶也楚歸州抵此程七百里歷三峽瞿塘灩澦之險長江若帶洪濤怒湧幾搖心眼兩岸堵江玄猿夜嘯千峰插漢皓晝陰霾朝雲莫雨茫茫靡旦一線隙天微光隱現時逢金秋爽氣平分木落天高煙嵐四淨當隆午中宵之候日月垂輝掩映樹秒或大如箕或小如拳或長如竿或短如尺仰矚千仞之上若睹若失巴人語曰歲不二三見見則群犬聚而吠之及孤影驚遁囂聲始息未幾揚帆出峽方快牖天漸闢四境達聞不復有吠日之奇事耳嗣登渝州入錦官稱古天府膏原平壤極目縹緲風景寥廓神怡心曠每攬勝千秋嘯臥草堂石枕支機筆續凌雲鳥戲桐花之鳳鴉塗濤女之箋進艇錦江遠睇青城碧瀾翠巘供我詩腸不禁飄飄然欲仙矣回思往事依稀如見而因嘆諺語之失詳也今正其名曰峽犬吠日夫內經墳典萬載之宗傳也立齋先生大成之繼聖也內經立齋中天之日月也諸子百家雜出之燈光也自內經以來未有盛於先生者也獨怪僻壤時流僅遵偏術細法反謗正學大道是徒知有燈光不識有日月也毀先生者吠日月也予設此喻非為日月吐氣特為陋工廣識耳
