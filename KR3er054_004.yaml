body:
  text: 卷之四治驗醫案上傷寒門傷寒乃感冒之重感冒乃傷寒之輕者在西北則多傷寒在東南則多感冒在冬三月為正傷寒在春夏秋為時行傷寒感於外為陽症傳經傷寒傷於裡為陰症不傳經傷寒元氣素虛為挾虛傷寒煩勞役作為勞力傷寒無表熱有裡寒為直中傷寒外作熱內受寒為夾陰傷寒犯色因而沖寒冒風啖冷為房勞傷寒傷寒三百九十七法一百一十三方方法繁復不可勝紀又有虛煩食積痰飲腳氣及溫暑濕暍與內傷雜症為類傷寒則傷寒乃抱括四方四時陰陽表裡而統言之者也若夫分門別類微詞奧義則有張仲景經論為群方之祖及後王叔和成無己龐安嘗徐止善吳綬錢乙朱肱劉元素李東垣王安道諸賢之編釋辨惑雖歷數十萬言筆舌猶難盡罄唯有神悟而心解之而已然操其要者莫外詳究乎脈症而確辨其屬外感屬內傷虛實寒熱真假疑似之間投藥一瘥生死反掌至馬宗素之鈐法謬妄難從陶節庵之六書膚淺易習此特益於初學而通權達變欲躋上乘則獨有仲景可宗而附之以諸賢而為旁印之助可也豫親是編二十餘載每遇此病依法救治多獲痊可即預斷死生亦卒如言求其為三冬正傷寒而卒無二三見豈病不我值抑閩海炎方果非西北之比乎大都仲景所言謂行道辛苦之人多有是病而富貴與靜逸之夫深藏固密不能冒觸信或然也即其不免只挾虛傷寒耳而挾虛之症十見八九顧安能以麻黃桂枝青龍承氣執方而混治之乎傷寒本難治而挾虛之治尤難之難倘脈症未明真假莫辨未有不覆人於呼吸之間者其值嚴冬得正傷寒者餘二十年來於千人中僅見兩人後所載益郡門役薑友僕男均為力役賤輩治以本症之藥即愈可無疑義矣茲列已驗醫案於後乃統括傷寒而立條也若治雜病亦已另列名目敬以奉教於高明焉太陽本經傷寒崇禎癸未仲夏會叔陳肩吾季子首夜因房勞失精次日冒感風寒頭痛發熱口乾惡寒心腹不疼二便如常脈浮數有力余以薑活湯與服彼疑為有房事余曰英年氣血俱實腎臟完固雖暫泄精不能為害前症乃純表邪無兼裡寒治以辛涼脈症相符何慮焉彼始信服兩劑頓愈嗣因清晨登廁冒風重感仍投前藥越數日戰汗而解設使礙於房事脈症未明妄投溫劑必致斑黃狂譫而成夭札之患太陽正傷寒癸未仲冬儒者薑子社僕男往鄉冒寒頭痛發熱項背腰膝亦皆疼痛兼口乾氣喘脈浮緊有力余以小劑麻黃湯一服不汗而瘥嗣因傷食前症復作用二陳加曲糵紫蘇兩劑方愈因憶崇禎己巳季冬家大人署益郡時值夜二更我聞喊聲徹署察之乃一守役苦頭痛不堪余時業已熟瀕湖脈旨但未試耳出視脈左部皆浮緊有力一切外症俱與經論吻合即以前湯與服黎明大汗而解太陽陽明合病甲申中秋建昌胡三府諱縝患前症頭目疼痛發熱如焚喘渴嘔吐泄利赤黃脈洪數有力余投以羌活葛根黃芩半夏甘草柴芍諸藥一劑即愈設使礙於嘔利誤投溫劑必致淹延生變陽明少陽三經合病甲申夏西關外一吳姓婦人病頭目疼痛寒熱往來乾嘔拒食脈浮弦不鼓余曰前症乃肝木製土本稱難治今脈虛欠胃氣殊為可憂余以建中小柴二湯加朮與服渴止納食熱亦半減彼貧難市參不復再藥越兩旬大衄而歿嗟乎貧苦力役之夫終歲勤動一罹病網飢寒隨之藥餌何辨不免輕變重重變死耳彼富貴驕縱之徒溫飽淫佚或沉湎糟丘或鍾情枕席毒漬腸胃精枯骨髓二豎少侵真元便脫即緩扁難施膏肓之治豈區區參耆草根所能補漏萬一哉余嘗拈數語以慨世曰獨恨參難療貧貧病日增可嘆富易購參參功不顯云太陽陽明並病甲申孟夏閩庠古友諱兆甲者患前症發熱咽乾昏眩不寐二便如常雜治數劑不瘥及察方藥乃解表而兼利水澤瀉赤苓之屬余曰解表須用辛散上行之味若利水是引邪下行故外熱不得發越因而遺留不愈耳投以羌活葛根湯加減兩服而愈夫如此病症治何難事而乃以五苓散治太陽傳本熱結膀胱之藥而治太陽陽明未退之熱實相反矣陽明傷寒癸未秋上街林華遠患前症脈洪數余投以辛涼之劑一服即愈未幾食後勞復皆如法治之隨痊正陽明胃府傷寒甲申夏對鄰唐英患前症發熱自汗嘔逆脹悶夜則狂譫便祕溺澀六脈洪數有力余以大劑三黃湯加知母淡竹木通大黃石膏與服仍令晝夜飲水投數劑熱退汗斂二便清順斷以七日當戰汗而解至期果然夫如此脈症相符實邪之病本非難治若不投以苦寒之劑未免遺熱臟腑淹困生變往往醫於此際亦有灼知屬熱但妨礙於嘔逆喘脹不敢峻攻未免膽小誤事耳太陰傷寒癸未夏西關外阮姓一男子患前症外症已罷咽乾腹痛後泄赤黃脈微浮余投以桂枝大黃湯加減與服一劑即愈少陰傷寒甲申臘閩清庠友羅君寵患前症煩渴腹脹後便滑泄手足溫脈沉細有力復兼往來寒熱余以黃芩白芍知母厚朴柴胡大黃諸辛寒之劑投兩服而愈厥陰傷寒癸未季秋涇縣明經吳胤虞入閩患前症越六日身無大熱咽微干雖昏倦少神脈卻平勻和緩余告以次日當戰汗而解不須藥至期果愈甲申秋西河一魏姓男子患前症舌卷四逆嘔吐昏倦六脈沉散及察前方乃過服承氣所誤遂致胃敗莫療少頃而歿切三承氣乃辛寒峻厲之劑非其人素稟壯健脈症俱實豈容輕投枉斃人命三陰合病傷寒近鄰一菜傭林姓崇禎癸未春首患傷寒六日困殆始延醫醫以貧故無心詳診每每辭不治而去余適外出聞其母悲泣因入視之病者目瞑耳聾舌有黃苔燥渴索水絶食兩日少動則呼胸腹脅肋皆痛大便下赤水小便亦赤澀幸囊未縮脈沉緩余濟以大柴胡湯灌下少頃下燥糞目開耳能聞再與小柴湯三帖而全愈可見生死自有定數不然幾誤於諸醫之説矣此三陰症具誰謂三陰無合病乎方書謂三陰無合病是盡信書則不如無書矣兩感傷寒兩感與夾陰異兩感為表裡俱受寒邪夾陰為外感寒邪內傷寒冷故兩感多用辛涼夾陰必用溫熱至兩感用辛涼不瘳夾陰投溫熱無效均入死法也甲申仲冬西水關一王姓男子年二十餘患前症頭目疼痛發熱如焚口渴燥悶胸腹滿脹脈浮緊沉按亦實歷只兩日延余診治時有一老醫誤以為白虎症余曰白虎症當無大熱只口燥渴或自汗心煩背微惡寒始為白虎即擬為太陽陽明合病則當於表裡症中添一協熱下利症方是合病此明明是大青龍症故首日頭痛發熱而只口乾胸滿今日便增鼻乾不眠煩渴腹脹非一日太陽太陰俱病二日陽明少陰俱病乎公奈何傷寒論不讀也但喜患者英年氣實症未至引衣蜷臥尚為可救余以大青龍湯加柴芍陳皮半夏一劑與服應手而愈是冬臘十七日復有一輿夫亦患前症初治皆發表平緩之劑歷四日余適他出因入視之備詢前症及閲前方皆邈不與病相符六脈滑大無力嘔渴囊縮昏不知人余斷以六日當死彼仍延他醫以為風痰用吐法至次日即歿前病最屬危惡古今諸賢咸稱不治余以為稟賦尚健冒觸方新未經妄藥胃氣猶存尚猶可治則水關之男子是也若年力漸衰邪氣入深誤服舛劑真氣消亡此輿夫所以殞命於刀圭也夫大青龍湯雖曰峻厲第有是病而用是藥奈何易老僅以羌活沖和湯代之是亦膽小之過而未詳長沙制方之微義矣房勞傷寒比鄰林楚畹秋間為母延余彼亦以脈求診余曰子至隆冬當得重病但須謹護無足慮也彼形體魁梧素健無病意疑余言為迂及冬從徵山冠行間驅馳歷經四旬積受寒濕甫歸犯色次日即病頭目疼痛發熱如燎口燥唇焦嘔逆煩悶脈浮微無力尺細若脫余驚曰奈何陽病而得陰脈此必犯房勞當小腹微疼而復下利詢之果然急以大劑桂附理中湯與服脈症頓減次早遍體發斑彼疑以為附毒余曰子積受寒濕凝伏經絡昨得熱劑血脈流通中氣既固邪氣不容暴發於外此乃寒斑非熱斑也然終疑不釋另投消斑平劑胃寒藥拒不納仍以前湯與服斑始消脾氣亦健夫如此症候表症既實燥渴狂煩且復發斑時醫執症昧脈必用清解之劑即稱知脈者亦必限於膽小以桂附為蛇蠍而姑投和緩之劑均能誤人於死也若鄭貞侯方西人可鑑也甲申夏里人方西人房勞冒風臍下沉痛大便滑利脈兩手浮疾如數稍按即無余以桂附理中湯投三劑脈症漸減彼求速效另延他醫誤以為時行瘟病促投寒藥教啖生果少頃發厥狂譫復求救於余察其六脈已絶當不逾時死果然癸未秋明經鄭木華子貞侯房勞感寒復沾雨濕前醫憚用薑附只投二陳緩劑越九日發燥增劇始延諸醫及余診治余告以脈見轉索本夜當歿鄭木華壻陳克新乃余內弟甲申春患房勞沖寒面目青黯咬牙寒戰舌即轉黑四肢厥逆速余救療余不及脈急以薑附湯連三劑始應夾陰傷寒癸未冬庠友張羞公長郎年十四病外感風邪內傷寒冷頭痛發熱口渴嘔吐大便清利胸腹疼脹燥悶不眠脈浮數無力幸只兩日未經他醫妄治投以參附理中湯一劑前症減半脈緩稍健再劑彼疑熱渴未解揀薑附不用前症復作余再投以前湯諸症如失張因問奈何發熱煩渴反用燥劑余曰脈雖浮數按即無力假熱之症也便滑腹疼嘔吐拒食此乃積寒內閉假熱外爍亦危症也倘非堅投前劑而使誤用表藥何以捖復真陽必無幸矣渠始信服至今猶惓惓稱感粵憲林君向次郎患前症越八日發燥譫妄延余診治脈兩手如絲陰陽俱脫余斷以次夜二更當歿辭不治及莊隱凡到亦謂脈症已敗誤於寒劑至期果斃愚意傷寒急病反覆變遷治失其宜命在反掌苟非平昔穩詳脈息病機當局何能刃解夫前症乃外熱內寒上假熱而下真寒為陽中伏陰亦謂夾陰傷寒倘初起而即用理中薑附溫經散寒何至妄治因循喪生大都病家不善擇醫而以時名為殉往往自誤耳直中傷寒壬午仲冬錦衣尉軍一壻往鄉冒雨寒濕侵內及歸服表劑數帖燥悶厄逆二便不通再延周等皋治以桂附理中亦不見效越六日延余治之六脈沉微代散太溪衝陽絶不見動余斷以次夜當死勉開一方令其與別醫商治夫前症本屬理中奈何反以辛涼益助病勢枉斃人命哉陰燥傷寒即病夾陰諸陰症不早治療或治療失宜越數日而發燥如狂是也往往醫家誤作陽狂治療速人死地可勝悲悼傷寒之難政此疑似關頭參詳不到耳流醫中惟程鳳山識之癸未夏浦尾鄭思長子因割肝救父未幾病風寒入內越六日羿治察為陰燥如狂之症脈結代無力辭不治次日果歿夫傷寒陽症越七日九日難治陰症越四日六日不治陽毒越五日七日難治陰毒越兩日四日不治陽狂慢治百僅一死陰燥早療百可一生然陽症亦有越七日九日或十四日而愈者倘體實脈實寒邪只循經絡不幹臟腑經盡氣復即不藥亦當自愈未有藥之而不愈者至陰症則寒邪內侵臟腑元氣益傷藥對症而緩施尚有死者未有不藥而不死者亦未有藥不對症而不速死者也內經云病勢已過命將難全可不熟思若其不分陰陽虛實不察病期久近一概投劑殊昧吉凶實自召謗耳癸未冬明經李願夫猶子勝之患夾陰傷寒發燥彼初延一世醫一僧醫所藥皆知母柴芍升麻陳皮半夏羌活葛根之屬余斷以難越三日辭不治至期果歿東垣曰陰燥之極欲坐井中陽已先亡醫猶不悟復指為熱重以寒藥投之其死也何疑焉成無己曰雖燥欲坐井中但欲水不得入口是也內經云無盛盛無虛虛而遺人夭殃無致邪無失正而絶人長命若輩徒知見病治病不顧虛實真假殺人反掌罪可勝誅哉勞力傷寒癸未仲秋比鄰林楚畹之母勞力感寒頭眩發熱前醫誤以為太陽表症而投辛發之藥連五劑不痊及延余治六脈洪緩無力兩手微見瞤動此乃過飲表劑因致元氣大虛血不榮筋法應溫補遂用補中益氣湯加肉桂炒芍兩服熱退身涼脈亦斂再劑瞤動亦止至十餘日病大便祕塞余仍用前湯去柴胡倍人參加秦艽棗仁以大棗為引服二劑大便潤通小便清利頓覺爽然設使妄用硝黃攻瀉之藥大泄真陰必致不起甲申春內翰陳伯全弟伯容患前症服表劑不瘥益見昏晌餘脈其心部沉結諸部虛浮無力得之勞郁彼以為確中病情服補中益氣湯加羌活黑梔少佐肉桂兩服即愈詢之蓋為年來與一豪家構訟僕僕公庭未免觸事惱意神思為病耳嗟乎此亦可以表劑而潛耗其真氣乎東垣辨惑論云舉世醫者皆以飲食失節勞役所傷中氣不足當補之症認作外感風寒客邪有餘之病重瀉其表使榮衛之氣外絶其死只在旬日之間所謂差之毫釐謬之千里可不詳辨乎挾虛傷寒所謂挾虛者乃平昔飲食起居失宜勞役房帷所致天真隱耗觸邪易襲倘初犯而即溫經理寒不一二劑便可頓愈何至誤投喪生乎崇禎癸未仲冬嘉禾司理孫鶴林弟墨林年僅四旬患前症初延一名醫作外感治因他出授以小柴湯七帖令連日服之經旬漸劇再延範曰生生驚告曰脈已變當奈何令再別請及陳雪潭至作傷寒壞症論議用人參二兩熟附二錢煎服隨吐至次晚介王則奚來請診其六脈俱脫且已發燥豫曰此症本屬因虛感寒初治得無錯服涼藥乎渠二子曰政為某所誤耳豫又云今已發燥而脈沉絶法在不治即投參附湯亦無及矣彼再三強復云昨雪潭政投前湯奈不納何豫又曰此病已陽脫而浮於上乃外假熱而內真寒也治須真熱假寒之劑方得入令其將已煎前湯再加附子二錢吳萸數分煎停冷與服得靜睡半日小便清長舉家驚喜次日再診脈毫不轉余曰須越三日乃可望蘇墨林雖悅索前湯但僅支兩日之半次夜果歿嗟乎病得經兩旬方死者非屬本應死之病也特為誤劑而枉死耳誤人者何獨某被誤者又何獨孫乎夫傷寒傳變旦晚不定至小柴涼劑連授七服今古亦無此法腎虛傷寒甲申仲春連翔梧次郎參天頭痛發熱小腹微痛大便不實脈寸關浮數兩尺沉遲此腎虛應溫即傷寒論亦謂尺遲暫補何妨之説遂以溫中諸品少佐桂附炮薑與服至晡加熱增喘家人疑為前劑太補延余復視脈轉和緩腎部亦健余曰前劑乃固正以逐邪溫腎而驅寒今寒邪已和盤托出正氣拒邪勢必瞑眩非補邪而致加熱增喘也越三更當平復次早果大安設使誤用辛涼淹延生變必無幸矣自後每患前症輒飲前藥皆得痊可彼以為奇愚按三陽顯症雖為可汗而想其尺遲暫補何妨之説則明為虛寒入內當先救里無疑若里症得救即表邪不汗亦當自愈若不顧脈而用表劑殺人必矣蓄血傷寒癸未冬西城邊有陳姓老軍一女適因行經浣衣受寒發熱喘渴小腹脹痛初治或用辛涼解表或用降氣清熱或以冒寒而投溫劑展轉增劇脈寸關浮數兩尺沉結余曰此蓄血症也治本非難特諸醫未識病源耳以桃仁承氣湯兩劑下黑血數碗而愈癸未季秋太學林琳環次女年近四十寡居勞郁亦因行經冒寒血停衝任煩躁絶食小腹絞痛拒按二便不通經旬遍治不瘥初二日延余診視察其六脈浮數無力左關沉澀余曰此本桃仁承氣症也今脈與症反肝經已敗胃氣將絶藥豈能生一醫以四物加香附玄胡牛膝桃仁一劑僅下黑血碗許加減再服前症如故至十七日果歿夫前症均屬傷寒蓄血何以一用峻劑而得生一用平劑而反死余以為室女真氣未雕與𭒀婦悲鬱傷肝一殊也一受病未久一病勢已過二殊也一脈與症合一症與脈反三殊也一胃氣未敗一經旬絶粒四殊也一以峻劑而得告瘳一以平劑僅延旬日虛實頓懸五殊也顧安得以症而混同治之乎食積傷寒癸未仲夏善化楊我傷食中暍復飲冷水瘧痢並作煩悶不食前治柴芍清表之劑轉增狂譫余察其六脈滑數有力脾關尤甚以二陳加曲糵等物服兩劑諸症頓減靜睡二夜惟痢積未消調理經旬全愈傷寒脫血非血痢仲景治少陰脫血用桃花湯內有乾薑即此意也誰謂血症不用熱劑乎癸未仲夏浦尾鄭思年逾六十素善飲啖因醉臥當風患頭疼發熱面目青黯嘔吐拒食心腹脹痛兩足逆冷大便脫血脈六七至洪數鼓指余曰風寒內攻陰絡受傷故致脫血非血痢也脈洪數乃真氣虛邪氣勝也急以大劑參朮歸苓加桂附炮薑為佐木香陳皮炙草為使兩服熱退身涼血止脹消脈亦轉靜此余取症不取脈也次日始下痢雜色黃白微紅為宿積下泄不必慮余因他往渠急於愈別延一醫治以檳榔粟殼諸澀劑暴致脹滿二便壅塞余用二陳加大黃火麻防風枳殼與服數日積盡氣復而愈傷寒發黃甲申仲夏內弟陳克輝患感冒頭痛發熱一老醫用羌活湯入麻黃撮許投三劑越數日發黃目睛皆黃小便亦赤澀不堪余投以茵陳五苓散加梔蘖至十劑始痊夫麻黃湯本為三冬正傷寒而設而乃用之於溫暑之時幸英年脈症俱實不免斑黃之患執方治病謬滋大矣傷寒筋惕肉瞤癸未仲秋里人吳臺妾弟患勞力感寒初投發表連五劑不應復更治之漸增劇至十三日請余診視脈洪散參舂昏不知人惕瞤不止余曰此本是勞力感寒妄投表劑遂致氣血兩虛氣不衛外血不榮筋而然耳第此症醫多不知誤以為風渠云昨東門一醫果作風治余曰風藥皆散散既傷陽風藥皆燥燥復傷陰前藥欲以愈病是猶救焚而增薪也辭不治斷越三日當歿果然風溫甲申仲夏王介人病前症自汗灼熱鼾睡昏眩兼患疝疾脈浮洪稍緩前醫投以陽明藥不應余曰此風溫症也以白薇湯倍升麻入桂少許兩服全愈甲申仲夏對鄰唐英母年六十餘亦患前症自汗灼熱鼾睡昏眩獨脈則浮數欲脫稍按即無時或譫燥余曰病不難療須先救脈勿緩視也遂以人參三錢為君術耆歸苓甘草知母為佐肉桂附子為使冷服一劑得睡半日脈亦轉靜至晚再劑精神逸爽啜粥碗許脈按有力余曰脈已復原不須慮也次早投白薇湯始治本症彼舅氏李姓者請吳醒生吳以余所投第三劑極是但前兩劑不知何解妄用桂附燥藥余曰吾既用白薇湯而前兩服豈浪施乎薛立齋先生云凡脈暴脫或促代無力或屋漏余急用參附湯等藥多有得生者聆此則先哲法言炳如日星余遵而用之恐未必妄也夾寒瘟疫癸未仲夏方我貞妾弟黃申初犯房勞旋感瘟病頭痛發熱嘔渴脹滿大便洞泄夜增狂譫六脈遲弱左關右尺沉伏如絶初治藿香正氣散不效余以附子理中湯停冷與服得靜睡半日嘔泄頓止脹滿亦舒脈即漸出至晡煩渴未解余曰寒去而熱尚在經云熱雖甚不死不必慮投以竹葉石膏湯去石膏加知母天花牛蒡熱渴半減次日復煩舌轉黃胎余仍以前湯去石膏加芩連連三劑全愈石膏性甘寒沉墜前症因兼傷腎寒故去之第此症倘不先用溫劑消寒救脈而徒見病治病枉死必矣傷寒遺熱甲申臘薑子社有朱氏甥年十七因往鄉患外感初雜投增劇歷四旬延余診視及詢後一醫乃專用補藥服三十餘劑面黃將疸虛煩不寐六脈弦數此誤補所致抵今是遺熱症投小柴竹葉湯兩劑頓愈再劑平復傷寒吐蛔發厄壬午春有上街鄉民林姓者年五旬患夾陰傷寒初延治不知投何藥越九日請余正診脈時手拈一蛔而出六部虛大無力日發厄十數聲余曰脈為假熱症乃真寒投理中湯一劑煩渴減半次早脈亦斂余歸仍遺人參三白湯與服數劑起居如常但渴未退彼乘便於洪塘求治誤服療實渴藥滑石乾葛之屬至夜發燥譫妄次日促餘脈症已敗越旦而歿傷寒咽痛愚按此症每見時醫不分傷寒雜病不論虛實寒熱一概投以辛涼枉斃多矣故不得不詳辨於後夫咽痛病源非一也有傷寒咽痛有雜病咽痛之不同者屬傷寒者有太陽有陽明有陽毒有陰毒有少陰之為不同者即少陰一經有客熱有客寒有寒熱相搏之又不同者又有三陰直中陰寒而成咽痛者又有太陰肺經初感風邪便成咽痛者以上皆傷寒外感之咽痛也屬雜病有風痰上壅者有鬱火上升者有胃經積熱者有飲食中毒者有腎虛陰火上炎者有虛勞咳嗽咯血者有痰蛾瘇脹火蛾冷蛾之別者則又有不同也以上皆雜病之咽痛也其傷寒屬太陽者當一二日見則治以升麻六物湯辛涼之劑屬陽明陽毒者當二三日見此為熱毒上攻則治以六物湯或涼膈飲諸辛寒之劑其屬少陰客熱此為傳經當四五日見則當治以甘草湯或苦酒湯豬膚湯諸平緩微涼之劑少陰寒熱相搏者此亦為傳經咽痛則當治以桔梗湯和緩之劑至少陰客寒一症此本腎寒伏藏於經絡隱曲之間初治未及溫經散寒及至病久或經旬日或越旬余以致寒極上衝而成咽痛治以半夏湯用半夏桂枝甘草辛熱之劑若其兼症吐利手足厥逆則進用四逆湯大熱之劑屬三陰直中與陰毒則用薑附湯肺經冒風則用金沸草湯以上俱當察其兼症而施治者也其屬雜病風痰上壅者則治以二陳湯或星香散加甘桔湯鬱火上升者則治以加味逍遙散加桔梗牛蒡子胃經積熱者則治以三黃湯或瀉黃散飲食中毒者則治以苦寒消毒之劑腎虛陰火上炎咽亦痛則當治以八味丸內有桂附納氣歸源其虛勞咳嗽咯血咽痛聲啞者亦須治以壯水之劑以上總應察其兼症與脈之虛實而施治者也奈何一概混治致人枉死誰之咎乎癸未孟冬庠友鄭能仁患風痰上壅咽痛初治數劑增劇余察其六脈浮弦無力以補中益氣湯加膽星肉桂兩劑頓愈痰壅如失及聞數日前能仁一胞侄年十餘歲病少陰咽痛經旬日每飧尚能啜粥碗許動止如常一句醫投辛涼之劑飲下半晌即轉厥逆煩躁至三更而歿如此投劑少瘥生死反掌可不謹歟又仲冬府庠王介人之內患少陰客寒咽痛項背腰膝疼痛不堪手足逆冷大便滑利六脈弦強復少胃氣余斷以越三日當歿辭不治及察病因初起冒寒一女科為其體虛素郁投四物湯加減是助寒閉邪不得發越矣過數日寒極上衝喉咽痹痛復延一醫誤以為火而用玄參甘桔之屬益增煩躁至十五日延余診視備察脈症病期久近乃屬少陰寒痛余謂脈症已敗法應不起彼不信再更治有名醫某又以為鬱火上升堅投涼劑至十八日而歿甲申季春均鋪王門少婦患肝經鬱火上升咽痛纍治不瘥余投以逍遙散加牛蒡桔梗黃芩香附兩劑如失又季秋都閫連擎天之內患肺經風熱咽痛脈浮洪有力余以金沸草湯加牛蒡倍甘草一劑而愈甲申季夏鄰婦王氏喜啖辛辣病胃熱咽痛脈洪滑徵數余投以甘桔湯加芩連栝蔞玄參兩劑即愈若如此三婦病恙脈實症實投以寒劑效若桴鼓即使庸手治之亦不過如摧朽耳果何難第所難者於虛實寒熱疑似真假之間直中病情易危為安斯得之矣甲申孟秋建寧太學魏與參久客三山縈戀花柳病陰火咽痛前治誤為實火歷投涼劑益增煩痛察其六脈洪數無力余曰腎虛已極火不歸源而浮於上也以六味料加肉桂麥冬人參少佐附子兩劑即愈彼以為奇産後肝虛中風癸未冬陳昌元之內首胎恃壯當風燥體即病發熱如燎口噤眼歪喘嘔有沫面目青黑心腹膨脹揚手舞足脈見弦數不鼓余曰此肝虛自招風邪非表病也急以薑附丸調灌仍用當歸四逆湯加人參吳萸兩劑諸症如失産後脾虛冒寒甲申冬土街古友之內患前症自汗發熱煩渴不寐心腹脹痛飲食不入惡露不行前治未愈脈虛數無力余以十全大補湯去白芍加炮薑五味投三劑而痊半産中寒甲申首夏唐英之內初起熱病積服寒劑懷孕六月因虛而墜坐草冒中風寒即病面目青黑眼竄口噤嘔吐涎沫胸腹飽脹或時離蓐狂走譫語不休脈乍數乍疏危殆濱死前醫只投人參三分佐以養血之藥余曰急病而用緩劑何以回生乎孕六月當作産後論遂用人參三錢為君芎歸術苓桂附熟地木香為佐吳萸為引一劑涎沫頓止得靜睡兩時至晡狂譫仍作復再延余六脈如故余曰此乃病勢已深藥力未到仍照前方加人參二錢桂附各八分服後頓瘥醒即索粥惡露亦下方知痛苦呻吟調理兩旬全愈前症時當暑夏病復狂譫醫者不知見病治病誤以為熱而投寒劑必死及服參附後狂譫仍作此乃藥力未到仍須再藥倘脈症未明識見不定臨事張皇亦必以為誤服熱藥改投涼劑均能促人於死也類中風崇禎壬申季秋家嚴因署臨邛事竣鄉先生天部楊丹房邀遊鶴山余亦預焉越午公飲半酣歡笑失音昏瞶卒僕喉聲曳鋸手足散緩脈沉伏余令其從僕徐扶入僧房厚被密蓋復令抵家取參少頃有儒醫柳君至余曰此乃真氣素虛外邪因得乘入非大劑參附無以回將絶之陽柳雖以余言為是但意疑用人參二兩附子三錢之多余曰參多用有徹上徹下徹內徹外之功若不急投必至自汗遺尿上下元氣俱脫便不可救矣餘力任之促令前劑煎濃湯灌入飯許目能轉動再灌吁氣數聲脈漸復次日全愈欲歸余令其且在寺調養旬日方可行設遇此症誤以為風為火而投牛黃冰麝清氣化痰之劑耗泄真陽必無幸矣同時蜀藩有內江王亦患前症醫者執以為風雜投牛黃丸活絡丹蘇合丸越九日而薨異症甲申冬西關外一村民年逾五旬因中風瘥後誤食瘴牛狂渴飲水不休越數期兩腋乖脅下發腫出汗膚出細蟲如絲睪丸偏重尿血淋瀝耳燥癢不休前醫投宣蟲利水藥纍治不瘥余曰此肝脾兩經濕熱所致肝主風脾主濕濕風相搏而成熱濕熱相生而成蟲故見於肝部投小柴湯六一散入龍膽草生地四劑而愈癰疽非外病是冬南都孝廉查君球年可強仕素戀帷幕赴閩謁選行抵仙霞緑林剽掠驚愁隱郁甫停車數日病發寒熱背連左臂疼痛不堪余適為其同寓友江右覃應楠療陽虛傷寒甫愈聞左壁號聲如雷覃往顧查呼救揖余代診查昏瞶臥榻口絶不道其何病余見其面色純黯左頰略帶紫黑右微紅白遂診脈左三部搏指愈按愈實右脾肺輕舉亦洪健重按與右尺全虛第此病既無三陽表症當必內患瘡瘍尚兼木侮金為厲也旁有朱姓者乃查內弟問余曰何以言之余曰此病得之肝腎兩虧朱又問曰肝腎主何病余曰腎脈浮數而堅此平昔色欲過度因致燎原火熾耳肝部亦如之蓋木傷土土虧而腎水枯涸無以養肝故致弦強真藏脈見也強中見澀又金刑木當有鬱結事或悲哀悼亡或遺喪資重或驚怒傷懷皆木傷也朱與三五同行相抵掌嘆曰見亦神矣始説前由迫余主方余又云縱有外疾顯見當固內滋本為要初投一劑用參耆歸術各三錢桂心一錢佐忍冬阿膠甘草地黃白芍等藥頓覺健爽進食再劑背臂拱痛尤甚速余再診見症劇脈緩毒不內攻可喜之兆照前方只參耆加至五錢桂加二錢入牛蒡一錢服畢覺患處熱消痛減索粥碗許思酒余贊之飲至四更潰黃膿五六碗次日再診脈見濡緩余曰當無慮但元氣弱耳仍以前方加參耆各一兩術七錢甘草肉蔻各三錢忍冬牛膝乳香陳皮為佐桂心只用一錢服一劑余膿漸少新肉漸生飲食如常查始感悟曰微君吾其土矣服八劑瘡已斂十之七八偶有一部郎乃查窗友訪查見余方驚吒曰奈何盛毒瘡瘍而用參耆朮桂以火濟火耶查亦疑信莫決聽延一瘍醫呂姓者呂至極闢余法之妄乃更投大劑芩連連翹玄參枳朴苓澤之屬外敷以珠生肌膏初服亦爽利自是連五日不延余診余念其萍水孤蹤不邀自往渠託故三辭未及旬則馳介三請豫時已別往囦溪四日方歸歸即趨晤見查言語謇澀瘡流黑水煩躁索水飲食不進二便自遺足冷如冰矣脈疾散不一令其急備後事越五日殞部郎時在坐顧余曰奈何瘡毒而用補劑乎余曰療病憑脈此千古不易之定法也第癰疽症大要有四一年少元氣脈氣健旺飲食不減或因誤啖燥熱所致者則宜苦寒瀉火之劑以治之一年未甚老元氣脈氣未敗或因悲鬱傷肝者則宜清涼調氣之劑以治之一由平昔色欲過度水枯木橫或兼憂勞致傷中氣發於強年老年元氣胃氣虧損者則宜溫平補劑以治之今查君政合此法也反此則實實虛虛大命殉之又有一種疽症內潰蝕及臟腑及發不痛不癢此為元氣敗絶法不治也第今匪類冒醫見病治病動手殺人至於瘍師尤屬汙賤之流一見瘡瘍不管虛實大肆攻伐安得不速人於死乎今查君將亡非獨呂奴殺之也部郎始慚然語塞
