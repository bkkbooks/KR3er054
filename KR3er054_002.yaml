body:
  text: 卷之二四診正法脈論按脈者血之府精氣之源神之用水穀為宗蓋脈不自行隨五臟元真變化於經隧之間顯見於氣口陰陽之蘊也自軒岐以下難經仲景始約言其要逮晉王叔和以脈鳴時撰有脈經可謂周備詳切惜乎以大小腸診之兩寸部位錯亂瑕瑜莫掩而後之妄男子高陽生復創七表八里九道之名集為脈訣妄立圖形夫脈從心解其可以形得耶庸俚紕繆大乖經旨俗醫習誦以為權輿逮臻頒白脈理竟昧訛承惑固至今罔覺於是脈訣行而脈經隱至內經疹候越人難經仲景脈法則益淪沒不彰矣宋龐安常始得經旨而有人迎氣口之分西山戴同父復著刊誤亦闢其非崔紫虛之四言脈法滑伯仁之診家樞要李言聞之四診發明立論玄奧李瀕湖之脈學奇經解釋精詳皆有功於後學允為當世之指南者也醫而知此何病不瘳故脈不明則無以別症症不別則無以施治脈其可以不辨乎夫曰浮曰沉曰遲曰數曰滑曰澀曰虛曰實曰長曰短曰洪曰細曰弦曰緊曰芤曰濡曰微曰弱曰伏曰動曰促曰結曰牢曰革曰緩曰散曰代此二十七脈者乃脈之大綱也逐節解悟固無難悉而滑伯仁謂提綱之要不出浮沉遲數滑澀似乎太簡而實未足以盡脈尤須察其陰陽乘伏五行生剋者上下去來至止者有部位不容顛倒者有至數不容混淆者有彼此相類者有疑似難別者有真假相混者有有胃氣無胃氣胃氣少之殊者有從四時反四時者有與證相反相合者有一病而兼見數脈者有一脈而兼病數症者有雜投舛劑致藏氣不定脈隨變幻者有確守良藥症無進退脈不轉移者有人病而脈不病脈病而人不病者有脈不轉移而良劑稍輟便見虛陷者有老少衰旺之不同者有新病久病之宜忌者有壽夭吉凶之預定者有純陰純陽之偏稟者有形體之相反相應者有合聞問望而兼診者有僧尼寡婦室女童男之異常人者有貧富貴賤正人奸人六氣七情之各殊者又有真藏脈有奇經脈有太素脈有天和脈有人迎脈有關格脈有妊娠脈有五逆脈有六絶脈有七獨脈皆應詳辨精確服膺弗失一遇診按生死吉凶子了指下矣庶神而明乎愚按先哲有云余念古良醫治疾未有不先診脈自軒岐已然辨人鬼別男女特其粗爾微茫呼吸之間而生死系焉如濟北才人顏色不變而在死法中其脈病也籲是固神於脈矣然脈特四診之一也獨恨近代傳授匪真偏遵脈訣致令治疾乖訛而倡明斯道實乏其人即有明良輩出不免調高寡和行高謗多故刖璞懷光鮮有識之者嗟此生人雖幸生偏安之宇不死於盜賊水火乃陰陽為患甘枉沒於時師之手是時師本代天以降殃固劫運所應爾亦生人之自取是真可為痛哭流涕者矣切以為醫不明脈固無以別病而不明真假疑似之脈又無以別脈不明真假疑似脈之脈又無以別元氣之虛實而洞明生死吉凶之大要也脈其僅治疾云乎哉夫浮沉遲數二十七種此為大綱固無難識即其中有兼見者不過誦記之繁有相類者而只比擬之殊亦易易曉也然獨此真假疑似之脈如坡公所云大實有羸狀至虛有盛候脈之難辨為醫之難職此故耳若夫二十七脈與前論所云或陰陽乘伏或息數部位或胃氣有無或時症相應相反一切診法悉宜遵依內經難經仲景叔和脈經伯仁機要瀕湖脈學是皆宗傳正印炳如日星無庸贅矣至於真假疑似關頭此處差池生死反掌雖先聖前哲屢亦有言但未悉闡其義致使後學不察往往混治殺人余故不揣庸鄙逐種詳辨雖未諸精奧室但虛實犁然一診而明生死未病而圖預防存神指下識氣兆先庶幾軒岐微蘊之彰而非時師拘攣之見矣上士欲會其全非備四診不可今特舉其脈之疑似者列後此而不力為救正則終無復明之日矣如數脈數脈息數輻輳按舉有力主陽盛燔灼侵剝真陰之實病浮為在表沉為在裡發表攻裡脈症相符不難治也而獨有如數之脈疑似真假之間便有生死霄壤之殊人多不知也夫數按不鼓則為虛寒相搏之脈數大而虛則為精血銷竭之脈細疾若數陰燥似陽之候也沉弦細數虛癆垂死之期也又有快脈即疾脈快疾即如數脈非真數也若假熱之病誤服涼劑脈亦見數也每見舉世醫流診得息數急疾竟不知新病久病有力無力鼓與不鼓之異一概混投苦寒遽絶胃氣安得不速人於死乎徐東皋云數候多凶勻健略可惟宜傷寒妊瘧小兒瀕湖脈學云數脈為陽熱可知只將君相火來醫實宜涼瀉虛溫補肺病秋深卻畏之據此亦嘗有溫補之者矣若僅言只將君相火來醫則猶見之未擴也夫獨不有陽虛陰盛之重恙反得洪數有力之實脈急溫桂附旋即痊可者乎余謹再引內經色脈篇論以正其謬以救其枉為時師下一痛針法經言冬脈曰其氣來如彈石者此為太過病在外其去如數者此為不及病在中釋云來如彈石者其至堅強營之太過也去如數者動止疾促營之不及也蓋數本屬熱而此真陰虧損之脈亦必急數然愈數則愈虛愈虛則愈數而非陽強實熱之數故不曰數而曰如數則辨柝之意深矣此而一瘥生死反掌愚以為何獨數脈有相似者即浮沉遲緩滑澀虛實弦緊諸脈亦皆有相似也又非唯脈然也至症若如瘧如痰如喘如風如淋等病設非素嫺審辨臨事最撼心目故庸淺者只知現在精妙者疑似獨明為醫之難政此關頭矣如浮脈浮主於表行從肉上如循榆莢如水漂木體法天屬陽藏司肺時屬秋運主金也浮緊傷寒浮緩傷風浮遲中風浮數傷熱浮洪熱極浮洪而實熱結經絡浮弦頭痛浮滑風痰浮虛傷暑浮濡汗泄浮微氣虛浮散勞極此則大概主於浮脈而尚有兼診之殊者也至若浮芤失血浮革亡血內傷感冒而見虛浮無力癆瘵陰虛而見浮大兼疾火衰陽虛而見浮緩不鼓久病將傾而見渾渾革至浮大有力叔和亦云脈浮而無根者死然亦可以浮診而用治表之劑乎夫曰浮多主表症曰如浮悉屬內病表裡不明生死系之矣如沉脈沉主於裡動乎筋骨之間如石沉水必極其底外柔內剛愈按愈實體同地屬陰藏司腎時屬冬運主水也兩尺若得沉實有神此為根深蒂固修齡廣嗣之徵如病沉緊內寒沉數內熱沉弦內痛沉緩為濕沉牢冷痛沉滑痰食沉弱氣弱兼汗沉伏閉痛此則大率主於沉脈而尚有兼診之殊也至於沉而散沉而絶沉而代沉而短沉不鼓久病與陽病得此垂亡之候也若沉而芤沉而濡沉而澀沉而細沉而結主亡血傷精六極之脈諸如此類不得概以沉屬寒屬痛而混投溫散之劑也更有如沉之脈每見表邪初感之際風寒外束經絡壅盛脈必先見沉緊或伏或止是又不得以陽證陰脈為惑惟亟投以清表之劑則應手汗泄而解矣此沉脈之疑似不可不辨也如緩脈緩為脾脈主乎中應乎肌肉陽寸陰尺上下同等不浮不沉不大不小不徐不疾不微不弱和緩有力鼓指有神如絲在經不卷其軸又如微風輕颭柳梢蔡西山曰意思欣欣難以名狀四時五臟得此為有胃氣其體屬地天之交陽中有陰陰中有陽藏司脾時應長夏運主季土也不分男女老弱心身得此志和神暢百病得此不治自愈然緩有二此乃有胃氣雍容和緩之緩也又有緩弛之緩緩縱之緩緩弱之緩緩弛者傷濕也緩縱者風熱也緩弱者氣虛也緩而兼澀者血虛也浮緩者風傷經絡沉緩者濕傷臟腑洪緩濕熱細緩寒濕是皆有病之脈而非真緩脈也尚有陰虛浮洪無力而緩陽虛沉細無力而緩是僅肖緩之體而非得緩之神者也若弦居土位緩臨水宮蓋克脈也看此緩脈要察胃氣多少鼓擊高下去來遲速便得真確悟從心解未可一診了事也如滑脈滑脈平勻乃得胃氣之脈也故經云脈弱以滑是有胃氣又云滑者陽氣盛微有熱按之指下鼓擊有力有神如珠圓滑替替不絶男得此無病女得此有胎乃真滑脈也若病則屬痰飲浮滑風痰沉滑食痰滑數痰火滑短宿食寸滑嘔吐關滑蓄血尺滑㿗淋遺泄亦脈證相應之脈也而特有如滑之脈驟診亦得平和不大不小不見歇止不見克勝息數如常只是平動不鼓牒牒而去稍按即無此為元氣已脫僅存餘氣留連臟腑經脈之中未盡斷耳先於死期旬日內便見此脈乃絶脈也雖有盧扁亦難復蘇每見醫者尚於此際執以為痰化氣消痞攻劑任投只速其亡耳抑何昧於生死之頓殊乎澀脈不同澀脈狀如輕刀刮竹如雨沾沙如病蠶食葉主參伍不調傷精亡血之病為血痹為寒濕入營為心痛為脅痛為解㑊為反胃為亡陽為腸結為不月為胎病為溲淋亦為氣滯經曰脈弱以澀是謂久病然亦有不同者或人賦稟經脈不利或七情傷懷莫解或過服補劑以致血氣壅盛或飲食過度不即運化或痰多而見獨澀或久臥久坐體拘不運此又非專主於傷精亡血之病也至於虛勞細數而澀或兼結代死期可卜凡診此脈須察病機庶無謬治如遲脈遲與數為陰陽對待之體數六至遲三至息數甚懸而緩與遲又依稀相似但遲只三至緩得四至雖略相似主病則異至離經之脈則僅二至內經謂之少氣然遲主藏病多屬寒浮遲表寒沉遲裡寒有力冷痛無力虛寒或主不月或見陰疝或血脈凝泣或癥瘕沉痼皆主陽虛陰盛之病也而獨有如遲之脈凡人傷寒初解遺熱未清經脈未充胃氣未復必脈見遲滑或見遲緩亦可投以溫中而益助餘邪乎此虛實之不容不辨也如緊脈緊脈形如轉索無常又如切繩乃熱為寒束之脈故似急數而不甚鼓暴症見之為腹痛身疼寒客太陽或主風痙癇症在尺陰冷脈疝在關心腹沉痛在左緊盛傷寒在右緊盛傷食若中惡浮緊咳嗽沉緊皆主死此證與脈反也又有如緊之脈乃傷寒陰症絶陽七日九日之間得此脈仲景云脈見轉索者即日死蓋緊本屬病脈而非死脈但以新久之異便有生死之分不可不察如洪脈洪脈指下極大來盛去衰來大去長體為陽藏司心時屬夏運主火也為陽盛陰虛之病若逢炎夏診有胃氣乃應時之脈也若泄痢失血久嗽及痞滿反胃見之增劇難瘥或沉兼洪弦澀主痰紅火熾之症若形瘦脈大多氣虛死又曰脈大則病進若春秋冬月見之治主升陽散火若洪而有力乃實脈非洪脈須投寒涼此相類宜細別耳又有如洪之脈乃陰虛假熱陽虛暴症脈雖洪大按而無力此又不得投以涼劑致敗胃氣又人臨死從陽散而絶者脈必先見洪大滑盛乃真氣盡脫於外也不可不察如細脈細脈似微而常有細直而耎若絲線之應指宜於秋冬老弱為血氣兩衰之病或傷精泄汗或濕氣下侵或泄利脫陰或丹田虛冷或胃虛腹脹或目眩筋痿脈經云細為血少氣衰有此症則順否則逆故吐衄脈沉細者生憂勞過度者脈亦細治須溫補至有如細之脈或因暴受寒冷痛極壅塞經絡致脈沉細不得宣達是細不得概言虛而可誤施滋補固結邪氣也又有癆怯困殆脈見弦細而數蓋弦主氣衰細主血少數主虛火煎熬奄奄待斃醫於此時尚欲清之平之良可慨已如伏脈伏脈深於沉診須推筋著骨細尋方見主寒凝經絡臟腑或霍亂吐瀉腹疼沉困或宿食沉蓄或老痰膠固或厥逆重陰散寒溫里急宜著力傷寒太陽初症得此最為吉兆故瀕湖曰傷寒一手脈伏曰單伏兩手脈伏曰雙伏不可以陽症見陰為診乃火邪內郁不得發越陽極似陰故脈伏必有大汗而解政如久旱將雨六合陰晦雨後庶物皆蘇之義又有夾陰傷寒先有伏陰在內外復感寒陰盛陽衰四肢厥逆六脈沉伏須投姜附及灸關元脈乃復出也若太溪衝陽皆無脈者必死以上皆正伏脈也又有如伏之脈乃病久陰陽兩虧脈見斷續沉陷或隱或現真氣隨亡豈初病消散之比乎此乃脈脫非脈伏也至有暴驚暴怒暴厥亦見沉伏少待經盡氣復不治當自愈若人年過四十以上元氣素虛忽然昏瞶不省人事此為類中風而非真中風也喉聲曳鋸六脈沉伏惟急治以三生飲加人參一兩亦有得生者如遺尿汗泄口開目合便不救矣凡診此伏脈與如伏脈當兼察病因庶免枉治如實脈實脈浮沉皆得大而且長應指愊愊然不虛經云血實脈實曰脈實者水穀為病曰氣來實強是謂太過蓋實主火熱有餘之病或發狂譫語或陽毒便結或咽瘇舌強或脾熱中滿或腰腸壅痛或平人實大主有痢疾宜先下之或瘡疽脈實急下之以邪氣在裡故也俱宜通腸發汗亟解繁苛之火不待再計矣又有如實之脈久病得此孤陽外脫脈必先見弦數滑實故書云久病脈實者凶其可療以消伐之劑乎更有沉寒內痼脈道壅滯而堅牢如實此又不得概用寒劑但溫以姜附之屬可也又有真陰大虧燎原日熾脈見關格洪弦若實法幾窮矣尚可清涼乎以上三症皆如實脈非正實脈也如長脈長脈不大不小迢迢自若如循長竿末稍為平如引繩如循長竿為病長有三部之長一部之長心脈長神強氣壯腎脈長蒂固根深經云長則氣治短則氣病長主於肝短主於肺皆平脈也反此則為有餘之病非陽毒癲癇則陽明熱深若長而緩者百病皆愈大概雖主乎病亦屬輕淺之症其有如長之脈或鰥寡思色不遂心肝兩部則洪長而溢魚際是皆七情為患而非有病之脈也或㿗疝而左尺偏長是又宿疾留經而非無病之脈也或寒入經腑六部細長不鼓此非投以辛熱不能蠲除也若細長而鼓又須清解靈變在人耳看得長脈多有兼見不得偏執為悉無病但病得此終非死脈老人兩尺脈沉長滑實壽可期頤且徵瓜瓞之盛若短脈不及本位應指而回不能滿部主病為內虛為喘滿氣促為胃氣弱為頭腹疼諸病見短難治為真氣不足是又與長為霄壤之判如弦脈弦脈其狀端直以長若箏弦從中直過挺然指下體為陽中陰藏司肝時屬春運王木也經云輕虛以滑者平實滑如循長竿者病徑急如新張弓弦者死戴同父曰弦而軟者其病輕弦而硬者其病重純弦為負死脈也弦緩平脈也弦臨土位克脈也弦見於秋反克脈也春病無弦失主脈也其病主諸瘧支飲懸飲頭痛鬲痰寒熱癥瘕尺中陰疝兩足拘攣右關見弦胃寒腹疼若不食者脈本剋土必難治此則大概脈與病符也又有如弦之脈本非真弦而或兼見而或相類弦固類細而細則如絲線之應指又類緊而緊則如轉索之不絶為體既異主病亦殊但緊則為諸痛依稀若弦之無力耳弦兼洪為火熾弦兼滑為內熱弦兼遲為痼冷弦不鼓為藏寒弦兼澀秋逢為老瘧弦兼細數主陰火煎熬精髓血液日竭癆瘵垂亡之候也若諸失血而見弦大為病進見弦小為陰銷痰清見弦為脾土已敗真津上溢非痰也又有似瘧陰陽兩虧寒熱往來脈亦見弦急扶真元亦有生者若誤作瘧治如近歲閩司理王諱猷公所以枉沒於見病治病之舛劑也大要弦脈而病屬經者易治屬腑者難治屬藏者不治指下細別吉凶胤列矣濡弱微細四種相類濡脈極軟如水面浮綿輕診則得重按無有弱脈極軟重按乃得輕診無有脈學雲浮細如綿曰濡沉細如綿曰弱浮而極細如絶曰微沉而極細不斷曰細又云輕診即見重按如欲絶者微也往來如線而常有者細也仲景曰脈瞥瞥如羹上肥者陽氣微縈縈如蠶絲細者陰氣衰此四脈者雖形體不一大較皆陰陽兩虧病從內得或失精亡血或泄汗傷濕或氣促心驚或虛脹消疸或筋骨痿痹老弱久病見之順少年春夏見之逆治法皆宜調營益氣填精補髓固脾健胃急施拯救方得全生凡診此脈須察胃氣多少預示吉凶庶不召謗革牢不同革脈如按鼓皮主病為亡血遺精半産崩漏脹滿中風感濕諸症牢脈似沉似伏大而長微弦扁鵲曰牢而長者肝也仲景曰寒則堅牢有牢固之象徐東皋云沉而有力動而不移牢之體也主病為心腹疼痛疝頽癥瘕為氣短息促為皮膚著腫是革牢二脈固判若天淵也仲景曰弦則為寒芤則為虛虛寒相搏此名曰革男子主亡血失精女人主半産漏下脈經曰三部脈革長病得之死卒病得之生瀕湖曰此即芤弦二脈相合故均主失血之候諸家脈書皆以為牢脈故或有革無牢有牢無革混淆不辨不知革浮牢沉革虛牢實形症皆異也又牢為元氣將絶者凶牢忌見陰虛失血之病為虛病見實脈也不可不辨牢實相類牢脈沉而有力動而不移明主陰寒凝固之象也若實脈則浮沉皆得大而且長指下鼓擊息數往來動而能移乃主陽盛實熱之病脈體固依稀相似而主病則已懸甚均一動也只爭移與不移此徐東皋獨得牢脈之神識超千古矣及閲方書謂潔古實脈而投姜附此必非實脈乃牢脈也不容不細別之芤革不同芤形大如慈蔥兩傍有中央空同父曰營行脈中脈以血為形芤脈中空脫血之象也革脈則形按如鼓皮雖體不同大抵主病則皆失血亡陰之證芤虛散不同虛脈遲大而軟按之無有隱指豁豁然空崔紫虛云形大力薄其虛可知主傷暑怔忡自汗驚悸發熱陰虛腹脹痿痹遺精便泄諸症經曰血虛脈虛又曰氣來虛微為不及病在內又曰久病脈虛者死若芤脈則大如慈蔥與虛脈豁豁然空不同也所謂散脈者其形如楊花散漫去來無定息數難齊無統紀無約束渙散不收稍按便四散不聚主病為溢飲為血耗為怔忡為脫汗為胻腫胕産婦得之生妊婦得之墜平人見之死難經曰散脈獨見者危柳氏曰散為血氣俱虛根本脫離之脈若兩尺見之魂斷歸冥心脈洪大微散肺脈浮澀微散獨此不妨耳此散與虛異而虛又與芤異也結代不同結脈緩而一止止無常數代脈動而中止不能自還因而復動止有常數脈學云數而時止名為促緩止須將結脈呼止不能回方是代結生代死自殊塗然代為氣衰固云死脈而又宜於風家痛極孕婦霍亂是代亦有生者至結脈雖為陰凝痰結積聚癰腫瘕疝諸病每見脫血逢此終不免於死者是又不拘於常數總之結脈多生代脈多死耳瀕湖曰脈一息五至肺心脾肝腎五臟之氣皆足五十動而一息合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一息肝氣不能至則三十動一息蓋一藏之氣衰而代藏之氣代至也滑伯仁曰若無病羸瘦而脈代者危脈也有病而氣血乍損氣不能續者只為病脈傷寒心悸脈代者復脈湯主之妊娠脈代者其胎百日代之生死不可不辨代脈有二代為氣衰固止有常數此死脈也經又云黃脈代此蓋指脾脈而應於四時遇春得胃氣而兼見微弦遇夏得胃氣而兼見微洪遇秋得胃氣而兼見微浮遇冬得胃氣而兼見微石此乃四時更代之代而非死脈之代此代之義又不可不知如促脈促脈乃數而一止此為陽極亡陰主痰壅陽經積留胃府或主三焦鬱火炎盛或發狂班或生毒疽五積停中脈因為沮最不宜於病後若勢進不已則為可危五積者血氣痰飲食也若此得之新病元氣未敗不必深慮但有如促之脈或漸見於虛癆垂危之頃死期可卜或暴作於驚遑造次之候氣復自愈脫陰見促終非吉兆腫脹見促不交之否促脈則亦有死者矣動脈有三動乃數脈見於關上下無頭尾如豆大忽忽動搖仲景曰陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒此三焦傷也主病為痛為驚為泄痢為亡精為失血虛者傾搖勝者自安此皆病脈也又有平人而動者太素云三部寬長是上賢更於膽脈帶長弦豁然應指如龍動翊贊明君萬萬年又云腎部忽然動滑時為官必定有遷移更看三部寬洪應用意消詳仔細推素問曰婦人手少陰脈動甚者孕子也是皆吉兆之脈也真藏脈肝絶之脈循刀賁賁心絶之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絶如毛無根蕭索麻子動搖浮波之合腎脈將絶至如省客來如彈石去如解索命脈將絶蝦游魚翔至如湧泉絶在膀胱真脈既形胃已無氣參察色證斷之以意七情脈七情之脈內傷五志喜則脈緩悲短憂澀思結恐沉驚動怒急七脈宜先審而處治妊娠脈婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如斧欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大弦牢有證則逆脈病逆順岐伯曰凡人形瘦脈大胸中多氣死形盛脈細少氣不足以息者危形氣相得者生三五不調者病人有強弱盛衰之不一而脈實應焉脈有陰陽虛實之不同而病實應焉脈病形證相應而不相反每萬舉而萬全少有乖張良工不能施其巧矣故脈之於病有宜有不宜為醫不可以不辨也左有病而右痛右有病而左痛上病下痛下病上痛此為逆死不可治腹脹脈浮大生沉小死壯熱脈浮大有力生無力及沉微小死癲癇脈亦然譫語洪大生厥逆微小死暴忤脈實大生虛弱伏細死中毒洪大緊急生微細不齊危頭痛浮大安短澀危吐血發熱洪大生細微死不發熱細少生洪大危傷寒發熱後脈沉靜者生洪躁危自汗脈虛細安躁盛危厥逆沉澀生浮大危諸失血小弱生洪大危久病脈細軟生洪大危瀉利微細弱生浮大危滯下洪大數或緩生微小弱危産後微小生洪大數危胎前忌微小澀咳嗽浮大緩生沉弦小危細疾結代死中風口噤浮遲身靜者生洪數搏指氣粗者死上氣喘急面目俱浮脈浮滑手足溫者生脈澀小肢厥者死瘡疽洪大生沉細危既潰脈靜安潰後洪大危陽病得陰脈陰病得陽脈皆死消渴諸疽數大生虛細死霍亂浮洪生虛細死諸水浮緩生數疾死沉遲小死痿痹緊急或中病脈堅外病脈澀汗出脈盛虛勞心數風家脾緩人瘦脈大而喘形盛脈微短氣更有傷寒厥利而脈不至脈微厥冷煩躁脈遲而反消食與夫人短脈長人長脈短人滑脈澀人澀脈滑皆死脈也脈色逆順玉機真藏篇曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝乃死此氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺乃死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之所以占生死之早暮也大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真藏見乃豫之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真藏見十日之內死大骨枯槁大肉陷下肩髓肉消動作益衰真藏未見期一歲死大骨枯槁大肉陷下胸中氣滿心中不便肩項身熱破䐃肉脫目眶陷真藏見目不見人立死其見人者至其所不勝之時則死急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮不可為期其脈絶不來若人一息五六至其形肉不脫真藏雖不見猶死也三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右之脈相失不可數者死中部之候雖獨調衆藏相失者死中部之候相減者死目眶內陷者死肉脫身不去者死乍數乍疏者死真臟見形者勝死形氣相得者生三五不調者病形肉已脫九候雖調猶死脈無胃曰逆逆則死肝見庚辛死心見壬癸死肺見丙丁死腎見戊己死脾見甲乙死渾渾革至如湧泉病進而色弊綿綿其去如懸絶者死脈忽去忽來暫止復來者死脈中侈者死脈分絶者死三部脈如釜中湯沸朝得暮死半夜得日中死日中得夜半死九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死寒熱病者以平旦死熱中及熱病者以日中死風病者以日夕死病水者以夜半死其脈乍數乍疏乍遲乍疾日乘四季者死脈浮而滑身汗如油喘息不休水漿不入身體不仁乍靜乍喘者死汗出發潤喘不休肺氣絶也死陽病獨留體如煙燻直視搖頭口不能言心先絶也唇吻青四肢濈濈汗出肝先絶也環口黧黑虛汗發黃脾先絶也身熱喘粗見陰多躁或目眶深陷瞳不轉移戴陽上視腎絶也皆死頭目痛卒視無見者死三部脈緊盛大汗出不解者死陰陽尺寸俱虛者死溫病汗不出出不至足者死溫病禳禳大熱脈細小者死咳而形脫髮熱脈堅急者死皮肉著骨者死髮直如麻者死口臭不可近者死舌卷卵縮者死目不回直視一日死陰結陽絶目精脫恍惚者死面無光齒齦黑者死熱病七八日當汗不得汗脈絶者死遺尿不知者死口如魚口不能閉而氣出多不入者死肛門如竹筒大便不禁及不知者死病人臥有邊不寧者死吐痰如蟹沫者死面腫色蒼黑者死表裡俱病者死在傷寒則為兩感病已汗身體不涼加喘瀉者死病久妄言及不能言者不治熱病者可治病人陰陽俱絶撮空摸衣者死汗出不流舌卷黑者死發與肩衝起者死病人爪甲青者死病人爪甲白者不治病人脈絶口張足腫者五日死病人足跗上腫兩膝大如斗者十日死病人陰囊及莖腫者死病人爪甲及肉黑者八日死病人臥難著枕氣升如喘者死病人每日夜小便十數次而滴瀝者死病人形氣俱虛安穀者過期而死不安穀者不及期而死六絶脈衝陽絶死不治足陽明胃經脈在足大指彼陷中有動脈應指是也尺澤絶死不治手太陰肺經脈在手臂曲紋陷中有動應指是也天府絶死不治手太陰肺經脈在手臂內肩顒下有動脈應指是也太衝脈絶死不治足厥陰肝經脈足內大指後二寸動脈應指是也神門絶死不治手少陰心經脈在掌內側有動脈應指是也太溪絶死不治足少陰腎經脈在足內踝骨下有動脈應指是也七獨脈愚按經云獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此為七獨脈而即七診之義謂脈失其常候非吉兆也經又云七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之義而非也故言不死釋謂風者陽病故偶感於風而陽分之脈或大或疾經者常期也或適值去血而陰分之脈或小或遲或見陷下此皆似七診之脈而實非也皆不可以言死但非此而得七診之脈則凶經又云若有七診之病其脈候亦敗者死矣必發噦噫此經又言脈息證候之敗而非七診之比然其死也必發噦噫蓋噦出於胃土氣敗也噫出於心陰邪勝也可見脈證須要相應而有胃氣雖屬近死之病而亦不死若其脈證俱敗即非七診之病而又不免於死也無脈候無脈之候所因不一久病無脈氣絶者死暴病無脈氣鬱可治傷寒痛風痰積經閉憂驚折傷關格吐利氣運不應斯皆勿忌勝負扶抑脈概論不勝春弦澀欺澀弦氣少病作秋時無弦春病無氣死推更有兼其所勝春弦而緩相持氣多為平氣少長夏為病無弦春病無氣可知死期春弦鉤扶易愈春弦滑抑退遲勝負扶抑例舉可知脈證似反脈證似反非反因之而變無傷極實而有羸狀寒濕痓脈沉細極虛而有盛候脈虛大而無常病虛脈細因服寒涼而搏指陰虛出汗誤服參耆而脈強傷寒糞祕脈遲胃實宜下痛風兼祕何妨滑伯仁脈診三要診脈之要有三曰舉曰按曰尋輕手得之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手候之脈見皮毛之間者陽也府也亦心肺之應也重手按之脈伏於肉下者陰也藏也亦肝腎之應也不輕不重而取之其脈應乎血肉之間者陰陽相適中和之應脾胃之候也若浮中沉之不見則委曲而求之若隱若現則陰陽伏隱之脈也六部皆然又察脈六法上下來去至止六字為脈之神機也不明六字則虛實陰陽不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮毛之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止又明脈表裡虛實表裡虛實四字脈之綱也表陽也府也凡六淫之邪襲於經絡而未入於胃府及臟者皆表也里陰也藏也凡七情之氣鬱於心肺之間不能越散飲食五味之傷留於臟腑之間不能消泄皆屬於里也虛者元氣之自虛精神耗散氣力衰竭也實者賊邪之氣實繇正氣之本虛邪得乘之非元氣之自實也故虛者補正氣實者瀉邪氣內經所謂邪氣盛則實精氣奪則虛此大法也脈有陰陽乘伏難經云脈有伏匿然謂陰陽更相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也脈雖時沉澀而短此謂陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也脈雖時浮滑而長此謂陰中伏陽也天和脈參後六十年運氣診治天和脈只論三陰南天高兮北泉深太陰專主右尺寸厥陰尺寸左邊沉少陰尺寸兩不應相交相反死相臨天和乃平脈也諸陽為浮諸陰為沉故不言三陽司天在泉南政以天道言甲己二歲論脈則寸在南而尺在北三陰司天則兩寸不應太陰司天右寸不應少陰司天兩寸不應厥陰司天左寸不應三陰在泉則兩尺不應太陰在泉右尺不應少陰在泉兩尺不應厥陰在泉左尺不應北政以地道言乙丙丁戊寅辛壬癸之歲論脈則寸在北而尺在南三陰司天則兩尺不應太陰司天右尺不應少陰司天兩尺不應厥陰司天左尺不應三陰在泉則兩寸不應太陰在泉右寸不應少陰在泉兩寸不應厥陰在泉左寸不應不應者皆為沉脈也紺珠經曰五行君火不用事故南政少陰司天君火在上則兩寸不應司泉君火在下則兩尺不應厥陰司天君火在左故左寸不應司泉則左尺不應太陰司天君火在右故右寸不應司泉則右尺不應北政少陰司天君火在上則兩尺不應司泉君火在下則兩寸不應厥陰司天君火在左故左尺不應司泉則左寸不應太陰司天君火在右故右尺不應司泉則右寸不應凡不應者謂脈沉而細不應於手也反之則沉為浮細為大也歲當君火在寸而沉反見於尺歲當君火在尺而沉反應於寸經曰尺寸反者死歲當君火在左而沉反見於右歲當君火在右而沉反見於左經曰陰陽交者死又曰學診之士必先歲氣良有以哉李南豐云此與仲景丹溪所說不同然所論深得素問君火以退之旨故從之素問六十年運氣病治之紀水土壬辰壬戌歲上太陽司天中木運太下太陰在泉其化上苦溫中酸和下甘溫藥食宜也主病眩掉瞑戊辰戊戌歲上太陽司天中火運太下太陰在泉其化上苦溫中甘和下甘溫藥食宜也主病熱鬱甲辰甲戌歲上太陽司天中土運太下太陰在泉其化上苦熱中苦溫下苦溫藥食宜也主病濕下重庚辰庚戌歲上太陽司天中金運太下太陰在泉其化上苦熱中辛溫下甘熱藥食宜也主病燥悶滿丙辰丙戌歲上太陽司天中水運太下太陰在泉其化上苦熱中鹹溫下甘熱藥食宜也主病大寒凡此太陽司天之政氣化運行先天此下總結辰戌年太陽司天六氣之化也凡子寅辰午申戌六陽年皆為太過醜亥酉未巳卯六陰年皆為不及太過之氣常先天時而至故其所生長收藏氣化運行皆早不及之氣常後天時而至故其氣化運行皆遲如交變大論曰太過者先天不及者後天本篇後文曰運太過則其至先運不及則其至後皆此義也金火丁卯丁酉歲上陽明司天中木運少下少陰在泉其化上苦小溫中辛和下鹹寒藥食宜也主災三宮癸卯癸酉歲上陽明司天中火運少下少陰在泉其化上苦小溫中鹹溫下鹹寒藥食宜也主災九宮巳卯巳酉歲上陽明司天中土運少下少陰在泉其化上苦小溫中甘和下鹹寒藥食宜也主災五宮乙卯乙酉歲上陽明司天中金運少下少陰在泉其化上苦小溫中苦和下鹹寒藥食宜也主災七宮辛卯辛酉歲上陽明司天中水運少下少陰在泉其化上苦小溫中苦和下鹹寒藥食宜也主災一宮凡此陽明司天之政氣化運行後天此總言卯酉年陽明司天六氣之化也凡此卯酉十年歲氣不足故氣化運行後天相火木壬寅壬申歲上少陽司天中木運太下厥陰在泉其化上鹹寒中酸和下辛涼藥食宜也病掉眩支脅驚駭戊寅戊申歲上少陽司天中火運太下厥陰在泉其化上鹹寒中甘和下辛涼藥食宜也病上熱鬱血溢泄心痛甲寅甲申歲上少陽司天中土運太下厥陰在泉其化上鹹寒中咸和下辛涼藥食宜也病體重胕腫痞飲庚寅庚申歲上少陽司天中金運太下厥陰在泉其化上鹹寒中辛溫下辛涼藥食宜也病肩背胸中丙寅丙申歲上少陽司天中水運太下厥陰在泉其化上鹹寒中鹹溫下辛溫藥食宜也病寒浮腫凡此少陽司天之政氣化運行先天土水丁丑丁未歲上太陰司天中木運少下太陽在泉其化上苦溫中辛溫下甘熱藥食宜也主災三宮癸丑癸未歲上太陰司天中火運少下太陽在泉其化上苦溫中鹹溫下甘熱藥食宜也主災九宮巳醜巳未歲上太陰司天中土運少下太陽在泉其化上苦熱中甘和下甘熱藥食宜也主災五宮乙丑乙未歲上太陰司天中金運少下太陽在泉其化上苦熱中酸和下甘熱藥食宜也主災七宮辛丑辛未歲上太陰司天中水運少下太陽在泉其化上苦熱中苦和下苦熱藥食宜也主災一宮凡此太陰司天之政氣化運行後天火金壬子壬午歲上少陰司天中木運太下陽明在泉其化上鹹寒中酸涼下酸溫藥食宜也主病支滿戊子戊午歲上少陰司天中火運太下陽明在泉其化上鹹寒中甘寒下酸溫藥食宜也主病血溢上熱甲子甲午歲上少陰司天中土運太下陽明在泉其化上鹹寒中苦熱下酸熱藥食宜也病中滿身重庚子庚午歲上少陰司天中金運太下陽明在泉其化上鹹寒中辛溫下鹹溫藥食宜也主病下清丙子丙午歲上少陰司天中水運太下陽明在泉其化上鹹寒中咸熱下酸溫藥食宜也主病寒下凡此少陰司天之政氣化運行先天水火丁巳丁亥歲上厥陰司天中木運少下少陽在泉其化上辛涼中辛和下鹹寒藥食宜也主災三宮癸巳癸亥歲上厥陰司天中火運少下少陽在泉其化上辛涼中咸和下鹹寒藥食宜也主災九宮巳巳巳亥歲上厥陰司天中土運少下少陽在泉其化上辛涼中甘和下鹹寒藥食宜也主災五宮乙己乙亥歲上厥陰司天中金運少下少陽在泉其化上辛涼中酸和下鹹寒藥食宜也主災七宮辛巳辛亥歲上厥陰司天中水運少下少陽在泉其化上辛涼中苦和下鹹寒藥食宜也主災一宮凡此厥陰司天之政氣化運行後天愚按人秉天地之氣以生天人一理也五運六氣陰陽之變勝復之作而人身應之經曰隨其氣所在期於左右從其氣則和違其氣則病迭移其位者病失守其位者危寸尺反者死陰陽交者死又曰先立其年以知其氣而主病之陰陽虛實逆從生死母外此以為氣診矣奇經八脈李瀕湖曰凡人一身有經脈絡脈直行曰經旁行曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五也共二十七氣相隨上下如泉之流如日月之行不得休息故陰脈營於五臟陽脈營於六腑陰陽相貫如環無端莫知其紀終而復始其流溢之氣入於奇經轉相灌溉內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶乎溝渠奇經猶夫湖澤正經之脈隆盛則溢於奇經故越人比之天雨降下溝渠溢滿滂霈妄行流於湖澤此發靈素未發之祕者也八脈載在群書略而不悉醫不知此罔探病機仙不知此難安爐鼎云奇經八脈者陰維也陽維也陰蹺也陽蹺也沖也任也督也帶也陽維起於諸陽之會繇外踝而上行於衛分陰維起於諸陰之交繇內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之捷蹺也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也是故醫而知乎八脈則十二經十五絡之大旨得矣仙而知乎八脈則龍虎升降玄牝幽微之妙竅得矣兩手脈浮之俱有陽沉之俱有陰陰陽皆實盛者此為沖督之脈也沖督之脈者十二經之道路也沖督用事則十二經不復朝於寸口其人皆恍惚狐疑不省必當猶豫而兩心也兩手陽脈浮而細微綿綿不可知俱有陰脈亦復細綿綿此為陰蹺陽蹺之脈也此人曾有病鬼魅風死若恍惚亡人為禍也尺寸脈俱浮直上直下此為督脈腰背強直不得俯仰大人癲病小兒風癇疾尺寸脈俱牢直上直下此為衝脈胸中有病寒疝也難經曰奇經為病何如然陽維維於陽陰維維於陰陰陽不能相維則悵然失志溶溶不能自收陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急衝脈為病逆氣而裡急督脈為病脊強而厥任脈之為病其內若結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中陽維為病苦寒熱陰維為病苦心痛此奇經脈之為病也舉脈訣悖經之非愚按宋妄男子高陽生者胃竊叔和僞創脈訣庸鄙差謬大乖經旨俗醫習誦遵為法程終日呫嗶益增聾聵雖閲多病歷多壽虛實不識生死無如脈理竟昧誤世非淺獨奈相承膠固難拔若肯回心翻悟棄邪歸正依憑內經脈經正法特究虛實洞明生死病必識脈治必求本軒岐微蘊再彰今日天下之幸萬世之慶也今舉其非者於後脈經以浮脈謂舉之有餘按之不足脈訣乃謂尋之如太過據此乃浮兼洪緊實之象豈浮之體乎謬一也又脈經以沉脈謂重按至筋骨乃得脈訣乃謂緩度三關狀如爛綿豈知沉尚兼遲數洪細而誤指爛綿之弱脈為沉之體謬二也又脈經以遲脈謂一息三至去來極慢脈訣乃謂重手乃得又曰隱隱曰狀且難是又混遲而為沉為澀矣豈遲之體乎謬三也又脈經以數為綱領正脈脈訣妄立七表八里名目而遺數脈只歌於九道謬四也又脈經以滑脈往來流利如珠應指脈訣乃云按之即伏三關如珠不進不退是不分浮滑沉滑尺寸之滑也曰不進不退此政內經所云皮膚著脈不往來者死是豈滑之體乎謬四也又脈經以澀脈為往來難細遲短散脈訣乃云指下尋之似有舉之全無悖經甚矣謬五也又脈經以虛脈為遲大而軟按之無力隱指豁豁然空脈訣乃謂尋之不足舉之有餘此為浮脈豈虛之體乎謬六也又脈經以實脈為浮沉皆得愊愊應指脈訣乃言如繩應指來又言證為小便不禁是認脈為緊脈而證為虛寒之證妄甚矣謬七也又脈經以洪脈為指下極大宜於夏脈訣乃云季夏宜之秋季冬季發汗通腸俱非所宜獨不聞有舍時從症乎謬八也又脈經以緊脈為數如切繩脈訣乃云寥寥入尺來是令脈將倒行耳謬九也又脈經以芤脈中央空兩邊實病主失血脈訣乃謂兩頭有中間無是脈從中而斷截矣又言主淋瀝氣入小腸與血症何反誤世不小謬十也又脈經以緩脈主營弱風虛濕脾之病脈訣乃云為脾熱口臭反胃齒痛夢鬼之症支離枉誕謬十一也又脈經以弦脈如張弓弦脈訣乃云脈緊狀繩牽時時帶數此又混緊數為弦大失弦體矣謬十二也又脈經以牢脈似沉似伏實大而長微弦脈訣乃云尋之則無按之則有又云脈入皮膚辨息難又以牢為死脈皆舛妄害理謬十三也又脈經以濡脈極軟而浮細如綿按之無有脈訣乃云按之似有舉還無是又以微脈為濡謬十四也又脈經以弱脈為極軟而沉細按之乃得舉之無有脈訣乃言輕手乃得是又以濡為弱謬十五也又脈經以細脈小於微而常有細直而軟脈訣乃謂往來極微與經大乖謬十六也又脈經以伏脈為重按著骨指下才動而脈訣乃云尋之似有定息全無謬十七也又脈經以動脈為見於關上下厥厥動搖脈訣乃言尋之似有舉之還無不離其處不往不來三關沉沉含糊譫妄謬十八也又脈經以促脈為來去數時一止復來脈訣乃云並居寸口不言時止謬十九也又脈經以結脈為往來緩時一止復來脈訣乃云或來或去聚而卻還此與結何干謬二十也又脈經與仲景以動為陽脈訣之九道則以動為陰謬二十一也又仲景以弦為陰脈訣之七表則以弦為陽謬二十二也又內經難經仲景脈經皆以脈從陰陽對待而言而脈訣則妄創七表八里九道之詭名夫以表言之則實脈非表也以裡言之則遲脈非里也而道更不知為何道也謬二十三也以上二十三謬舉世習熟無有覺其非者茲特以經為案以悖經為斷切有賴於同志之士焉謹再考證諸書以悉其謬晦庵朱夫子曰古人察脈非一道今世惟守寸關尺之法俗傳脈訣辭最鄙淺非叔和本書東陽柳貫曰王叔和撰脈經十卷為醫家一經今脈訣熟在人口直謂叔和所作不知叔和西晉時尚未有歌括此乃宋之中世人僞託以便習肄爾河東王世相曰診候之法不易精也軒岐微蘊越人叔和撰難經脈經猶未盡泄其奧五代高陽生著脈訣假叔和之名語多抵牾辭語鄙俚又被俗學妄注世醫家傳戶誦茫然無所下手不過藉此求食而已於診視何益哉云間錢溥曰晉太醫令王叔和著脈經其言可守而不可變及托叔和脈訣行而醫經之理遂微蓋叔和為世所信重故假其名而得行耳然醫道之日淺未必不繇此而誤之也攖寧滑壽曰脈之陰陽表裡以對待而為名象也高陽生七表八里九道益鑿鑿也求脈之明為脈之晦金陵戴起宗曰脈不可以表裡定名也軒岐越人叔和皆不言表裡脈訣竊叔和之名而立七表八里九道為世大惑脈之變化從陰陽生但可以陰陽對待而言各從其類豈可以一浮二芤為定序而分七八九之名乎大抵因浮而見者皆為表因沉而見者皆為里何拘於七八九哉廬山劉立之以浮沉遲數為綱以教學者雖似捷徑然必繇博反約然後能入脈妙若以此自足亦畫矣朱丹溪曰氣口者脈之要會故能知人命之死生世之俗醫誦高陽生之妄作欲以治病其不殺人也幾希望色素問曰望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧靈樞臟腑病形篇曰色青者其脈弦赤者其脈鉤黃者其脈代白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死也得其相生之脈則病已矣又曰先定其五色五脈之應其病乃可別也又曰赤色出兩頰大如拇指者病雖小愈必卒死黑色見於天庭大如拇指必不病而卒死又曰青黑為痛黃赤為風黃而膏潤為膿赤甚為血白為寒是為五色也又曰五色微診可以目察能合色脈可以萬全赤脈之至喘而堅診有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至喘而浮上虛下實兼有積氣在胸喘而虛名曰肺痹寒熱得之醉而使內也青脈之至長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭脈緊黃脈之至大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四支汗出當風黑脈之至上緊而大有積氣在小腹與陰名曰腎痹得之浴清水而臥又曰夫精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如監青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣壽不久也夫五色者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強者生失強者死五臟之氣敗色見形青如草滋黃如枳實黑如煙煤赤如衃血白如枯骨皆死也青如翠羽赤如雞冠黃如蟹腹白如豚膏黑如烏羽此皆生也青色見於太陰太陽及魚尾正面口角如大青藍葉怪惡之狀者肝氣絶死若如翠羽柏皮者只是肝邪有驚風風病目病之屬紅色見如唇口及三陰三陽上下如馬肝之色死血之狀者心氣絶死若如橘紅馬尾色者只是心病有怔忡及驚悸夜臥不寧白色見於鼻準及正面如枯骨及擦殘汗粉者為肺絶丙丁日死若如膩粉梅花白綿者只是肺邪咳嗽之病有孝服之憂黃色見於鼻乾燥若土偶之形為脾氣絶死若如桂花雜以黑暈只是脾病飲食不快四支倦怠妻妾之纍黑色見於耳或輪廓內外命門懸壁若汙水煙煤之狀為腎絶則死若如蜘蛛網眼烏羽之澤者只是腎虛火邪乘水之病凡望五色以知其病如面青肝病面赤心病面黃脾病面白肺病面黑腎病此知病之屬也凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死面青目青面赤目白面青目黑面黑目白面赤目青皆死也凡望病人目睛不了了鼻中呼不出吸不出氣短促而冷者陰病也病人目睛了了鼻中呼吸出入能往能來口鼻息長而皆長者陽病也病人及健人黑色若白色起入目及口鼻三日中死久病人耳目及顴骨赤者五日死病人目無精光若土色不受飲食四日死望病人兩目眥有黃色起者將愈病人面目俱黃者不死病人面唇青黑者皆死望健人及病人面如馬肝色望之如青近之如黑者死聞聲聞其五音以別其病經云言而微終日乃復言此奪氣也中盛藏滿聲如從室中言此中氣之濕也困於暑汗煩渴而喘靜則多言衣被不斂言語善惡不避親疏者此神明之亂也病人五臟已奪神明不守聲嘶者死病人循衣縫譫語者不治內傷飲食勞倦症不欲言縱欲言之聲必怯弱低微乃不足之驗外傷風寒證言語必前輕而後重其言高其聲壯厲有力乃有餘之驗也凡聲嗄其言響如從甕中出前輕而後重高揭而有力皆傷風氣壅之驗也痰火咳嗽久而聲嘶啞有漸至不出聲者必死也聞病人言語無力甚不欲言氣難布息者內傷也病人言語有力動言不厭者外傷也病人陰陽俱絶失錯不能言者三日死病人妄言錯亂及不能言不治熱病者可治傷寒有狂言譫語獨語鄭聲及不能言不欲言或狂譫不休皆有虛實之別愚按凡病將死之頃必氣促似喘喉中曳鋸若有痰聲僅呼吸於人迎數寸之間蓋真陰絶於下孤陽脫於上而為魂飄魄墜陰陽睽離之候乃氣短之極也原夫氣主命門綰於右腎絶則繇腎及肝繇肝及脾繇脾及心繇心及肺至肺為宗氣諸氣之會元氣止此諸氣衝合勢盛作響亦猶水風相激而成浪湧之聲水必風恬而浪始息形因氣散而響方絶故人之生死繇氣之聚散理必然也往往醫於此際誤為火盛痰升活絡牛黃促人快覓攻痰定喘無藥不投只速其死良可慨已又有當未死之先或診色脈之虧治施救本藥投參附至其不愈垂亡作喘遂歸咎醫師謂誤服補氣致病家抱終身之恨而醫師蒙不白之冤誰有明其為元氣上脫似喘非喘似痰非痰之絶症者乎每見病中頻服耗劑臨死而亦作喘將歸咎何物耶豈知參附正納氣之要藥至病已入死法而不即死留連旬月者皆此藥之力人多不知也又有無病而頭目暈眩喉聲似喘此為氣虛暴症必脈沉伏或細如縷惟急投以大劑參附亦有生者若其六脈上脫數滑洪大或弦硬搏指兼以眼合口開手散遺尿汗泄息粗面赤如妝有呼無吸肉眼頓陷肢體厥冷則不治矣又有暴厥不省人事喉息無聲者少待氣復自蘇切勿擾動此為勞極或因盛怒中氣不升所致非元氣絶候也又有肺傷風寒痰壅作喘或牙關緊閉倘脈症相合惟投以開關散蘇合牛黃丸疏痰順氣之屬多有得愈者又有真氣久虛無病暴死其喉息無聲者此蓋非邪乃氣盡自絶也如此聞聲之診不可不詳辨也問證經曰必審問其所始病與今之所方病然後各切循其脈又曰必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所作醫工診之不在臟腑不變形軀診之而疑不知病名身體日減氣虛無精病深無氣漉漉然時警病深者以其外耗於衛內奪於營良工所失不知病情又曰診有三常必問貴賤封君敗傷及欲侯王又曰入國問俗入家問諱上堂問禮臨病人問所便慎之至也又云凡診病者必問飲食起居暴樂暴苦始樂後苦皆傷真氣又云診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒診寸口何病能中凡百病問其晝則增劇夜則安靜是陽氣有餘乃氣病而血不病也夜則增劇晝則安靜是陰病有餘乃血病而氣不病也問其晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰問其晝則惡寒夜則安靜是陰血自旺於陰分也夜則安靜晝則惡寒是陰氣上溢於陽分也夜則惡寒晝亦惡寒是重陰無陽也當亟瀉其陰峻補其陽晝則惡寒夜則煩躁飲食不入病名陰陽交變陰陽交變者死矣閉戶塞牖擊之病者數問其情以從其意得神者昌失神者亡甲乙經云所問病者問所思何也所懼何也所欲何也所疑何也問之要察陰陽之虛實辨臟腑之寒熱疾病所生不離陰陽臟腑寒熱虛實辨之分明治無誤矣難經云問病欲得寒欲見人者病在腑也病欲得溫不欲見人者病在臟也東垣內外傷辨問其發熱惡寒寒熱間作蒸蒸燥熱發於肌肉之間者內傷也發熱惡寒寒熱並作怫怫發熱皮毛之上者外感也問其口不知味飲食不下手足不和兩脅俱熱者內傷證也問其飲食知味腹中和二便如常筋骨疼痛不能動搖非扶不起外感證也問其惡風居露地大漫風起卻不知惡惟惡窗隙些小賊風是內傷證也問其鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息怯不欲言乃內傷證也問其小便頻數而不渴初以勞役得之食少小便黃赤大便嘗難或澀或結或虛坐常有些少如痢非痢或瀉黃糜或溏泄或結而不通皆內傷證也問其心下痞或胸中閉塞如刀割之痛二者亦互作而不並出有時胃脘當心而痛上支兩脅痛四肢不收無力以動而懶倦嗜臥皆內傷證也問其臍下相火之氣直上衝胸而不可遏其氣無息甚則高喘皆內傷證也問其頭痛常常有之而不間者外傷也問其痛積不移者血痛走痛不常者氣病也問其痛處按之而已者虛病按之而痛愈甚者實病問其走注則為風拘攣則為寒煩渴則為暑重澀則為濕或好於善淫或觸於驚恐或傷於飲食或深居簡出而受暑皆為受病之因所以貴於問也女科産後先問坐草難易惡露多少飲食遲早生子存亡有形傷血傷之不同補氣補血之各異飲食不節宜調中生子不存宜開鬱問其所欲以知其病如欲熱者知為寒欲冷者知為熱如好靜惡動者知其為虛煩躁不寧者知其為實惡食知傷食惡風知傷風好食甘為脾虛好食辛為肺病好食酸為肝病好食鹹為腎弱嗜食苦為心病此皆順應而易治若乃心病愛咸肺傷欲苦脾弱喜酸肝病好辣腎衰嗜甘此為逆候病輕必危危者必死治得其法服藥預防可回生昔有人病喉痛諸醫不效一醫問其平日好食斑鳩乃知鳩食半夏苗而貽毒治以生薑愈唐汝正治小兒風熱通身俱愈惟頭頂不痊問其因乳母好熱酒知其貽毒本方倍用葛根黃連而愈治法大要愚按張通一先生曰治有逆從者以病有微甚病有微甚者以證有真假也寒熱有真假治法亦有真假真者正治治之無難假者反治乃為難耳如寒熱之有真假者真寒則脈沉而細或沉而遲為厥逆為嘔吐為腹痛為餐泄下利為小便清頻即有發熱必欲得衣此浮熱在外而沉寒在內也真熱則脈有力而數滑大而實為煩躁喘滿為音聲壯厲或大便祕結或小利赤澀或發熱掀衣或脹疼熱渴此皆真病真寒者宜溫其寒真熱者直解其熱是皆正治者也假寒者陽證似陰火極似水也外雖寒而內則熱脈數而有力或沉而鼓擊或身寒惡衣或便熱祕結或煩渴引飲或腸垢臭穢此則惡寒非寒明是熱證所謂熱極反兼寒化亦曰陽盛隔陰也假熱者陰證似陽水極似火也外雖熱而內則寒脈微而弱或數而虛或浮大無根或弦芤斷續身雖熾熱而神則靜語雖譫妄而聲則微或虛狂起倒而禁之即止或蚊跡發斑淺紅細碎或喜冷水而所用不多或舌苔面赤而衣被不撤或小水多利或大便不結此則惡熱非熱明是寒證所謂寒極反兼熱化亦曰陰盛隔陽也此皆假病假寒者清其內熱內清則浮熱退舍矣假熱者溫其真陽中溫則虛火歸原矣是當從治也又如虛實之治實則瀉之虛則補之此不易之法也然至虛有盛候則為假實矣大實有羸狀則為假虛矣總之虛者正氣虛也為色慘神疲為神衰氣怯或自汗不收或二便失禁或夢寐精滑或嘔吐隔塞或病久攻多或氣短如喘或勞傷過度或暴困失志雖外證似實而脈弱無神者皆虛證之當補也實者邪氣實也或外閉於經絡或內結於臟腑或氣壅而不行或血流而凝滯必脈病俱盛者乃實證之當攻也然而虛實之間最多疑似有不可不辨其真耳如通評虛實論曰邪氣盛則實精氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其正而補之乎抑先其邪而攻之乎見有不的生死系之此所以宜慎也夫正者本也邪者標也若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸虛生則措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從多從少寓戰於守斯可矣此治虛之道也若正氣無損者邪氣雖微自不宜補蓋補之則正無預而邪反盛適足以藉寇兵而資盜糧故治實證者當直去其邪邪去則身安但法貴專精便臻速效此治實之道也要之能勝攻者方是實證實者可攻何慮之有不能勝攻者便是虛證氣去不返可不寒心此邪正之本末有不可不知也惟是假虛之證不多見而假實之證最多也假寒之證不難治而假熱之治多誤也然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而余續之曰氣不足便是寒故虛能受熱世有不明真假標本而曰知醫者余則未敢許也
