body:
  text: 卷之五治驗醫案下雜病門愚按傷寒為外感雜病為內傷今昔諸賢論之詳矣譾劣如余不必復贊一詞也雖然外感由於六氣外侵內傷由於五臟自病愚以為六氣之入未有不先於元氣虛弱以致衛氣不能衛外而任邪氣侵衛營氣不能營內而任邪氣攻內也勞倦不能耐則肺之元氣虛思慮不能周則心之元氣虛飲食不能運則脾之元氣虛智謀不能決則肝之元氣虛精血不能充則腎之元氣虛此五臟之內傷也夫人一身陰陽表裡經絡臟腑總由一氣貫通故氣實則五臟亦實皮毛便固六氣難侵氣虛則皮毛並虛六氣雖不入而五臟自生招感古人謂肝虛風自生腎虛寒自生義可見矣顧安得以陰陽表裡經絡臟腑而岐視之乎奈何學者不察乃以外感內傷分為兩科是將分一人而為兩身則天地可不必交泰水火可不必既濟人身氣血便不必相依附矣於是專傷寒者昧於雜病專雜病者昧於傷寒一遇傷寒似雜病者治以雜病之藥雜病似傷寒者治以傷寒之藥不幾謬妄顛倒殺人反掌乎此古今所通病而緩扁所莫療余曰治固可分而術則當兼習者也留心斯道者識之勿以為業不專門者不精命門火衰陽氣脫陷症甲申季春侍御曾警炫次子奕昭年四旬素戀幃幕復因喪子悲鬱病兩載治療增劇至念七日延余見其面黯無光頭顱俯垂或語微喜睡飲食少思或兩足痿軟大便滑泄小水清利外症則頭瘡未愈脈六部沉遲不鼓左關沉澀左尺兼緩脾脈亦弦此為陽虛已極法應益火之源以消陰翳及閲所服方案大都皆歸芍棗仁苡薏威靈仙黃柏知母諸品余曰病本起於肝腎兩虛即勤加峻補猶慮不濟奈何反以苦寒敗胃滑腸耗氣之物大泄真陽乎夫面黯無光頭顱俯垂乃陽氣不能上溫而復下陷也語微喜睡乃陽氣不能升發也飲食少思乃脾敗於寒劑而胃氣虛寒不能健啖也兩足痿軟乃筋脈緩弛肝氣不收也二便滑利乃命門火衰不能溫土腎氣虛寒不能約液也瘡口不合乃脾氣敗也脈沉遲不鼓則為元氣衰左關沉澀受克於金右關弦受克於木左尺虛緩則為土克斷以季夏初秋當不起與其弟奕遠言曰脈見三克若不急治何以回生備開一案與之為券余用補中益氣湯去升麻陳皮倍人參加桂附炮薑骨脂五味與服四劑泄數漸少脈亦稍健仍授方以八味丸去澤瀉加人參炙草阿膠五味諸品彼已市藥待制其乃內以余所開醫案往詢前醫醫謂余妄用燥藥仍依前治至六月十二日而歿乙酉季夏姻家陳泰宇年逾六旬病虛喘吐痰自汗倦臥不進飲食多食便嘔小便清長大便滑泄面青黯形肉日脫脈左三部虛浮無力右關尺弦小余以為命門火衰陽氣脫陷真藏脈見逢土堪憂勉進六君加薑桂丸八味初劑症亦減數劑如舊遂輟服至月終漸篤仍投前藥一二劑越次月初四日復再延餘脈益少胃氣用大劑參耆朮歸桂附毫不應斷以越三旬當歿令二子備後事彼別延一醫病餘用桂附誤認為痰火實症投清氣化痰麥冬栝蔞之類初服頓覺胸次豁然連三服竟完穀吐出益增昏瞶且勒金酬券再請陳雪潭用益土藥猶庶幾近之即知補母亦遲不及事果以是月念八日而終先是五月內過余求診令急服補藥乃因循增劇始延治晚矣愚按前症乃命門火衰不能生脾土以致脾土不能生肺金夫多食便嘔形肉日脫自汗吐痰大便滑利皆土敗金虧真藏為患此時即恪服虛則補母之劑猶慮不濟奈何誤認為實則瀉子而用清金安得不速人於斃乎又每見世醫一遇痰症不分虛實執以為火動手便攻而病家亦甘心自誤然痰有熱痰寒痰風痰濕痰酒痰血痰氣痰驚痰食痰老痰新痰有屬腎津上溢脾液上湧泛而似痰者鬱火上升者屬飲屬涎若咯若唾若咳若吐病源非一皆不可不詳為辨仍察其所兼何症此為第一吃緊庶幾施治非謬即吐痰一症未有不由於元氣虛寒命火衰微所致投以四神八味之屬急資化源或克有濟者敬附録先哲經驗數案於後取其大法以告世之醫病兩家治病當求其本勿徒徇現在之症而漫投不切之劑抑亦以破時師拘攣之見按薛立齋先生曰一儒者雖盛暑喜燃火四肢嘗欲沸湯漬之而面赤吐痰又似實火吐甚宿食亦出惟食椒薑之物方快余謂食之反出乃脾胃虛寒用八味丸及十全大補加炮薑漸愈不月而康又曰工部陳禪林發熱有痰服二陳黃連枳殼之類病益甚甲辰季冬請治其脈右尺微細右關浮大重按微弱余曰此命門火衰不能生土而脾病當補火以生土或可愈也不悟仍服前藥脾土愈弱至乙巳閏正月病已革復邀治右寸脈平脫此土不能生金生氣絶於內矣辭不治經云虛則補其母實則瀉其子凡病在子當補其母況病在母而屬不足反瀉其子不死何待又云光祿鄺子涇面白神勞食少難化所服皆二陳枇梔枳實之類形體日瘦飲食日減余謂此脾胃虛寒之症法當補土之母彼不信乃徑補土以致不起又云表弟婦咳嗽發熱嘔吐痰涎日夜約五六碗喘咳不止胸滿燥渴飲食不進崩血如湧此命門火衰脾土虛寒用八味丸及附子理中湯加減治之而愈又云羅工部仲夏腹惡寒而外惡熱鼻吸氣而腹覺冷體畏風而惡寒脈大而虛微每次進熱粥甌許必兼食生薑甌許若粥離火食腹內即冷余曰熱之不熱是無火也當用八味丸益火之源以消陰翳彼反服四物玄參之類而歿又云一儒者體肥善飲仲秋痰喘用二陳芩連益甚加桑皮杏仁盜汗氣促加貝母枳殼不時發熱余以為脾肺虛寒用八味丸以補土母補中益氣湯以接中氣而愈又云都憲孟有涯氣短痰暈服辛香之劑痰盛遺尿兩尺浮大按之如無余以為腎家不能納氣歸源香燥致甚耳用八味丸料三劑而愈又云一男子素厚味胸滿痰盛余曰膏粱之人內多積熱與法制清氣化痰丸而愈彼為有驗修合饋送脾胃虛者無不受害又云先兄體貌豐偉唾痰甚多脈洪有力殊不耐勞遇風頭暈欲僕口舌欲裂或至赤爛誤食薑蒜少許口瘡益甚服八味丸及補中益氣加附子錢許即愈停藥月餘諸症仍作此命門虛火不歸原也以上十條蓋立齋先生治命門火衰吐痰虛症也其治陰虛諸痰亦晰治甚良夫先生一代醫聖千載宗工叨僥武世兩廟宸眷最渥時工部陳禪林光祿鄺子涇羅工部諸君尚違先生之治甘心任時師攻伐喪生余可知矣自王節齋老痰丸王隱君滾痰丸之論一出舉世爭相豔習不顧敗胃瀉陽無辜生靈殞命於二王作俑可勝哀悼然二王之法只可投於元氣壯實積熱為患者暫用亦得見效也故汴督學西衢葉敬君先生序類經文云余初與景嶽交自癸卯歲始余以苦心誦著耗脾家之思慮兼耗腎家之伎巧於是病泄瀉者二十年醫家咸以為火盛而景嶽獨以為火衰遂用參朮桂附之劑培命門之火而吠者競起余獨堅信不回服之五年不輟竟使前病全瘥而脾腎還元余之敢於多服者膽力之決斷也景嶽之敢於多用者識力之明透也非景嶽不能有此識非余不能有此膽余兩人之相與亦奇矣嗟乎欲治命門而舍桂附非其治也而先生所云吠者競起則時名諸醫竟不知命門為何物乃謂久瀉屬火盛謬滋大矣而余之治曾奕昭陳泰宇以補母之藥反貽同道之誚不亦宜乎夫先生以吠喻時名之醫雖其言固太峻而揆之情理殊為恰當但愚以為應用桂附而不用桂附與不應用桂附而妄用桂附皆吠之屬也應用而不用則為膽小無識而誤人不應用而妄用則為膽大逞臆而害人誤人而因循致死與害人而逼迫隨亡均有罪耳今之醫者不明陰陽水火虛實真假之義而只見病治病縱巧可獵虛聲術足弋實利口給求售喜動王公架列百氏之書日應千人之請吾恐開口便錯庸妄取罪不能免已陶節庵有云殺人不用刃者政此謂歟大要病之輕而緩者固可投以和平之劑優遊取效而症之重而速者生死呼吸亦猶迂緩漫視坐失機宜可乎臨病之工不可無此一假膽識庶無負司命之責云爾甲申孟春萬兵周開夫年逾六旬初因齎捧之役修途中濕歸病瘡瘍延外科投清火寒劑竟至敗胃便脫方悟服益火藥漸愈嗣因奉委夜巡復感風寒嘔痰少食請余診視六脈弦實右關尺弦細余曰此非痰乃脾氣敗而津液上脫也斷以難越三月至二月中旬果歿愚意瘡瘍諸疾悉屬臟腑有傷顯症於外故薛立齋先生謂十三科皆是一理因見外科之醫固執局方不循表裡虛實經絡臟腑之宜而誤人者衆遂大發所蘊皆內外合一之道對症處方隨手而愈世人奈何視瘡瘍為纖疴不顧虛實輕服涼劑甘以性命陷於粗工之手可不戒乎壬午冬猶子望久患疥瘡頻年治療不瘥一瘍醫令吞水火丹正在升煉余見之曰用此將求死乎夫水銀性至沉寒假以烈火煆煉轉為燥毒之物柔弱腸胃能堪此銷爍耶若輩謬妄傷人即寸磔不足以盡其辜矣余教服六味丸不終劑而愈此蓋立齋先生治法也諸家方書皆指疥癬為陽明經濕熱之病獨先生則歸本於足少陰謂系腎經虛熱所致如此卓識洵越千載而上之矣癸未夏連參天從母一婢足面生瘡經年恪服解毒寒劑且令足心頻踐磚石竟不斂口余見其頭傾面黯謂連曰死期近矣察其脈症胃敗便脫斷以入秋當歿已而果然大都一切瘡瘍皆屬足三陰血虛所致至瘡口不合乃脾氣敗也縱初起毒盛熱熾察果體實氣旺消解涼藥只宜暫投少俟熱勢稍退即當以益氣補血健脾為主脾氣充則肌肉自生陰血旺則舊瘀自消無有不瘥何至喪生癸未春慶城鄭姻親之內年逾四旬懷抱鬱結嘔痰少食胸腹疼脹雖盛暑猶裹首著綿六脈浮結或時煩渴不寐余曰此命門火衰元氣虛寒症也投以六君加薑桂及八味丸與服彼能恪遵余法不惑於衆論周兩月而諸症全瘥左腎水衰陰虛發熱症甲申首春連翔梧年逾五旬素多姬妾持籌鹺務心腎兩虧發熱唾痰陰痿足軟頰紅肉脫腸結便清脈左浮緩無力右亦洪大不勻先數醫治以款冬麥冬橘紅石斛貝母之屬日嗽痰十餘碗神倦增劇余曰此為鍾情枕席久竭精血病以漸致其嗽而發熱者乃腎水枯火無以制因而升克肺金若痰則腎液上湧不能四布非出於脾也頰紅者火灼肺而外徵也肉脫者脾氣衰火不生土也脈肝腎浮緩此為受克於金土勢應不起獨是胃氣未敗飲食如常尚猶可救但非恪服二百餘劑不能見效法須壯水之主以制陽光用六味丸減澤瀉加人參龜膠炙草等藥服數日痰嗽頓減日只碗許體不甚倦至四十餘劑病固未減症亦未增余曰杯水車薪安能驟愈須寧耐久服藥力既足病魔自解耳彼不信別延數醫皆力任以為投十餘劑可愈甫兩服而唾痰如湧胸膈脹悶察之乃瓊玉膏大都皆甘寒瀉火之藥始信余言復再延治余曰此症本入死法初尚恃天生一線胃氣留連未斷為之少延殘喘今敗於寒劑土氣將絶無能為矣入秋當殞辭不治別請張明卿張謂連參天曰諸痰屬脾非出於腎怪余創言腎經有痰連語及傳示以立齋醫案始無辨又刺余曰若依立齋法治虛癆當無功余隨轉一語曰憑丹溪尚有罪耳張僅投以四白散之物固知命在垂亡藥石難蘇第立齋法最善未可輕詆也翔梧至八月十四日果歿余為備悉始末以告同患再録立齋陰虛治驗於後立齋曰愚按虛損之症設若腎經陰精不足陽無所化虛火妄動以致前症者宜用六味地黃丸補之使陰旺則陽化若脾虛不能生腎陰陽俱虛而致前症者宜用補中益氣湯六味地黃丸培補元氣以滋腎水若陰陽絡傷血隨氣泛行而患諸血症者宜用四君加當歸純補脾氣以攝血歸經又曰凡男子少年色欲過度先見潮熱盜汗咳嗽倦怠等症此屬足三陰虧損虛熱無火之症故晝發夜止夜發晝止不時而作當用六味丸為主以補中益氣湯調補脾胃若脾胃先損者當以補中益氣湯為主以六味丸溫存肝腎多有得生者若誤用黃柏知母之類則復傷脾胃飲食日少諸臟愈虛元氣下陷腹痞作瀉則不可救矣又曰秋官張碧崖面赤作渴痰盛頭暈此腎虛水泛而為痰用地黃丸而愈又云若腎虛陰火炎上宜用六味丸若腎氣虛寒痰上湧用八味丸若因肝腎陰虛而痰中有血者宜用六味丸若腎氣虧損津液難降敗濁為痰者乃真藏之症宜用六味丸為主腎氣既壯津液清化而何痰之有哉又云大凡潮熱發熱晡熱者五臟齊損也宜用六味丸氣血虧損者須用十全大補湯又云大參李北泉時唾痰涎內熱作渴肢體倦怠勞而足熱用清氣化痰益甚余曰此腎水泛而為痰法當補腎不信另進滾痰丸一服吐瀉不止飲食不入頭暈眼閉始信余用六君湯數劑胃氣漸復卻用六味丸月餘諸症悉愈又云上舍陳道復長子虧損腎經久患咳嗽午後益甚余曰當補脾土滋化源使金水自能相生時孟春不信乃服黃柏知母之類至夏吐痰引飲小便頻數面目如緋余以白朮當歸茯苓五味陳皮麥冬丹皮澤瀉四劑乃以參耆熟地山茱為丸俾服之諸症頓退復請視余以為信遂用前藥如常與之彼仍泥不服卒致不起庶吉士黃伯鄰發熱吐痰口乾體倦自用補中益氣湯不應余謂此金水俱虛之症兼服地黃丸而愈一男子腿內作痛用滲濕化痰藥痛連臀肉面赤吐痰腳跟發熱余曰乃腎虛陰火上炎當滋化源不信服黃柏知母之類而歿又云按內傷發熱者因飲食過時勞役過度而損耗元氣陰火得以乘其土位故翕翕然而發熱宜用補中益氣湯以升其陽若因勞力辛苦入房不節虧損精血虛火妄動而發熱者宜用六味丸以補其陰不可認作有餘之火而用黃柏知母之類也又云舉人陳履貞色欲過度丁酉孟冬發熱無時飲水不絶遺精不止小便淋瀝或用四物芩連之類前症益甚更加痰涎上湧口舌生瘡服二陳黃柏知母之類胸膈不利飲食少思更加枳殼香附肚腹作脹大便不實脈浮大按之微細余朝用四君為主佐以熟地當歸夕用加減八味丸更以附子唾津調搽湧泉穴漸愈後用十全大補湯其大便不通小腹作脹此直腸乾澀令豬膽通之形體殊倦痰熱頓增急用獨參湯而安再用前藥而愈但勞發熱無時其脈浮洪余謂其當慎起居否則難治彼以余言為迂至乙巳夏復作乃服四物黃柏知母而歿以上十五條舉其大略乃立齋先生治陰虛唾痰諸症勞損之方法也先生治必求本滋培化源迥與今古諸氏不同高明之士欲曾其全須察其全案可也消症甲申冬連參天患勞力感寒腎脈獨遲余投以溫經湯加薑桂三劑得愈令其且密室靜持越三日因鹺務勞郁遽病中消每日倍飯不飽食少遲則嘈雜如欲嘔血狀意疑前劑加薑桂太燥余曰此因病虛肝火侮脾故獨中焦受爍但兩尺仍遲非可以消劑治也不信一醫以前湯加麥冬白芍雖消症頓瘥飲食如常其大便又至滑泄再延豫治令其恪服歸脾湯加桂附骨脂吳萸至十劑泄止始大安則消亦有寒者余稽百氏方書咸言三消悉屬火病治須涼劑至內經氣厥論曰心移寒於肺飲一溲二死不治可見少飲多溺及老人陽虛夜溺無度皆寒消肺腎金水衰竭之病而世鮮有知之者附張景嶽治一消症於後以廣俗眼張景嶽曰豫嘗治一縉紳年逾四旬因案牘積勞致成大病神困食減時多恐懼上焦無渴不嗜湯水或有少飲則沃而不行然每夜必去溺二三升莫知其所從來且半皆濁液最後延余診視因相告曰自病以來通宵不寐者已半年有餘即間有朦朧似睡之意必夢見亡人凶喪等事鬼魅相親其不免矣余曰不然此以思慮積勞損傷心腎元陽既虧則陰邪乖之故多陰夢陽衰則氣虛陽不帥陰則水不化氣故飲水少而濁溺多也陽氣漸回則陰邪自退此政內經所謂心移寒於肺飲一溲二之症耳病本非輕脈猶帶緩肉猶未脫胃氣尚存可無慮也乃以歸脾之屬去白朮木香八味之屬去丹皮澤瀉一以養陽一以養陰出入間用至三百餘劑計人參二十餘斤而後全愈此非神消於上精消於下之症乎可見消有陰陽不得盡稱為火症姑記此一案以為治消者之鑑噫景嶽其神於治乎腎虛遺精甲申秋孝廉曾奕乾次子患遺精三年百治不瘥六脈滑緩無力余曰此腎氣下陷脾虛不能約水諸醫拘執方書療以固澀之藥是治其末而忘其本也余以補中益氣湯去柴胡陳皮加五味阿膠熟地石棗等物投兩劑即止仍制加減六味丸與服絶不用龍骨牡蠣金石剽悍之屬金櫻粟殼壅塞隊道之物徒傷腸胃經絡耳余每治此症率用前藥為主量加增減無不愈者脾胃虛熱病濁甲申季夏漳庠林震伯素善飲因修途勞頓飢飽失時覆冒暍病白濁經月不瘥余察其前治非辛涼瀉火則滋補壅塞遂致小腹脹悶或氣喘拒食六脈滑數無力余曰此中宮虛熱津液下陷膀胱氣化不能分泌以歸脾湯去棗仁木香加炒梔半夏車前黃連服七劑濁止便清神思逸爽夫遺精悉屬腎虛濁症多屬脾熱治法固殊然亦有寒熱虛實之別脾胃積熱病濁甲申仲春一健卒甫三十素善飲喜啖辛香病濁竅痛余以二陳湯加芩連龍膽赤芍車前投兩劑即止如此實症本無難治若概施補必變他症腎虛遺溺症余猶子知白一兒年十三四每夜尚遺溺一二次余曰此腎氣虛弱不能約液也令服六味丸去澤瀉丹皮加五味遠志鹿膠服數月前症頓瘥且復英爽諸失血愚按失血諸症經書論之詳矣然而有五臟六腑之殊陰陽虛實之分升於上屬陽為逆脫於下屬陰為順出於肺者為咳血為嗽血為衄血出於心者為勞血為舌血出於脾胃者為吐血嘔血出於肝者為鬱怒吐血出於腎者為咯血為唾血出於皮膚毛孔者為溢血此皆陽火挾血以上越也溺血則主膀胱也淋血則主小腸也痔血則主胃經也便血固主大腸有屬風邪下陷者有屬鬱火侵脾者有屬濕熱傷脾者有屬積熱滯下者此皆陰火爍血而下行也又有熱入血室寒襲衝任則為蓄血又有寒傷經絡而脫陷則為無火之症也在婦人暴脫則為崩徐滲則為漏胃虛而濕熱乘之則為赤帶從生戶而出者方為崩為漏為帶從大小便而出者雖治法與男子同而得於胎前産後半産小産之中則又不同也若暴吐暴衄暴崩不止則為孤陽絶陰氣血兩敗也亦當察其老壯虛實以決生死論其方法有易治者有難治者有不治者有不治而自愈者有錯治而變他症者有久治不愈而喪生者有獨見血症者有兼他症而並見者悉當察病原之淺深年力之衰旺六脈之宜忌與元氣之虛實寒熱法有必中劑無妄投躋夭札於壽域庶幾得之矣若以為屬火屬熱一概混用涼劑澀劑在治實火實熱則可而屬虛火虛熱與無火無熱之症未有不敗胃傷脾絶生化之源而速人於死者可勝道哉大都失血之脈宜沉細濡弱或浮沉和緩或洪大不數或浮沉滑緩或虛微或暴吐暴脫而六脈俱伏此脈與病合則為易治或見浮芤浮革或浮沉皆澀或結或短此脈屬虛而病屬重則為難治治得其宜亦多有痊者如見浮數洪數或細數不鼓或浮大而散或促代無力或如滑而無胃氣或弦牢或實大或細小徑疾此病與脈反則為不治縱有盧扁亦為之束手矣故經雲陽道實陰道虛越人曰耍為虛牢為實失血者脈宜沉細反浮大而牢者死虛病見實脈也夫血濡脈絡體主陰靜血未失則脈絡濡軟而和緩及火熱迫血外溢真陰耗竭則成陰絶陽亢火充空舍而見實脈致孤陽用事豈能獨生哉又須以色為診凡失血之後或面色帶黃青白有神或目瞑合喜睡或肢體溫和飲食如常或不喜高聲聲微不厲此為順無別刑剋症候稱易治若其面色青黯無光或兩顴暴赤唇口如朱或乍起乍眠煩躁不寐或身體大熱或四肢厥逆或氣喘息粗或揚聲厲語或譫狂神昏或循衣摸床肉瞤筋惕或自汗如雨頭汗獨見或周身厥冷顱囟獨熱或眼眶暴陷或口渴思水或肢體腫䐽或臍腹絞痛不休或胃氣已敗嘔吐拒食此皆凶候不治也又當以血之色而論將水試之浮於上為心肺血沉於下為肝腎血不浮不沉主脾胃中州之血此特大概然耳肺血色淡有沫心血赤如塗朱脾胃乃多氣多血之經其色不淡不紫其質不清不濃肝血濃濁結塊腎血則夾痰紅一縷或色粉紅此為金水枯竭肺腎俱損而待斃又有肝腎兩敗始由腎炎水涸繼因肝火獨熾而結塊凝重暴吐不休者為不治大腸便血則當察其屬便先為舊瘀屬便後為新脫與小腸膀胱溺血淋血亦當詳其多少清濁至吐衄而口鼻俱出者則為下厥上竭之症及痢血而青黯如苔者此肝臟已敗皆不治也婦人諸血亦當視其多寡清濁診脈虛隨症施治故經云至微者理至顯者衆根於中而微於色不容不辨也其治之之法有經治者余列其醫案於後未經治者余詳其臆説於中隨症參解庶無遺法亦無枉死肺脾陽虛哮喘嗽血甲申春舍親鍾玄珠素患哮喘面目青白體羸惡寒冬劇夏愈遇勞益甚初服溫劑尚得痊可輟藥年餘因郁復發哮喘不休唾血淡黃有沫余察其六脈浮滑緩弱謂屬陽虛應須六君主治彼惑於衆論指為陰虛唾血恪服清火滑潤之劑前症不減幸喜鰥居元氣尚實第臥箸每厭肥甘胃氣不無暗損心腎虛勞吐血甲申孟秋晦夜社友鄭去華季郎英年弱質藝窗勞苦復戀幃幕患前症經治數月增劇延余診視察其面色嬌紅喉喘有聲六脈滑數無力及詢前方乃用犀角地黃湯倍黃連余曰此為根搖葉枯心腎兩虧之症若初治得用純甘至靜壯水固脾之劑尚猶可救而乃以療胃經實熱吐血之藥混治虛勞吐血寧不敗胃傷生余議每劑用人參一兩為君佐以養血滋腎藥數品倘得服十餘劑脈症漸減庶幾可治彼意以余言為妄次日別延仍治以苦寒止塞之劑血頓止至八月二十五日而歿嗣後去華抵云間訪內侄太守陳謙夫因晤名手李士材談及乃郎前症謂廣延救治獨有敝社蕭友令余每劑投參一兩余疑不用李曰此症乃陰陽兩虧心腎將敗每劑須參二三兩方能納氣歸原引血歸經蕭固知用參而僅投一兩必遲奏效去華歸因以告余又以李刻醫宗必讀一書示余不謂六合寥廓之內亦有臭味同氣之士是先得我心者也李號士材諱中梓其先人官吏科君亦明經薄仕而隱於醫博洽洞曉具有絶識閲其所刻僅五册詞簡而明法精以詳允為當世正法眼余婆心熱腸每欲遠訪參印疑義而苦為兵戈梗道有志未遂俟之他日耳其前書當附驥於立齋先生而凌駕於劉朱之上余期鳩工重梓以廣其傳先為摘出以告同患者肺經風熱咯血甲申季春吳門表侄婦脾胃素熱因冒感風邪目澀鼻乾自用薑湯連三晨咯血數口又恣飲藕湯益增煩脹夫所謂外感者從外而入必令從外而出薑湯獨力既難奏效藕湯涼澀復閉外邪用解表劑人芩連天花粉一服即愈胃經積熱吐血癸未夏內弟陳克輝英年氣盛連宵痛飲復啖炙爆數日胃口嘈雜嘔血碗許脈洪緩有神無別兼症投以犀角地黃湯入天花川連連三劑仍令恣飲藕湯得全愈切前湯寒涼瀉火本以治脾胃實熱積熱之症效如桴鼓時醫不知謂其有驗輒移以治虛勞失血遂致敗胃瀉陽陷人死地猶然不悟豈知年有老壯體有虛實症有寒熱隨宜施治自當奏效其可一概混投乎脾腎兩經虛寒下血甲申夏庠友林鼎萬長女適余內侄陳昌元者年甫二十元氣虛寒面色青白肢體頻冷嘔痰飽脹小便清利患大便脫血數月不瘳脈沉伏如無著骨重尋方見蠕動余曰脈症相符此藏氣虛寒脫血也投以十全大補湯去川芎白芍加熟附炮薑少佐升麻僅服四劑便血頓止神思健爽胃強亦喜納食若以為此症屬熱妄投寒劑必無幸矣脾胃兩經久虛便血戊寅中夏因訪東膠殷州守與其同年朱明社孝廉同居停余見其面色青黃日數赴廁因詢之朱曰初為感寒過飲薑湯患內熱脫血隨治以芩連寒劑即愈及秋北上勞頓復發依前方修服至次劑拒吐不納遂輟藥惟茹淡靜攝兩旬方瘥頃為荒途寇警驚勞仍作歷今三月且復倦怠增劇延數醫皆力言須投寒劑畏而不敢從餘脈之六部皆沉緩濡弱此亦易易治耳但須廣費杖頭朱曰得三載沉疴頓瘳何惜銖錙且圓珠環以酬明德余曰公始受辛熱投以苦寒對症之劑宜乎即愈矣但熱氣雖消而廣腸血竅尚未斂合故每遇勞輒發夫勞則傷脾脾傷便不能統血以致下陷循故竅而出實因於勞非出於熱也因憶楊仁齋有云病久熱衰則尊症不得為熱明矣奈何執投前劑苦寒敗胃夫安得不吐及病三發而元氣愈虛是以愈虛愈脫愈脫愈虛淹延歲月而增困也治須純王至靜固中滋補之劑方可搏刮生機耳朱遽起席拍案大呼曰得公數言便足起吾膏肪奚翅藉籠中之授乎吾三年中歷遊秦楚齊梁遍訪炫名諸醫並未有如公之從本源發揮者余以熟地為君參耆歸術為臣丹皮炙草五味知母茯苓阿膠等藥為佐引用柴胡升麻為丸與服仍令兼飲歸脾湯略用加減兩旬血減半胃氣漸健逾月面轉紅潤諸症如失及臨別厚遺金帛余峻辭不受曰投歡傾蓋誼重金石濟人盛事敢望報乎後聞主鹺林金粟長郎年尚英壯亦患前症歷延名醫皆治以涼血清火之藥歲久彌劇每斤丸劑尚加川連至四五兩竟至敗胃瀉陽而死可不痛哉余以世誼往吊始悉其詳雖方書有云脫於下者屬陰為順若如此錯治是反逆矣脾肝腎虛損吐血甲申春王芝提先生次郎則奚素喜怒屢患血症仍不守禁且戀帷幕面色青黯骨蒸潮熱因數宵劇飲僮僕忤意怒火升炎迫血暴嘔初療不愈越四日延余察其六脈弦硬且少胃氣謂此症須參或可救彼疑不服姑投以靜血順氣平緩之劑四服每旦僅唾血數口喘脹亦平余曰症雖漸減脈全未復非遵用葛可久獨參法必無瘥理但恐尚遲耳彼始驚悟緣杖頭偶乏索逋於鄰友不能即應拍案嗔呼血復上湧不止時在坐邵是龍善脈亦謂金水已敗法在不治至夜而歿心肝腎虛損淋血癸未春郡司馬朱六間公年五旬艱嗣不慎酒色飲食起居失宜面目青黯怒則暈眴大便祕塞脫血小便淋血如割屢治皆清火通淋之劑反加劇脈沉遲兩尺帶澀余曰此乃腎水枯竭不能滋生肝血遂致虛火上炎移熱二腸迫血下竄因而隊道瀝枯妨礙升降故每欲便塞疼難堪須用甘溫之劑滋益化源補養肝木使陰血盛則津液充而淋祕自解矣公曰善向未有談及此者令投補中益氣湯去柴胡倍人參加牛膝少佐肉桂丸用加減八味入人參蓯蓉遠志服逾月漸次而愈心脾鬱熱淋血壬午孟秋余因訪寧庠林馨公會間有同社鄭友者云經月病魔侵纏不堪屢治罔瘥詳言乃知患淋余曰淋症有虛實寒熱之殊今公年未三旬元氣充實而修途勞暍飲食不調復喜火酒脾受積熱矣時當炎令丁火司權丙火協應故心移熱小腸五火因而內灼上肺燥口渴下腎燥淋結前劑八正五淋只專治淋而未知清水上源滋益肺金故不效授以二陳小柴加龍膽知母麥冬木通一方與服首劑知減數劑全愈未幾入闈神思爽然前湯小柴龍膽乃清肝火之劑肝為心之母未有母安而子不靜之理況龍膽善治實熱諸淋敷功極速若人參知母麥冬黃芩皆益水上源清金潤燥之要藥也木通雖曰通淋引藥入心不止散小腸結熱耳佐二陳則使健脾而速於運行藥力也心肝腎三經勞郁吐血甲申孟春連友蜚天素體孱弱喜親藝案便赤夢遺燈宵競逐觸事忤意遂患前症嗽痰甚多初療降氣清火之劑不瘥至二十一日延余診視脈兩寸洪大虛闊關尺浮緩無力余曰血症本非難治但元氣虛脫上浮肝腎皆得克脈幸喜不數然須久服參耆純王之劑方得平復若用苦寒錯治必至成瘵議以加減八珍湯彼疑參難療血仍延前醫及二十四日增劇復再延余投以前議藥四劑唾血遂止經旬潮熱亦減惟脈未復每多言痰嗽不止少勞夢遺頻作余曰心腎不交陰陽虛極必經年勿輟良劑自可奏效始信余言恪守禁忌計復過丸劑七斤湯劑八十餘帖而愈至酉春乃兄延余蜚天亦以脈求疹察其六脈相生和緩有神兩尺沉實當主有喜蜚天曰已得孕兩月矣至秋果舉一子又同時有西關外陳子珍庠生亦患前症因療數月不瘥至四月十一日延余察其病源脈症皆與連蜚天相同余議投參朮熟地主治彼謂血無補法熟地性溫參朮助火誤服寧不喪生反生議誚仍照前醫治恪服苦寒清金之劑經年漸篤至次夏嘔血不止又用止塞之劑致腸結脹痛逾旬濱死別請瘍醫令其刀刺肛門潰膿數盂而歿脾肺腎積勞便血癸酉夏家大人署臨邛因較生童邀學博彭豫白先生衙齋閲卷余得與促膝談歡五晨夕先生嘗以病脫血為苦嘆屢治不瘥察原委蓋為素下帷誦著無間寒暄積勞所致余以為勞傷脾肺即腎家伎巧亦為之竭矣問曰得無遇事過極時而火熱升燎首面乎先生曰政苦有此兼症疊投芩連清火之劑漫不應法幾窮矣脈之六部沉緩投以六味加五味肉桂人參一丸方先生復云血症可投溫劑乎余謂其脈沉緩屬虛寒非溫劑不能愈血症也仍陳以薛立齋醫案始信服初只每日服錢許越數期漸效乃增至數錢經三月五載沉疴頓瘳嗣登甲戌第司理漳郡家大人以丙子歲歸田先生邀抵官衙余亦往從款洽逾昔詢前症不作猶服六味方無間云産後吐血崩血癸酉仲冬時在益郡署中先室分娩受寒胎衣不下血潰盈盆越七日因怒嘔血少止復暴崩如湧兩眼瞑合四肢冷厥不省人事脈六部沉代勢屬危急余即以人參二兩為君黃耆歸身附子炙草各二錢為佐入山漆三錢武火促煎仍請蜀藩良醫胡君商治胡至疹視曰脾為統血之原今肝木凌土固中斂血須加白朮余如言治之藥半晌目轉氣舒脈復漸蘇至十三日肢體忽腫又治以十全大補湯去芎芍加炮薑七劑始退再延胡君議修補養之劑胡曰前症真陰暴絶已入死法今倘勤加調攝勿輟良劑亦可少延數年自是冬而歷甲申季夏一十二載經水斷絶盛暑猶著綿衣暫離參數日便病暈眩喘脹計服過人參十五斤有奇丸劑五十餘斤湯藥千五百帖而終不免於一死只因數載以來俯仰乏資參難裕置至甲申仲夏余緣洪江之行復觸事火升作渴誤嚼荸薺數枚遂患格症食入即吐胃氣遽絶日只飲水碗許絶谷四十九日而歿歿時肌體豐潤如生可知參功纍積造命非小每恨需參難繼殗殢枉死致令結髮參商哀腸寸斷余幾無以為生矣産後蓄血兼症癸未仲冬方天柱冢婦系余妻妹素勞郁將産坐草寒初數醫所投非辛發即平緩之劑漸增劇越五日延余治之察其脈症寒熱自汗喘嘔拒食燥譫不寐心腹脹痛大便裡急後重脈見結代三至一歇危篤瀕死投以參耆歸術桂附加五味升麻炙草等味彼疑未用復轉質於內兄陳青雲云亦知醫以為非此溫補之劑不能挽回始信服不終劑而熱退汗斂靜睡半日醒知索粥脹消痛減脈漸復再劑惡露始行血塊亦下三劑脈仍結余曰夜來莫非減參乎渠云果只用五分至四劑令加二錢而諸症如失夫前症寒熱自汗乃陰虛陽脫也嘔喘拒食乃肺逆胃寒也燥譫不寐乃陰寒已極而陽暴越於上也心腹脹痛乃衝任受寒瘀血停蓄也裡急後重乃脾氣下陷前醫誤以為痢則謬也脈見結代乃胃氣暴虛不能接續也若謬妄錯治能免虛虛之禍乎故丹溪有云産後須大補氣血為主縱有他症以末治之如惡寒發熱者乃血氣虛弱之極也須用大補湯治之余每遵此法以溫補療産後疊投疊中先哲法言豈欺我哉肝胃鬱熱咯血甲申季夏薑子社續絃少婦病潮熱喘嗽經水澀少每郁即見膈脹拒食遇啖辛熱咯血口乾脈弦滑微數薑以為瘵余曰甫笄陰血未充五火易動因循不治亦能成瘵投以六味地黃加炙草黃芩麥冬知母阿膠為丸服月餘諸症俱失且復舉孕肝腎鬱熱赤帶甲申春里中一寡婦甫三旬時或增寒發熱通宵不寐時或經晝昏眠呢喃獨語遇勞肢體厥冷每自用薑蔥解表遂致停熱脾胃乘虛下注而患赤帶脈沉伏若絶重按洪實搏指余以為相火蘊隆內真熱而外假寒用四物湯加黃連龍膽炒梔知母茯苓木通投八劑諸症悉平褚澄以僧尼寡婦異其治誠然脾胃積寒赤帶癸未秋衷表龔門一妾年逾三旬娩未百日恣啖生冷嘔吐臍疼病白帶月餘行經衝任冒寒發熱煩渴赤帶頻下脈沉遲無力此內真寒而外假熱之症用四物二陳加炮薑肉桂木香少佐升麻丸服閲月而愈經水先期而至有虛實之異余侄女年甫笄素體瘦實喜啖薑蒜每經行先期而至脈沉數此脾胃蘊熱迫血下行令其淡飲食用清涼之物逾後如期而至又乙酉秋連都閫嫡母年將五旬素未舉孕懷抱鬱結亦患經水先期而至頻漏不絶暈眩發熱脈見浮革無力余斷以鬱火凌脾氣虛不能攝血作虛熱論用八珍湯去川芎加黃耆續斷阿膠少佐升麻逾旬而瘥肝經暴郁吐血癸未夏里人馬思才之內年逾五旬偶因外事忤意怒火激血上越日吐數盆脈洪緩余投以逍遙散去白朮加黃連炒梔丹皮四劑即愈愚按血症多端尚有九竅血溢者有肌膚血溢者有舌血齦血汗血有顛頂出血者有從腋胯而滲者無非火傷經絡亦當察元氣之虛實施治不可偏執苦寒之劑也昔明醫呂滄洲治一人偶撥膕中疥出血如泉不止公視時已困極無氣可言脈惟尺部如絲他部皆無乃以四逆湯加荊芥防風其脈漸出更服十全大補湯一劑遂瘥又治一貴客患三陽合病脈長弦因涉海為風濤所驚遂吐血升許且脅痛煩渴譫語適是年歲運當左尺不應諸醫咸以為腎絶公曰此天和脈當無憂也遂投小柴胡湯減參加生地俟其胃實以承氣下之得利而愈若公者法無偏執藥隨人投人知寒藥之治血而不知其熱劑之回生非全識也再録立齋方論於後立齋曰愚按劉宗厚先生云榮者水穀之精也和調於五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心臟受於肝宣布於肺施泄於腎灌溉一身是以出入升降濡潤宣通者由此使然也故經雲氣主噓之血主濡之又云肺朝百脈之氣脾統諸經之血氣血為人身之橐籥也觀此多因飲食起居六淫七情失宜虧損元氣以致諸經失職不能司攝法當調補脾肝之氣使血各歸其原諸症自愈矣若潮熱咳嗽而脈數者元氣虛弱假熱之脈也尤當用甘溫調補脾胃為善立齋又云古人治血症諸方多用寒劑惟上古之人形病俱實者宜用之今之患者多屬形病俱虛治者當求其屬而主之若前症鬱熱傷肺而衄血者用黃耆益氣湯肺氣虛熱不能攝血而衄者用四君子加芎歸五味鬱結傷脾而嗽吐血者用歸脾湯胃經有熱而嗽吐血者用犀角地黃湯胃氣弱而嗽吐血者用四君子加芎歸升麻腎經虛熱陰火內動而咯吐血者用六味丸補中益氣湯怒動肝火而見血者用加味逍遙散腎涸肝火動而見血者用六味丸雖曰血得熱而錯經妄行亦有衛氣虛不能統攝榮血而為妄行者不可不察以上諸症皆屬足三陰虧損虛火內動所作非外因所致者宜六味丸補中益氣湯滋其化源是治本也其因甚多不能枚舉治者當臨症而制宜庶無誤矣立齋又云勞嗽見血等症有勞傷元氣內火妄動而傷肺者亦有勞傷腎水陰火上炎而傷肺者有因過服生地天門寒藥損傷脾胃不能生肺金而不愈者有因誤用黃柏知母之類損傷陽氣不能生陰精而不愈者凡此皆脾肺虧損而腎水不足以致虛火上炎真藏為患也治須補中益氣湯補脾土以生肺金用六味地黃丸滋腎水而生陰精否則不救乙丑歲余寓楚時適有僕婦年逾二旬每患便血醫投以藏連丸隨服隨愈先是同社一劉友貌英偉善屬文亦病便血服香連丸經歲不瘥飲食如常抵冬娶親輟前藥卻愈次夏患痢且能健啖起居不倦醫者投香連丸之劑僅四服至夜發厥而死惜哉大都積服寒劑脾氣由漸而傷及娶親後精血日耗元氣不支故遇蹶即僕理也譬如家國之亡任用匪類非陽喪於剛愎之小人則必陰敗於柔遜之姦儒禍非旦夕有由來矣再按婦人崩漏諸症雖云血熱妄行治以四物湯加芩連之屬此古今通用常法也多有先由勞傷中氣或脾氣素虛不能統血繼因邪熱迫致妄行者初起用前湯數服不止則當用東垣當歸芍藥湯補之若因循日久清氣下陷則服補中益氣湯以升舉之經雲陽密乃固先哲云血脫益氣此良法也蓋血虛須兼補氣夫血猶水也氣猶堤也堤堅則水不橫決氣固則血不妄行自然之理此方用耆朮為主所以神驗世醫不達此理拘執方書率用涼藥傷脾脾氣既弱安能固血因誤於劉守真謂諸血無寒豈知諸血無實乎無實則虛虛則不得以無寒論也故特表而正之目病最忌點洗目注精於腎浥血於肝瞳一點水也裹以薄膜精瑩遠徹生身所恃其為病也腎水虛則昏眊肝火盛則赤澀遇風寒則患瘇痛眵淚使肝腎得實縱冒外邪不能為害唯肝腎一虧不值外邪亦自生災今見世人每患目疾只勤點洗甘心受害反以內養內治為迂緩無功良可哀憫夫點藥乃用爐甘石為君也一經煆煉性燥便妨睡精矣麝香𧓍片質主辛香性善走竄經絡沖闢道路則反引風入竅矣琥珀珍珠石燕銅青皆金石剽悍酸烈之物愈竭津液矣熊膽黃連性苦寒而凝壅風邪不得發越矣其有壯年元氣健實者患此惟清靜調養少待經盡氣復不治自愈縱療以點洗非藥之功也即衰老羸弱者不治亦只病氣留連猶無大害而一敷以前藥燥烈之屬削其薄膜走竄之物散其真氣瞳精外脫迫而為淚淚乾明滅不至於盲不已也豈目之自盲乎吾以為一切眼病皆當於脾肝腎處尋源施治未有不瘳者東坡曰目病則逸之齒病則勞之治目如治民當如曹參之治齊治齒如治兵當如商鞅之治秦旨哉是言可不熟思哉因舉其經驗以為龜鑑甲申秋薑子社祖母年近七旬患風邪兩目赤痛延一眼科用點法越數日竟眇左眼又投以清火耗氣之劑轉增暈眩自汗右眼亦昏症劇延余投以補中益氣湯加熟地五味枸杞決明數劑汗始斂右目復明又子社張門姻母亦患此症彼年方五旬元氣尚實余令其密室避風遇痛謹勿揉按有淚聽其自流寬心恬養兼淡飲食只寧耐七日投以清肝滋腎之藥數劑彼能守禁至期得復明如初又余洪門表姊甲申夏患眼生胬翳延劉潤初治之劉曰須內外兼治則可愈於是潤初專療其外余以健脾養血之劑滋補脾肝腎三經旬日胬翳消而體健逾昔戊寅春余因有東膠之行至夏先室病脾泄不瘥一醫用辛燥之劑服數旬泄得愈豈知前藥涸血竟眇一眼右眼亦幾壞余歸急投以滋陰益腎之劑三十服方得復明至左眼腎精不能上注目系絶則莫療矣猶子允敷每患赤眼六脈沉遲余令其服八味丸及恣飲雞酒隨愈夫赤眼亦有寒者豈應概投涼劑乎詳言數症以告患者
