body:
  text: 卷之六醫鑑僭評諸醫學識才品淑慝貞邪懸此明鑑願醫為上醫願人擇好醫耳明醫粵自三皇肇端九臣翼贊創垂醫藥救民拯物澤及當時恩垂萬世猗且休矣嗣有懷才抱德之士繼是業者仰觀天象俯觀地法中觀人事察五運六氣之亢承明五臟五行之生克辨陰陽水火之升降躬涉遺編神遊聖域誦而能解解而能明明而能彰彰而能變化不窮治於未病察所由生別異比類診合十全顧何羨揲瓜搦髓易形擅奇隱橘市壺習幻云秘哉明良之工世不常出直超儒仙千仞而上之矣斯為明醫儒醫嘗稽秦漢以後有通經博史修身慎行聞人碩儒兼通乎醫者精究玄機洞明至道每見立言垂教後學凜為法程若通顯之儒漢張仲景晉王太僕殷仲堪南宋徐熙唐許叔微明李瀕湖諸君是也若隱逸自高之儒西晉皇甫謐唐孫思邈王無功宋紀齊卿李東垣明張景岳諸君是也若有道因而得位之儒若唐許胤宗徐秋夫明薛立齋諸君是也故非儒則醫之術不明非醫則儒之道不該醫固以儒重者也儒誠重矣而獨奈有𧿧𧿇之狂儒背經文而獨創幻談又有跼蹐之腐儒守方書而昧通靈變又有鄉愿之賊儒存兩端而莫剖是非更其尤者高陽生之脈訣大乖至道馬宗素之鈴法殊戾宗傳偽褚之遺書倒裝五臟斯則冒竊儒名實皆蠹醫者也故槜李黃暗齋先生云非明理之儒醫書不可亂讀信然矣是所貴於儒醫者須具有大學問大見識大膽力特明真假關頭不失經權妙用方無忝此司命之責矣得進而醫國羹調元鼎壽君澤民躋世熙和斯又為間出之真儒已隱醫漢賈長沙有云古之至人不居朝廷必隱於醫卜司馬公亦曰達則為良相不達則為良醫於是丹溪先生反笈華山棄舉子業而即慨然自命曰士苟精一藝以推及物之仁雖不仕於時猶仕也若人也苟全性命於亂世不求聞達於諸侯弁髦軒冕調元草野蘊德潛修斯云隱矣亦豈必遁跡幽巖忘懷胞與陶弘景雖掛冠神武而留方肘後江明遠固不受宋室之官每輒副明主之請是則皆隱而通不失其濟物之仁者也德醫昔明太祖治平天下首著陰隲錄設醫局以惠濟群生宛與軒岐一揆遠軼漢唐誠仁恩周溥無窮矣稽之往代若徐文伯錢仲陽楊士瀛皆濟人為心不計功利宋劉潤芳治貧家疾輒懷金置席下別時令家人自得之病者一喜而疾以解東坡亦常蓄善藥濟人二公存心固誠善但博施猶病日亦不足耳總不如存一個好念頭凡胗疾無論貴若王侯卿相賤如倩傭丐兒皆一視同仁亦無計恭慢恩怨悉心救療遇有奇病未明我見不到處便令再延識者商治勿專私意勿諱我短勿沒人長期愈人病遇急來請勿避風雨此便是受用不盡的德也有等粗工庸手不習經書脈理不管病症重輕輕易投劑陷人垂死反謗正道負惡不悛見有此人便當逢人說害馬免使無窮生靈將來誤於此輩雖曰隱惡揚善固稱聖人若推擴聖人之心政要教無窮生靈避此粗工庸手安能恝然忍隱乎此非不存厚道但一片苦衷只知有生靈之性命不知有同類之包荒也且亦使若輩改心易行轉庸手而為良工儆戒一番望其同躋壽域寧不大幸至有良工吾又逢人讚揚不啻口出暴庸手之謬舉良工之善總為生靈起見何恤知我罪我此尤是善用其德者也溯昔勳臣鄧禹十三子各執一藝而業醫者四若公者勵操素絲享士挾纊榮膺上爵奈何不遺子孫以溫飽而獨令其役役於方技之列以竟所未竟之仁是公又世滋其德矣世醫語云醫不三世不服其藥誠重之也又嘗有云得讀三家書亦是世醫流此語殊屬附會夫醫以世稱者乃虧冶相承授受最精故得以擅名當代也且今昔方書不啻汗牛充棟何啻三家可資聞見可竟斯道以此而論可見世間業醫者僅熟高陽生之脈訣王宗顯之捷徑平居略記數十湯頭遇病朗誦幾首歌括非專守河澗之法則偏執丹溪之書訕李東垣獨理脾胃吠薛立齋每重命門不曰傷寒專門則云雜病獨科求其始會其全由博入約者無有也雖百世何足觀哉故宋龐安常不足父祖所授脈訣獨取素難究以玄微辨晰萬言垂訓千秋允為拔出之英則犁牛犁角不為世耀只為世累耳世醫云乎哉流醫誰謂萍蹤浪跡中無高躅乎而至以醫出濟學術淺深品格高下吾實無以窮其所自來矣惟有試之之法便可探索什一果屬精良尚恨見晚而與之商扶正教共濟斯民寧非厚願每見一二流屬亦能粗譚經方大率套語未辨及其處劑攻補混施識見膽力藐無一可吾知其遠離鄉井者志惟求食而已矣大都俗子聞風競新不察腎愚舍近騖遠間有縉紳亦踵此習政因踵此習而大家俗子益見縉紳許可者意為佳士而亦踵縉紳之習交相混也徒自誤已雖然豈盡乏人若唐湛一學識優贍知明百病虛實程鳳山能別陰陽傷寒而唐尤余所參印只千百中二三耳僧醫陳眉公謂沙門為一大養濟院姚廣孝位極人臣其姊一窶入婦耳尚罵他做和尚不了嗟乎養濟院中傑出何英劉河澗衣缽傳自浮屠一禿雖能宣明運氣每謂傷寒悉屬熱病又倡言諸病總歸濕火又謂諸血無寒致今庸流偏宗其說浪劑殺人禍世不小世固誤於河澗而河澗實誤於浮屠也有自來矣余嘗見一二妄禿侈口談醫大乖經典誑言神授驚炫俗眼罪可勝誅哉試舉一二以證其謬餘里林君向次郎本患夾陰證而乃枉歿於還俗馬僧河澗傷寒悉屬熱病之治又余胞妹丈系明經毛天羽長子少年不慎患陰陽俱虛潮熱發渴嘔悶便滑不進飲食一僧主治以六味丸加黃柏知母幸余見而沮之始易方舉世醫流大都類此嗚呼生靈受害何日休乎名醫所謂名醫者非明良之士乃庸手粗工藐無實學巧竊虛聲以炫人者是也陶氏序云醫為司命之寄不可權飾妄造今之承籍者多恃衒名不能精心研習郡國諸人皆尚聲譽不取實學聞風競獎季命虛聲良可惜也徐春甫曰術不精則殺人深怪世醫徒修邊幅習以口給凡有治療率爾狂誕偶然幸效需索百端至誤傷則曰盡命俗多習此為套而曰醫學無難語云學到知羞處方知藝不精則又澌滅愧恥之心矣支秉中曰昔越人因魯公扈志強氣弱足於謀而餒於斷趙齊嬰志弱氣強少於慮而傷於專乃飲以藥酒而易置二人之心使俱為名士予觀今之求醫者率以有時名者為重初不計其書之讀不讀脈之明不明謂之時醫福醫名醫一承權貴所舉輒憑治療雖殺其身委命無怨故為醫者往往奔走權門諂容卑能以求吹薦綱利沽名知者笑議仁心仁聞毫蔑有也安得飲以藥酒而易其心乎但若輩病人膏肪牢不可破真無法可治者區區藥酒云乎哉愚又以為若輩形之龐也類有德聲之宏也類有能其黔之驢也夫時醫即庸醫徐東皋云俗云明醫不如時醫蓋謂時醫雖不讀書明理以其有時運造化亦能僥效常自矜云趁我十年運有病快來醫又云饒爾熟讀王叔和不如我見病症多里諺有云左心小腸肝膽腎時來每日有千錢所謂明醫不如時醫良以有此也衛生寶鑑有一醫者一人病四肢困倦躁熱自汗氣短飲食少進咳嗽痰涎胸膈不利大便秘形羸一歲更數醫不愈或曰某處有時醫雖不精方書不明脈候看症極多治無不效患者信而延治及至診之曰此病食滯予治多矣許必效遂灸肺俞藥以蠲飲等丸並消導之劑不數服大便泄瀉加以腹痛飲食不進而歿經云形氣不足病氣不足瀉之則重不足此陰陽俱弱血氣皆盡補之惟恐不及反以小毒之劑瀉之虛之又虛損之又損不死何待夫明醫治病先審歲運太過不及次察形氣勇怯之殊病有虛實淺深在臟在腑之別治有緩急反正之異況醫為人之司命不精則殺人今之患者不達此理委命時醫其與自暴自棄甘填溝壑者何異哉嗟乎如此庸流滔滔皆是其奈之何奸醫薛氏醫案云辛丑年餘在嘉興屠漸山第有林二守不時昏憒請余治之譫語不絕脈洪大按之如無此陽虛之病也當用參附湯治之有原醫者陽喜而迎曰先得我心所同然遂服之即靜睡而進食午後再劑神思如故其脈頓斂余返後又詐云用附子多矣吾以黃連解之陰仍用參附湯竊觀仲景先生治傷寒云桂枝下咽陽盛則斃硝黃入胃陰盛乃亡不辨而自明矣吾恐前言致誤患者故表而出之此立齋先生言也愚以為此乃奸詭小人推是念何啻專務排擠操心讒妒已哉或有窺病家之豐實則朋謀而索質假危言以示嚇者或病本易治故投峻劑致令變症驚惶從中詐財者或病屬危急誘利不遂姑投緩劑因致因循誤死者或值內亂之家孤孽之子鬩牆競產房帷妒寵訐訟挾讎者乘病圖害假手進毒若輩唯利是圖絕人之嗣喪人之生既壞心術復壞仁術密藏陷阱殘忍窮𠒋奸孰奸於此乎古人教人延醫煎藥必素親信者始可托旨深矣其操危慮患之夫尤當謹毖淫醫俗傳錢鏗以妖淫敗道殞厥修齡呂仙亦為採補受摘塵寰今昔縉紳名公耄年惑於方士演術御女遭害傾生者按踵矣老子曰房中之術能生人亦能殺人吾恐迷情枕蓆全生者少一遘芳華粉黛誰是鐵心漢能不動念乃至捐軀以徇抑何愚甚仙茅一藥物耳本草極贊其能壯陽益腎東海張弼刺之曰使君昨日才持去今日人來乞墓銘丹溪亦論闢房中補益之非萬曆年間江右世醫龔應圓者一代良工也著福壽丹書教人採戰之法詳列方論誨淫敗德絕人長命真岐黃之罪人也近來有等匪人借醫求食不通經書不諳方脈乃專務旁門秘煉毒丸獻媚權貴枉道取悅挾此為載質之資為肇名之端豈知斯藥非剽悍之金石則毒烈之芳草燔灼腸胃耗竭精髓是醫本以活人而乃以殺人故曰淫醫不特此也又有素行不端之徒遇診𭒀婦寡女啟念挑淫線索傳情術以濟奸無良極矣故孫思邈有云心欲小而膽欲大才欲圓而行欲方是瓜李之嫌士君子最當避忌而存心光明正大尤是醫家本分事女醫語云寧醫十男子莫醫一婦人誠難之矣世間有等癡愚蠢漢以妻妾子女之性命付之醫婆之手被其妄治傷生者眾矣夫男子業醫尚且庸謬況婦人目不識丁手不辨脈一憑長舌取悅裙釵三指藏刀甘受隱戮良足鑑耳雖然此等狂潑豈無所長乎但其所挾下胎之藥自謂最驗故每見閨閫失節之婦信其誘弄曖昧隱曲無所不為所以先輩著治家訓禁六婆不入門思之瘍醫醫寧小道乎而習醫之人則多小人也因人而輕醫所從來矣至吮癰呧痔稱曰瘍醫尤是卑庸之流世愈薄之雖曰科分內外症有表裡豈知皮毛肌肉悉系五臟六腑十二經絡所聯屬灌溉者而外之瘡瘍由內之感發也何可膜外視之每見外科之醫不顧元氣虛實病機寒熱固執成方概投涼劑夫在元氣形氣病氣俱實者用之則宜設若俱虛寧不傷生乎若令外科治外內科治內必察脈氣完虧庶免夭枉若丹溪詳言癰疽之治義可知矣以上十三種醫評陋識如余不揣方人之譏總緣生靈起見特因其品行之貞邪學識之賢愚而直揭之使世之患者識所慎擇焉喻言余壯歲挾少年結燕趙遊連鑣驅馳每見轅下畜性甚穎甫束鞍轡待人乘騎及粼粼登程遵我周道無迷岐路遇小溝隙側徑且能紆迴屈曲而行抵宿館停蹄及執鞭者至卸以騊載揭以鞍鐙便自揚揚然入廄索食矣日復如是余因詢曰何以一畜而靈慧乃爾比執鞭者曰豢一騾驢可供三十年之用每歲長途往反不下六七度彼蓋輪蹄絡繹積有歲月故極熟於裡道館舍無煩鞭策耳越旬日過邯鄲薪米騰貴復驚寇至余又詢曰是亦知此乎執鞭者曰彼惟知求食耳安知食價騰湧彼惟知道可行廄可棲耳安知寇警𠒋聞將謂賊亦人耳安知其善惡攸殊物不得與人比也余因憶伏龍雛鳳同是物也何以未出茅廬時不及騾驢一一親見之多反能知天下事而天運之否泰國祚之興亡人事之吉凶乃無逃其神算者乎似不可解矣偶因談及有客笑而言曰是足為明醫隱醫時醫名醫之喻耳餘曰然病鑑此專為病者操鑑亦兼為醫者立箴也知醫葉敬君曰合天地人性命為重命從誰生生命者曰父曰母命從誰司司命者曰君曰相曰師司命者誰為之總總君父師相之權曰醫上古神農黃帝君而醫也岐伯諸臣師而醫也中古名賢一隱君子錯出則皆繼醫之統而無替其性命之傳者也道斯隆矣而惜乎近古及今正教凌夷邪說縱橫挾治成方委命匪人靈素奧義不復窮探循枝昧本棄繁就簡二氣之中和何自而調燮生人之大命安望其康濟寧不為庸妄之砍伐致嘆狂瀾之莫挽乎故玄晏先生云人受先人之體有七尺之軀而不知醫事此所謂遊魂耳雖有忠孝之心君父困危赤子塗地何以濟之此聖賢所以精思極論欲盡其理也明道先生曰人子事親學醫最是大事今人視父母疾一任醫者之手豈不害事必須識醫藥之道理別病如何藥當何如故可任醫也如自己曾學令醫者說道理便自見得或已有所見亦要說與他商量張杲醫說云五經四部軍國禮服若講用乖越者止於事蹟非宜耳至於醫藥一物少有差謬便性命及之千乘之君百金之長可不深思戒慎乎伊川先生云治病而委之庸醫比之不慈不孝此數論者深足為有生家之明鑑也試醫夫人大事莫逾生死百年之內誰保無恙乃一旦有疾付之庸手甘心受害枉死無怨不謂至靈者人而至愚者亦人也病固不得不求醫而醫之明脈者蓋千百不一二數也將謂不治無以愈病將聽妄治又恐喪生余以為具慧鑑者方別妍強憑薦揚者亦須勉受唯有試之一法庶幾酌擇匪謬耳患者延醫到家切勿豫言病症當先舉手令他胗脈察色聞聲胗畢靜默聽他何說或是屬寒屬熱屬虛屬實或是血虛氣虛血實氣實或是外感內傷之異經絡臟腑之別主陰主陽此病之大要也雖病能固有萬千而脈只二十七種安能一一肖合而此大要醫者豈宜不知得其了了言下十應二三便稱名手於是吾方告以得病之由起居順逆飲食喜惡病期久近備詳勿諱乃聽處方修劑又問其某藥當主何病君臣佐使母子虛實之法有犯胃氣無犯胃氣速愈遲愈可治不治之驗或從順治逆治正治反治之殊仍求詳寫始末看他學問淺深見識高下果屬明良信心任之當必無虞設有不愈非醫之咎也若其脈症不明舌謇語澀套語支吾字跡不通方藥無法雖承尊貴所舉祇屬汙諂之流羊質虎皮外飾為事安可輕信之乎如此乃試醫也非困醫也試醫者為性命也若醫果精良又何憚困乎余因是而每不平坡公所言者曰脈之難明古今所通患也至虛有盛候大實有羸狀疑似之間便有生死之異士大夫多秘所患以驗醫之能否吾生平有疾請療必盡告以所患使醫瞭然知疾之所在虛實寒熱先定於胸中然後胗脈疑似不能惑也吾求愈疾而已豈以困醫為事哉孫真人亦曰未診先問最為有準籲二公之言特為醫者藏拙非為病者擇善也在醫者得矣而於病者不受誤耶汪度納交固當寬於容人第病關生死未可不嚴於實醫也吾恐用醫不試誤世非小特為駁正立此試法薦醫薦醫為生死攸系語云賢不薦醫誠重之也余以為賢未始不薦醫特不薦不賢之醫耳張景岳曰有或見輕淺之偶中而為之薦者有意氣之私厚而為之薦者有信其便便之談而為之薦者有見其外飾之貌而為之薦者又有貪得而薦者陰利其酬關情而薦者別圖異望甚有斗筲之輩妄自驕矜好人趨奉熏猶不辨擅肆品評譽之則盜蹠可為堯舜毀之則鸞鳳可為鴟鴞洗垢索瘢無所不至而懷真抱德之士必其不侔若此流者雖其發言容易休慼無關其於淆亂人情莫此為甚多致明良有掣肘之嘆病家起刻骨之疑是非之不明總為庸人擾之耳薦醫之關係不可不察也半識世有半識之流不知虛實補瀉之理平日略見一二醫書某病用某方某方用某藥將謂依方治病法無越此矣又有自己素經有病曾與醫師商治粗曉方藥遇有病人亦代胗脈但見浮動便曰無事沉伏便曰無脈搖首咋舌使人驚駭真可發笑噫庸工誤人固已不堪如此半識謬妄尤甚或主持於親朋之際或議論於賢愚之間顛倒是非妄高禍福於是汙下之流存兩可而希苟容高明之士懷獨見而終不合紛紛築室掣肘賢良此半識之為害不岌岌其危哉察弊醫為性命之學生成之主道大任鉅自唐書列之方技而縉紳名士每每不譚宋太保林億公云以至精至微之理而付於至卑至賤之人求其能起人之疾者鮮矣故世遞降而術益鮮率多市井亡賴空門孽禿略識字畫素饒利辯者為之是人之辱醫非醫之辱人也若輩學醫初只挾脈訣捷徑湯頭歌括不一二帙乃就業於庸流之竊有虛名者奉為明師教習犯誦稍知浮沉遲數四綱頗明溫涼寒熱各性遠則一年近則半載遂以為道盡傳矣詣已超矣大開鋪肆高揭榜額不曰某某精傳則曰某某心授又則曰世傳神秘離經叛道執方待病輕淺偶中自恃神奇如是情迷壟斷計熟蠅頭而攀援之心萌矣念以為非奉二三貴人為我提掇何由虛聲日播乎思得當道尊官踐任之後豈乏延醫乃預謀之胥役隸卒之流賄托吹薦及當道有請何識賢愚便信然從之豈知此輩百凡布置復密通消息於官衙從僕備詢何人何證預得病機了了心中及一入診語言吻合依病處藥治或得驗儔不豔服為果精良乎其始也介下役以為進身今也奉尊官而為廣揚僥有題額高懸戶外往來見者承風趨影亦爭傳曰彼名醫也甚至士大夫高慧不免亦墜谷中疊見疑難重恙被其枉死者多矣一遇識者燭破肺腑詞遁計拙破綻方彰嗚呼如此競逐邪流心如青黑之混指若鋒刃之險初亦何事不可度活乃至輕易冒醫殺人無算乎此古今之通弊也考昔劉伯溫公言曰杭有賣果者善藏柑涉寒暑不潰出之燁然玉質而金色置於市價十倍人爭鬻之予買得其一剖之如有煙撲口鼻視其中則干若敗絮予怪而問之曰若所市於人者將以實邊豆奉祭祀供賓客乎將衒外以惑愚瞽也甚矣哉為欺也賣者笑曰吾業是有年矣吾業賴是以食吾軀吾售之人取之未嘗有言而獨不足子所乎世之為欺者不少矣而獨我也乎此伯溫公憤世嫉邪之言也今醫者既衒外以售柑矣而病者可愚瞽而受戮乎慎擇凡病至根搖本虧六脈無胃氣二豎入膏肪即使緩扁復見亦難措手何論時名之工哉若其形氣俱實偶罹病恙即不治少待經盡氣復亦當自愈未有治之而不愈也即使庸手妄治亦無至傷命耳獨是人有可生可死之病得治則生失治則死對治則生舛治則死急治則生緩治則死者呼吸關存亡之候從違操生死之機如此乃足以別工師之賢愚巧拙夫曰明良豈真能起死回生哉但有危急垂死之病人不能治而已能治令人全其生不致枉死且能救人死於未病之先與知病之所從生耳至所謂名醫時醫者治寒以熱治熱以寒治虛以實治實以虛淺病偶中俗服神奇固似乎名下無虛士矣一若值有假虛假實假熱假寒之症病既變幻見隨惶惑竟昧其所謂從逆反正通用塞用之法而姑投緩劑藐無膽識且曰王道穩當病者亦甘心受誤始見從前所謂名醫者祗虛名耳若夫庸手粗工不察經書不諳脈症寒熱錯投緩急混施實實虛虛致輕變重重變篤篤而死是病本非儘可死之病而服必死之藥安得不死如此賢愚是在病家慧眼預識臨病慎擇之而已矣專任設夫病者既擇名手而信從之矣獨其人患非旦夕可愈之病而欲得乎旦夕必愈之治於勢難哉乃日易數醫賢愚競進雜揉傷生禍福反掌初非擇醫不精特任醫不專耳宋李綱有云用人如用醫必先知其術業可以已病乃可使之進藥而責成功今不詳究其術業而姑試之則雖日易一醫無補於病徒加疾而已早治坡公曰天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也以故明者識氣化於未然及病已成虛強半矣始發方劇便當急治然邪在經者一劑可愈傳腑者數四方瘳至入臟則百無一生故華君擅剖腹之能秦緩鮮膏肪之治非工之巧拙不同特病之淺深懸殊耳經云病勢已過命將難全可不致思謹始病機初發便當擇醫始若錯治終必敗亡今姑以傷寒陰陽二症言之陽症初見頭痛如破腰背拘急體熱如焚喘渴不休狂譫時增見者誰不驚危但其脈與症合得治即愈勢固可憂病實無害為只傳經傷腑而非中藏也獨是陰症始見頭不甚痛體不甚熱飲食失常臍腹微痛大便不實或嘔吐便利奄奄忽忽只見倦怠豈料藏氣已虧脈少胃氣隱中大異若知急投溫劑何至因循喪生乃醫者不識便謂無虞非投發表則用清解稽延數日病已入臟漸次增劇死機呈矣雖有盧扁莫能為也蓋陽之氣暴而陰之氣緩陽之性剛而陰之性柔陽之病在外浮而易見而陰之病在內沉而難覺故人常情但慎於陽而忽於陰而醫者亦不識陰陽虛實見病治病往往誤人於死何可勝數為此切告患者始病擇醫不可不謹生死系之矣諱疾愚按郭猷甫云深怪諱疾忌醫之人分明怕死又怕人知死意以今日之病恐仇人知則喜或貪淫所致又恐親人知則怒故病已篤猶自迴護獨不思事勢到此何不早言或有病經過者猶前車戒後轍或有知某病經某明醫者速求治療自然得愈斷不可因人喜怒而戕自己性命語云才欲藏病欲露善夫速效誤人病可以速效致者必惟元氣壯盛諸氣未虧或偶感三陽表證與乎飲食內傷及暴受寒冷者治不數劑便得痊可至於五癆七傷六極重恙若肯精修確服純王善藥漸涵數載方有生機尚亦有不治者敢用雜霸異術攻擊眼前大傷元氣旋即倒戈敗績者乎吳文定公家藏集云陳汝中嘗病脾胃鬱火之症求治於盛用美診其脈曰如此治可生如彼治即死如此治可以少生如彼治可以速死既而治之汝中遲其效或以浮屠善醫薦者汝中惑其說遂求治飲其藥嘔血一升遂死噫醫以用藥藥以攻病病不能去而反以致死則何以醫藥為哉彼浮屠者悉庸妄人也目不識醫經口不辨藥性指不察脈候人之虛實病之新久一切置之不問而惟毒藥攻擊之其殺人蓋亦多矣予咎汝中之不善擇醫而致速死特書此以為世輕服藥者之戒執方之訣今夫醫者病者每獲一方一藥之善謂能通治眾疾不啻窶丐之獲異寶珍秘自矜豈知滋害為甚抑何懵懵不會也夫人有貧富貴賤之殊老少強弱之稟病有新久虛實藏有陰藏陽藏土地高下不一物理剛柔異宜黃帝興四方之問岐伯舉四治之能臨病之師宜須細審尚有一病而投數方未有一方可療數病者羅太無雲用古方治今病政如拆舊屋揍新屋其材木非一不用經匠氏之手其可用乎許叔微釋微論曰予讀仲景書用仲景法然未嘗守仲景之方乃為得仲景之心也語云學方三年無病可醫學醫三年無方可學旨哉言乎藥第二義凡人一罹病綱久支床第即神思性情亦幾為之磨蠍不堪矣至延明醫餌善藥猶是第二義必先閒卻心身忘情思慮恬靜勿躁語默雍容一切事務漠不相聞起居得宜飲食擇美脫著隨時勿近佳麗勿戀娛悅勿過幽寂火亦易起既得保養之力然後佐以良劑勤服不輟自有蘇生之期何患二豎不躍躍然從心頭解也百病惟虛察內傷為最重非經年調治不能見效若復氣暴不靜性淫無制雖有千服神丹雖抵一點恣火尤須確守禁忌自擇便宜屏絕萬緣當視此身如已死之身方得有免死之日若少存一貪生之念便不免乎喪生之禍是在患者宜自珍耳鬼疑鬼神宰造化之權精誠可格此理甚微至乎憑依作祟相傳有魑魅妖孽亦唯失德之家淫冶之婦或蹇運之夫往往因邪易入乘虛召感御之之法別復一論耳若夫人病而眼中見鬼奇形異態舉家震駭以為真鬼而必死也延巫禱禳惑其矣愚甚矣其證有數種一病從三陽傳入胃腑熱迷心經致神亂不安則目中見鬼夫神者心之主也鬼者神之分也氣全則為神神分則見鬼神散則為鬼也又人當春夏之交病時行瘟熱中心臟則死傷心經則亂目亦見鬼又一種體虛積勞暴厥陽氣上越假熱棼心目亦見鬼又見停痰上壅與食積留中作熱攻心目亦見鬼總由神亂則然投以清熱納氣及消痰蠲積之劑則病自愈也若其病久垂亡目亦見鬼者此乃元氣盡脫於外為神散不聚非神亂不安也及察素問有五屍鬼篇言人五臟虛而值運氣不及之年有克鬼見令人暴亡總以天虛而人虛應之虛則鬼見非真鬼也惟預施治法滋補真陰益助元氣心神完固不復散亂邪鬼自遁矣經曰得神者昌失神者亡得守者生失守者死又曰拘於鬼神者不可與言至德其斯之謂歟審不治病越人曰病有六不治者驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也陰陽藏氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也愚以為驕恣者多出於富貴之家富者盈滿自矜或深言以見非貴者倨傲自尊或忠告之難行於是汙庸卑諂之流趨承恐後懷材抱德之英降辱寧甘故謙光為持躬之要而重士乃尊生之本也若此驕恣之與輕身信巫是本非不治之病乃自致於敗亡而非衣服難適藏氣不定形羸拒藥終無可治之比也無病服藥藥為病設若人元氣充實真陰恬靜飲和可資攝養何必別假丹劑鼓溢氣血奔突散漫而為揠助之患每見有無故而服參耆歸術蓯蓉骨脂滋益脾腎之藥暴致血衄脹滿成不可解之疾者竊謂病者身之賊也藥治病之兵也朝廷不得已而用兵人有病而始用藥病實者尚虞驟補病虛者更畏妄攻藥其可漫嘗乎歲巳巳家大人佐郡錦官由渝州登陸以進道經永川兩昌內江諸邑目擊井裡蕭條民懷菜色因詢諸父老曰爾蜀古天府之國土沃人殷風俗醇美今何若是之凋殘乎諸父老曰正苦十年來奢酋構難間經援兵四集淫虐悍暴尤甚於賊也尚悲風鶴已邈澤雁未歸稱民賊者又車困輻疊至既罹烽煙之禍復遭塗炭之苦民愈不堪命矣始信將愎兵驕害甚乎賊語不誣於是家大人抵官勵操以治楚者治蜀及屢署郡邑符八載敷仁皆一意恬靜慈和為挽復元氣之善圖恥事針砭之速究竟功牧參苓蘇生重困時蜀臬江右曾銘石先生秉憲清嚴執鑑人倫每與當事擊楫寮寀則曰守令者親民之官官以清著固難但未免尚峻刻耳若清且和留心民瘼如錦官蕭司馬者則尤難其人也噫治病與治國一也久病而服誤劑猶青苗之厲法無病而輕服藥乃黷武之危圖均害民也傷生也藥隨病施先哲有云用得其宜雖烏罔亦可奏功不得其宜至參苓亦能為害夫藥何定施哉昔有人患陽明胃腑證法須承氣因誤投參朮幾殆後以他病陽虛發熱宜用參朮卻為前故畏而不服亦致留連增劇是猶因噎廢食者也籲同一藥石耳用之有宜有不宜而生死系之益見病者須擇好醫耳草藥無知愚民每每擅一二單方草藥為能立奏殊功且復省費誰不悅從但此須村裡堅剛異稟別具一副耐毒腸胃者用之極驗若元氣稍虛誤服旋傾目擊者屢矣書此為戒針灸針灸理極玄微必按穴精詳視人肥瘦短長以意消息毫芒不瘥者一著可勝百藥今之稱善此術者亦猶盲瞽索途反滋禍害耳此亦只是瀉法而非補法即云為補亦瀉中補也設若精氣兩虧敢妄施乎大抵陽衰虛寒六脈沉遲者亦借外火以資內火於法得矣若乎陰虛火旺脈數發熱之病灸之則菑害立生內經東垣論之詳矣偽藥必辨今病者既擇名手復得好方而藥非地道雜以偽者非惟無功適足取害耳如沙參之假人參苜蓿根之假黃耆藁本頭之偽川芎浙貝母之偽川貝母廣黃連之偽川黃連紫楝根之偽巴戟南當歸之充秦歸浙地之充懷地建山藥之充懷山藥丁茄葉之偽藿香染獨活之偽當歸粗鵝管之偽鍾乳金蓮根之偽肉蓯蓉浙枸杞之偽甘枸杞黃絲子之偽菟絲西五味之亂北五味杜蘅之亂細辛楓香之雜乳香黑束之亂沉香沙石之雜靈脂牛膠之偽阿膠川烏之偽附子土防己野馬肝之亂何首烏諸如此類不可勝窮小人既售贗器君子當具灼鑑製藥必親陶弘景曰王公貴勝合藥之日群下竊換好藥終不能覺以此療病故難責效余以為製藥必親者非親自監督必委之素親信之人始可托也若竊換猶是小事甚有仇家妒嫉及競產爭寵蕭牆內寡因而暗藏殺機或賂奸醫或誘婢僕加入砒硇或乘順便投入蠱毒每見病家不及覺察屢被傾生迨至事泄噬臍何及此不容不謹也
