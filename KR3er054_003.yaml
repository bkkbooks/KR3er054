body:
  text: 卷之三藥性微蘊黃耆黃耆白朮人參此三者雖為補氣之藥第主治之屬臟腑之殊則迥然不同也本草雖未詳晰而余請為備列之蓋耆專主衛氣白朮主脾胃中州之氣人參則益脾腎之元氣合三者兼用又通益上中下三焦表裡臟腑諸氣也何以言耆專主衛氣乎耆質輕氣薄色白微黃味淡略甘乃肺脾上中二焦陽分之藥而主治則固自汗治虛喘解肌熱療癰疽只此數症尚須佐以參朮方能著功王節齊云內傷發熱是陽氣自傷不能升達降下陰分而為內熱乃陽虛也故其脈大而無力屬肺脾立齊云當用補中益氣湯治之第此湯以耆為君參朮為臣少佐升柴則獨療沉陷發熱之虛陽與勞役過度及陽虛自汗者宜之東垣曰靈樞云衛氣者所以溫分肉而充皮毛肥腠理而司開闔黃耆既補三焦實衛氣與桂同功特比桂甘平不辛熱為異耳但桂則通血脈能破血而實衛氣耆則益氣也又黃耆與人參甘草三味為除燥熱肌熱之聖藥脾胃一虛肺氣先絶必用黃耆溫分肉益皮毛實腠理不令汗出以益元氣而補三焦陳嘉謨曰人參補中黃耆實表凡內傷脾胃發熱惡寒吐瀉怠臥脹滿痞塞神短脈微者當以人參為君黃耆為臣若表虛自汗亡陽潰瘍痘疹陰瘡者當以黃耆為君人參為臣不可執一也丹溪曰黃耆補元氣肥白而多汗者為宜若面黑形實而瘦者服之令人胸滿宜以三拗湯瀉之張元素曰黃耆甘溫純陽無汗則發之有汗則止之以上諸說皆言耆為益衛氣之藥蓋衛氣之疏總由於胃氣元氣之虛必兼以參朮而扶胃氣元氣以充衛氣則相須為用耳若舍耆而用參朮獨補中氣猶可是治其本也舍參朮而專用耆徑塞汗孔不令疏泄從理其標謂能實衛則不可也丹溪謂黃耆補元氣此非補元氣乃補衛氣也為衛氣升由元氣耳大凡肥白多汗者元氣便虛元氣既虛未有衛氣能獨實者謂曰補元氣亦可補元氣即補衛氣也如面黑形瘦實者非元氣實乎元氣既實衛氣自然不虛敢用此而犯實實乎丹溪格致論言一病者妄自加黃耆致腹紋已隱脹滿不堪耆固補物誤用且能為害況他藥乎雖曰耆能止汗設元氣暴絶症主亡陽亦能為力耶丹溪又治一人無汗者佐以葛根能令汗泄則耆又不專止汗耳故善用耆者有汗能止無汗能發蓋止汗不專一耆而病汗亦非專衛虛也若夫白朮則健中氣而益脾胃者也東垣曰脾胃虛陳皮白朮補之脾胃實黃連枳實瀉之東垣雖以陳皮白朮為補脾乃施於不甚虛者陳皮多用尚能泄氣其虛者非參不能資益虛之甚者非佐桂附骨脂勤培土母不能復轉輸生化之常區區治子得乎參為中和之品味甘質重膏潤不濡味甘協土質重歸腎韓飛霞雲人參煉膏服固元氣於無何有之鄉此誠深知參者矣故字從參者以其有參贊化育之妙與天地相參伍而其功不甚偉歟參少用反能停膈作脹多用有徹上徹下徹內徹外之功佐以黃耆防風肉桂則補衛氣佐以白朮歸苓炙草則補脾胃中氣佐以附子肉桂則追復元氣佐以血藥則補血佐以氣藥則補氣故欲提下陷之陽氣以上升則當以黃耆為君參朮為臣納上脫之真氣以歸源則當以人參為君桂附為佐一主上升一主下降病氣雖同治法則異毫釐不容混也余猶有說焉若上中焦陽氣下陷元氣尚未傷也枝葉萎而根本自堅縱治少瘥或亦無妨故四君補中歸脾之屬任即雜投隨試隨效至於元氣上脫根將離土雖用參朮而不急佐以桂附安能納氣歸宿命門乎第參朮僅只補中而命門為元氣歸宿之地可緩桂附乎桂附為命門土母之劑土母者何真火也真火即元氣也元氣為人生命之本人得氣則生離氣則死氣離原則脫未有元氣脫而人不死者也設若元氣甫脫尚未遽絶即需桂附而不君以人參豈知桂附性竄奔突愈耗真陽也亦有憚桂附只用參朮徒使留連不降終至於死特少延旬日耳然用桂附必君以參蓋性相制而功相須也甚有氣本上脫復投以黃耆升達之品益令縈膺作脹煩悶難支且曰參耆滋補為功未到是豈藥之咎乎噫若耆若參若術若桂附隨宜運用應緩則緩應急則急靈變從人幸勿膠柱可也內云耆固補物誤用亦能為害者非耆之能害人也耆有黃耉耆碩之稱與國老人甘草參朮之君子皆為朝堂中正人仁人主宰造化生成萬物豈有害人之理特人誤用自致於害耳吾恐學者致疑故復詳及人參正誤愚按李言聞曰孫真人云夏月服生脈飲腎瀝湯三劑則百病不生東垣亦言生脈飲清暑益氣湯乃三伏瀉火益金之聖藥而雷斆反謂發心痃久病非矣痃乃臍旁積氣非心病也人參能養正破堅積豈有發痃之理觀仲景治腹中寒氣上衝有頭足上下痛不可觸近嘔不能食者用大建中湯可知矣又海藏言人參補陽泄陰肺寒宜用肺熱不宜用王節齊因而和之謂參耆能補肺火陰虛火動失血諸病多服必死夫人參能補元陽生陰血而瀉陰火東垣之說明矣仲景言亡血血虛者並加人參又言肺寒者去人參加乾薑無令氣壅東垣又言虛火可補參耆之屬實火可瀉苓連之屬乃二子不察張李之精微而謂人參補火謬哉夫火與元氣不兩立元氣勝則邪火退人參既補元氣而又補邪火是反復之小人矣何以與甘草苓朮謂之四君子耶雖然二家之言不可盡廢也惟其語有滯故守之者泥而執一遂視人參如蛇蠍則不可也凡人面白麵黃面青黧悴者皆脾肺腎不足可用也面赤面黑者氣壯神強不可用也脈之浮而芤濡虛大遲緩無力沉而遲澀弱細結代無力者皆虛而不足可用也若弦長緊實滑數有力者皆火鬱內實不可用也潔古謂喘嗽勿用者痰實氣壅之喘也若腎虛氣短喘促者必用也仲景謂肺寒而咳勿用者寒束熱邪壅鬱在肺之咳也若自汗惡寒而咳者必用也丹溪言諸痛不可驟用者乃邪氣方鋭宜散不宜補也若裡虛吐利及久病胃弱虛痛喜按者必用也節齊謂陰虛火旺勿用者乃血虛火亢能食脈弦而數涼之則傷胃溫之則傷肺不受補者也若自汗氣短肢寒脈虛者必用也如此詳審則人參之可用不可用思過半矣汪機曰王節齊之說本於王海藏但節齊又過於矯激東垣言虛火可補須用參耆丹溪云陰虛潮熱喘嗽吐血盜汗等症四物加人參黃柏知母又云好色之人肺腎受傷咳嗽不愈瓊玉膏主之又云肺腎虛極者獨參湯主之是知陰虛癆瘵之症未嘗不用人參也節齊私淑丹溪者也而乃相反如此斯言一出印定後人眼目凡問此症不論病之宜用不宜用輒舉以藉口致使良工掣肘惟求免夫病家之怨病家亦以此說橫之胸中甘受苦寒雖至下嘔下泄去死不遠亦不悟也古今治癆莫過於葛可久其獨參湯保真湯何嘗廢人參而不用耶節齊之說誠未之深思也愚按上古人乏粒食窠居穴處茹毛飲血逮神農氏出始嘗草別谷教民耕藝得味之正而為五穀以養民生又別藥良毒取性溫涼寒熱分用升降補瀉以救民疾但百藥各具偏性只宜治病若執迷久服便有偏勝偏絶之患人參稟質中和雖云補益亦惟體虛者宜之蓋人有陰臟陽臟之殊故陽臟受病可任涼瀉少啖參朮便增煩悶亦猶陰臟之取資姜附最憚芩連者也陽臟而陽氣本盛非芩連無以折其有餘之焰實非芩連之能滋陰也陰臟而陰寒沉痼非姜附無以消其不足之醫實非姜附之能益陽也昔夏英公餌硫黃附子莫知紀極其妾父盜服數粒發狂而死太原甘始食天門冬寒滑之物得壽三百餘齡杜紫微亦餌冬而御妾八十壽亦逾百又神仙傳縉雲服黃連而飛蹕上旻王微亦贊黃連有久餌輕身之功數說豈盡誣特因人而用耳今世風日偷賦稟漸漓六氣有加真元便脫故非參朮歸苓無以刮復生機每見虛而受補者什居八九實而耐攻者什僅二三反此則實者不妨少謬虛者未可略瘥經云邪之所湊其氣必虛未有元氣虛而復虛而命不傾者也治虛之道舍參奚適但恐有虛而似實不知補虛而已極不任補斯難矣白朮白朮性溫質厚味甘平氣微香為脾胃要藥兼補肝腎主治百病功居八九本草歷贊其益脾補氣療五癆七傷消痰除濕痞滿腫脹暖胃消穀風虛淚眼積年瘧痢生津壯水安胎扶原在血主血在氣主氣不能悉闡時師每謂術性燥津渴者忌用又謂術能助氣病脹非宜又謂無故用術起嗽難療又謂有濕則用無濕勿加籲此等庸工是別有一部本草矣誤世何堪物理玄微真難與言也戴原禮每治病脹主治參朮初服覺滿未幾便愈吳鶴皋醫方考亦以四君療鼓脹痞滿諸病此皆治本法也人以脾胃為主脾氣健則能制水生金升降運化津液自裕何渴之有其脹者總由脾胃虛弱不能轉輸運行精微以致飲食難消停留作滿亦有不因飲食而自生脹滿者凡嗽多屬母虛無以生金術善止嗽脾既資益肺豈反虧乃謂輕用起嗽此尤害理之甚若實嗽熱嗽雖不宜遽用安可以此而概寒嗽虛嗽乎濕固需燥用術以健脾脾氣得健濕能停留否此非燥濕乃健脾也書云胎前主實用此安胎寧不犯實實之戒乎豈知百病萬機皆主乎脾未有脾胃實而胎不固者人徒知麥芽神麯之善消脹滿陳皮半夏之補益脾胃此特為療有形之積與補不甚傷之脾耳設若虛脹虛滿便當參朮主治若混投以前藥之屬隱耗真氣益覺增劇大凡病屬實何難治而所難者政虛矣劉完素曰白朮除濕益燥和中補氣其用有九溫中一也去脾胃中濕二也除胃中熱三也強脾胃進飲食四也和胃生津液五也止肌熱六也四肢困倦嗜臥目不能開不思飲食七也止渴八也安胎九也汪機曰脾惡濕濕勝則氣不得施化津何由生故曰膀胱者津液之府氣化則能出焉用白朮以除其濕則氣得周流而津液自生矣陶節庵亦謂術能燥腎固氣蓋腎司水土虛無制便成泛濫之患水既偏勝則火益衰火元氣也土母也母衰而子反救乃制水以益火則氣自固而腎自平此四子者真知術之玄蘊矣甘草別録載甘草溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒為九土之精安和七十二種石一千二百種草李東垣曰甘草氣薄味厚可升可降陰中陽也陽不足者補之以甘甘溫能除大熱故生用則氣平補脾胃不足而大瀉心火灸之則氣溫補三焦元氣而散表寒除邪熱去咽痛緩正氣養陰血凡心火乘脾腹中急痛腹皮急縮者宜倍用之其性能緩急而又協和諸藥使之不爭故熱藥得之緩其熱寒藥得之緩其寒寒熱相雜者用之得其平王好古曰五味之用苦泄辛散酸收咸斂甘上行而發而本草言甘草下氣何也蓋甘味主中有升降浮沉可上可下可外可內有和有緩有補有瀉居中之道盡矣仲景附子理中湯用甘草恐其僣上也調胃承氣湯用甘草恐其速下也皆緩之之意小柴胡湯有柴胡黃芩之寒人參半夏之溫而用甘草者則有調和之意建中湯用甘草以補中而緩脾急也鳳髓丹用甘草以緩腎急而生元氣也乃甘補之意又曰甘者令人中滿中滿者勿食甘甘緩而壅氣非中滿所宜也凡不滿而用炙甘草為之補若中滿而用生甘草為之瀉能引諸藥直至滿所甘味入脾歸其所喜此升降浮沉之理也經云以甘補之以甘瀉之以甘緩之是矣李瀕湖曰甘草外赤中黃色兼坤離味濃氣薄資全土德協和群品有元老之功普治百邪得王道之化贊帝力而人不知斂神功而已不與可謂藥中之良相也然中滿嘔吐酒客之病不喜其甘而大戟芫丸甘遂海藻與之相反是亦優緩不可以救昏昧而君子嘗見嫉於宵人之意歟當歸川芎當歸川芎諸家本草論之詳矣二物雖為治血之綱領亦主於氣之用者當歸氣辛味甘而性主動補中有行行中得補雖非純補亦贊行功也川芎氣辛味微苦而性主竄行多補少但質略潤非燥烈之比也蓋血屬陰體屬靜靜中寓動動靜得平庶無患耳靜太過則血滯動有餘則血溢歸芎雖曰治血固無定主也血寒而凝者佐以薑桂血熱而溢者君以芩苄從人參黃耆則補氣而生血同牽牛大黃則行氣而破血同地黃白芍則養血同丹皮香附則行血血虛而枯者主以參朮熟地阿膠蓋血不自生必惟陽氣之藥以為用陽生陰長故無陽則陰無以生也産後血塊為患者佐以失笑散則消惡露補中湯用當歸以益氣羌活湯用川芎以散寒蓋芎性上升宣散功多血症惟寒凝壅滯者相宜若失血血少血崩血漏諸症則須斟酌恐愈擾其為靜之體也當歸固云益血然性溫主動亦須配合得宜仲景治手足厥寒脈細欲絶者用當歸之苦溫以助心血蓋歸亦心經之藥而通脈也又佐黃耆為當歸補血湯治血虛發熱此症似白虎而不得以白虎治也一凡久病大便不通論方書固不敢妄投承氣而桃仁火麻枳殼之屬是所必需豈知桃仁味苦泄陰氣辛散陽火麻滑利傷胃枳殼大耗真氣亦非久病所宜蓋由大病後水涸津枯血燥液竭以致廣腸乾澀余每治此症惟以人參當歸熟地各二三錢白朮減半少佐陳皮秦艽各數分引以大棗三四枚不一二劑遂通且復精爽此藥用參以生津白朮健脾而通津況大腸主津而參朮又為手足陽明之藥陳皮亦理脾而調氣熟地補陰潤燥當歸活血濡腸秦艽氣辛宣壅大棗味甘緩急此特從氣血上作用未有病久而陰陽兩虧昧本從標可妄投火麻之屬以傷元氣而至不救者也雖曰補陰需歸但陰虛有不同若腎虛發熱咳嗽虛火為患者惟宜六味純甘至靜之物故經云脈小者調以甘藥而歸性溫竄又非所宜雖然歸芎能行氣之滯何獨療血參耆能止血之脫又何獨益氣乎陳皮半夏陰陽有造化升降消長者生主長主升主造屬陽息主消主降主化屬陰陰化而陽造之陰降而陽升之至消則滅而無復長矣又降其性沉化其性緩消則其性速也化又有生生不息之機曰生化曰化生曰化強化頑曰風化德化是皆由漸而致之此物理之最微而最彰者也陳皮理脾化氣非補脾益氣也留白為橘皮尚能和中以白性甘緩也去白為橘紅則專乎降氣消痰為剝削之物矣降因滯氣升消因痰壅盛惟升則降之盛則消之降之消之有滯氣痰壅則病受之若夫脾虧作滯脾虛生痰便當君以參朮療本恐概用橘紅半夏二陳之屬則徒耗損真氣故先哲以六物必用陳者政為新性暴烈泄真之故耳至半夏性燥久服亦能潛消脾之真氣必惟因濕生熱因熱生痰用之則宜亦只宜暫宜少未有脾胃健而濕熱能為患者也奈何世之醫者每以二陳舉為常用扶脾之品竟不分脾陰脾陽有濕無濕屬虛屬實且曰王道如此甚至陰虛勞嗽金水俱敗尚亦妄用之近歲鹺客連翔梧患前症兩名醫俱投以款冬橘紅麥冬石斛白芍之屬喘嗽倍增且兼嘔悶乃支詞曰正要嘔唾痰盡便速愈耳籲昧病源而投見病之劑又矯本心之昧僞自己之異其不殺人也者幾希黃連黃連性苦燥大寒療諸熱濕熱及毒痢與胃經吐血藏毒下血佐以他藥最為有功然必惟患實熱元氣胃氣未傷者用之相宜但中病即止亦未可久服也自本草厚腸胃之言一出舉世醫者不分虛實拘執經文混行施治豈知斯言蓋為毒痢積熱熏蒸腸胃致腸垢刮削而下用連以解熱熱既消則腸胃復原而自厚所謂厚腸胃者以此若人賦稟不實雖有熱症用之則反敗胃漸耗真陽甚有火衰虛火之症而亦妄用何也故東垣曰實火可瀉芩連之屬虛火可補參耆之屬而薛立齊一部醫案記其誤歿於芩連苦寒之劑者不可勝紀雖然立齊治實火何曾廢芩連不用所貴乎立齊以異於劉朱者為其善甄別虛實真假故投藥如環而愈出愈奇耳經雲陽生陰長無陽則陰無以生又云少火生氣從未有沉陰無火之屬而能生長萬物者自此一經喚醒當勿仍前執迷黃芩黃連白芍龍膽黃柏知母石膏葛根滑石柴胡梔子凡諸經實熱宜用苦寒治之病少愈當即止否則恐妨胃氣用藥須察何經如黃芩梔子瀉肺火黃不外溫養陽氣勤培土母蕃息日昌至精盈血裕真陰復盛而假熱虛火不撲自滅若概投以黃柏知母之屬是陰血未生脾陽先敗假熱愈熾法竅身殆此非補陰乃賊陰也王太僕云大熱而甚寒之不寒是無水也宜用六味地黃丸壯水之主以制陽光薛立齊云總論陰陽二症雖有陰陽氣血之分實則皆因脾胃之陽氣不足所致若用黃柏知母沉陰之物反泄真陽多致不起則凡苦寒之屬委非陰虛所宜設使陰未虛而實熱為患暫用之何害嗟夫丹溪一代名哲也而乃不察病本混同立論遺害生民良可慨已玄參天門冬麥門冬天花粉知母貝母百部栝蔞仁地骨皮人乳藕汁白藥黃藥子前藥賦性甘寒固非苦劣之品亦只宜於燥熱實症者雖方書有云甘寒不犯胃氣愚以為不然夫味之甘者固與脾合而性之寒者獨不與脾忤乎連瀉心肝火龍膽瀉肝膽火白芍瀉脾火黃柏知母瀉腎火石膏瀉胃火葛根瀉陽明火滑石利六腑之澀結瀉膀胱之實火芩連兼瀉大腸火小腸佐木通與心腎同治柴胡專主足厥陰少陽而他經之熱不可混用也四物湯雖曰補血而丹溪以芍性酸寒能伐生髮之氣為産後所忌東垣又以春夏腹痛用芍秋冬腹痛用桂皆因非實熱不得概投寒劑而又推之天時人事則立言獨迥時流矣奈何丹溪以黃柏知母為補陰之用未免遺議千古夫陰虛矣未有諸臟能獨盛者根本既搖枝葉自萎理必然也切謂人身不過氣血兩端故左腎為精血之原為諸陰之主右腎為脾胃之母為元陽之根精血耗矣則陰為虛陰既虛矣而陽無附相火隨熾真陰日涸發為燎原假熱之症豈知真陽無附母氣既餒子脾何資致失轉輸之令遂乏生化之機即四臟亦為之虛也故欲滋生精血且秉質膏潤善滑大腸歷觀諸家本草盛稱其微獨瀕湖有云胃虛者禁用優劣宜忌始判然矣余見世醫治虛癆嗽痰發熱諸症亦有不敢誤投黃柏知母而二冬貝母栝蔞玄參地骨是所不免每每增劇脾氣頓傷轉為火脫便泄之症豈知陰虛則諸臟俱虛幸賴天生一線胃氣尚爾留連歲月一投以寒滑之劑只速其死耳若其脈症俱實真原未斫腸胃燥熱用之何妨凡治病須覘元氣虛實胃氣衰旺切不宜循症投劑此是醫家第一大關鍵熟地黃生地黃生地性甘大寒涼血清熱亦惟實熱者宜之故東垣云此藥大寒宜斟酌用之恐損胃氣至虛火假熱真陰枯涸之症則當以熟地黃為君蓋地黃性本膏賦沉寒一經蒸曬九煉工夫火候既足寒質自消始寒滑而今轉為溫潤始苦甘相雜而今轉為純甘無苦馨香醒鼻甘美動脾脾喜甘惡苦熟地則味甘者也脾喜香惡臭熟地則氣香者也脾喜燥惡濕熟地則氣燥而味甘潤者也脾喜溫惡寒熟地則性溫平而非偏寒偏熱之比者也脾喜補惡瀉熟地則奏功滋補不失中和者也擅有五德何矜九轉此物初終異用可知爐鼎變化自有妙理然制煉之要其地黃大者須蒸曬至十餘次劈開中有黑油如醫玉氣味甘香者方可用勿拘九數也亦不必用酒潤過方蒸蓋酒經蒸曬則成酸酢之味不為佳俟臨用時先一夜切碎如豆大以酒潤之次早略蒸片晌使兩物勻和酒氣尚存藥氣益香動與胃合易於運行此雷斆炮製之微義不可不留心也今醫者從便酒煮經日即用大乖古法有傷中氣停膈為患豈藥之咎哉至於市者不擇銅鐵物器煮過待售非惟損胃抑且消腎若輩只知覓利豈願害人用者忌之麥芽穀芽山楂神麯厚朴橘紅枳實青皮枳殼薄桂烏藥大腹皮萊蔔子檳榔前藥蓋消穀克食決壅宣滯消脹導痞之功為多也亦必有宿積為患元氣未虧病氣太過者用之有效且無傷若脾氣久虛難運飲食動觸生災茫昧誤服適足以取敗耳夫傷米食者穀芽消之傷麵食者麥芽神麯消之傷肉食者砂仁山楂消之傷果食者青皮官桂消之上焦傷者主枳殼中下焦傷者主枳實傷滯氣腹痛則主以厚朴烏藥大腹皮以上皆治形病有餘之實症也今之醫者不管元氣虛實不分積滯有無動以麥芽山楂神麯厚朴為健脾之物相率成習孟浪擲服暗耗真元遺害非小豈知宿積留中傷食惡食用此而攻積宣滯致使飲食復舊謂之健脾者以此實非此諸藥之能健脾也故東垣謂厚朴有滯氣則泄滯氣無滯氣則泄元氣又云枳殼枳實有推牆倒壁之功立齊亦言麥芽山楂善消腎氣神麯下胎破血不宜輕服諸賢諄諄告誡豈應執迷不返又立齊治食積諸症亦必以四君六君為主而佐以曲麥楂朴攻克之物庶補瀉兼行方於脾土無虧亦即潔古老人創制枳朮丸之微意耳大都痞滿腫脹病症屬實者則宜投以前藥若虛滿虛脹非參朮歸苓直補脾原無能奏效是又內經所云塞因塞用者也香附香附雖為快氣宣郁之聖藥婦人所必需但味苦氣辛苦主泄辛主散而一切陰陽氣血虛弱者忌之若脾氣虛弱作痞虛寒生脹宜用四君六君或加薑桂治之中氣既健痞脹自消此治本法也設使誤用香附耗泄真氣愈增脹滿耳甚有陰虛中敗火升作喘而亦妄用之只速其死也丹溪亦謂此藥性燥牛膝牛膝乃足厥陰經之藥諸家本草歷稱其補肝腎壯筋骨益氣力之功但賦性苦潤專泄而不專收力優於破瘀血下生胎消惡毒利水通淋在治實症者宜之若云補愚以為不然也夫所謂壯筋骨益氣力者蓋由風毒犯足濕熱傷下病從外得因而痿軟用此拔毒導濕則筋骨復常若肝血虛腎精竭而筋骨自痿此病從內傷即勤峻補猶嫌不足豈可用牛膝而益虛其虛乎雖瀕湖有云大都熟用則補肝腎生用則破滯血此語亦未見妥唯丹溪産後忌之義可見矣威靈仙威靈仙性疏利方家盛稱其善療諸風蠲痿宣毒功能不可盡闡愚亦以為大謬也若病非實症從外得者不可輕餌也故本草綱目有云此物能疏人真氣稍涉虛者宜禁之意可知矣大凡一藥具補瀉兩性只宜於實不宜於虛只宜暫用不宜久服人知其瀉之有功而不知其補之無能殊昧扶羸之理益彰通治之害松梅丸松香久煉以苦澀味盡入熟地烏梅為延年聖藥余曾用之果亦有功但內烏梅本草謂久服能蝕脾胃似非純補之物易以石棗或五味則全璧耳曩水西林旗峰太守公服之壽逾百後子孫修餌不絶咸躋期頤膾炙人口久矣愚以為不盡然也三山閲閥高第以世德承家稱水西林公之門為最惟其積善自膺天眷恐非爐鼎可致修齡夫豈無涼行之子勤餌仙劑而仍促算乎若自其變者言之至夭回壽跖此又理數之不可曉也赤苓豬苓澤瀉木通前藥利水宣濕稱有功亦惟手足太陽二經病積熱壅滯經絡或兼痰濕水邪用之相宜若真藏為患精血已虧神力日耗虛火燎原假熱混真者縱悉純補尚嫌不濟倘加滲利愈竭真陰矣按本草有謂久服澤瀉令人目盲有謂苓不水澄而令眼障有謂苓瀉兼用而令真水暴竭即立齊亦極言澤瀉久服導損真陰令人無子雖先生固常用八味六味亦必斟酌於多寡之間每見圓機絶識之士不泥古人之方亦未始不用古人之方之意也甘遂大戟巴豆牽牛芫花葶藶阿魏商陸薑黃鬱金之數藥者稟性毒烈敷功峻悍諸家每矜其能奏效俄頃又云必惟大積大聚用之相宜嗟乎此說誤世不小若積與聚何以大稱夫人元氣壯盛脾氣得運飲食入胃隨納隨化何有停留作祟乎及其漸衰也脾失轉輸物入為患傷於五臟則有伏梁息賁痞滿肥氣奔豚之積妨於七情則有虛腫實脹噎鬲反胃癥瘕之病故元氣微虛則積為微積元氣大虛則積為大積是積聚之大小由乎氣虛之微甚也治法斷須養正緩圖則可全生每有輕用前藥而速其死者比比也雖舟車丸羅破飲萬應丸諸方固宜於西北形氣壯實之人愚以為形氣既云壯實何以有此病恙況風氣日漓賦稟漸薄恐今之西北非昔之西北也亦須斟酌耳試舉一二以證其謬歲甲申冬里人曾云宇繼室年逾四旬素鬱怒𭒀居十載神思為病忽一日因行經暴怒血上溢兼致鼓脹初延一老醫投散氣藥不瘥且漸篤再延余治余曰此乃臟病得之數年今始顯發丹溪鼓脹論可鑑也脈已洪短與病相逆矣須峻補脾原功以漸致不半載不瘥議用六君加薑桂倍入參朮彼懼增脹死不敢服因改投金匱腎氣丸服一月血逆已止脹雖如故未見增劇為藥力未到須寧耐耳不信別請一醫恃有神丹謂旦夕可愈果投一藥下咽半晌而即脹消便泄進食靜睡精神快爽舉家欽以為神願擲百金奉壽而尤刺余之迂緩鮮識也及察前劑乃阿魏薑黃甘遂葶藶穿山甲牽牛玄胡之屬過數日症仍作仍投前藥亦仍隨手而愈獨氣困怠耳不三朝夕喘滿不堪再投而漫不應日甚一日未及旬而歿又余從舅曾六海長子亦因素郁患前症余曰此病治本稱難但廣費珍藥又非舌耕清儒所能辨當奈何未幾有進以草藥者彼悅捷法信而服之飯許大號數聲而死嗚呼病從何生藥從何治如此盲妄矜功頃刻殺人轉盼誰之咎也海藻海帶昆布此數藥者賦性鹹寒功能宣利本草極贊其消癭散結療諸水腫脹之病愚以為必惟形氣與病氣俱實者用之得宜設若稍虛未有不反增劇也大都前症多主肝脾兩經虧損之故惟能明於陰陽水火之微洞察化源資取之義斯可以語治道矣枇杷葉石斛草扁薏苡沙參芡實蓮鬚燈心草木通浮小麥麻黃根此數藥者稟質薄劣取味淡平具有虛聲渺無實能魚魚鹿鹿無濟緩急豈國老之甘草黃耆之綿耆君子之參苓所能倣佛萬一然只可與共笑談不可與同患難也今之醫者取其平淡無毒謂能持王道者大要莫外此類籲所協理諸病何病乎果可以迂緩闒茸之流與商治策乎豫請逐節而詳言之枇杷葉固云治嗽矣豈知人之陽常有餘陰常不足金水二臟必保養之始能相生病則俱病經云諸逆衝上皆屬於火原病式曰五志色欲之動皆屬相火水衰而火無所制得以沖逆於上其水莫能救母之鬼賊鬼賊愈盛而受克愈虧矣論治法以苦寒瀉火則土藏不堪以辛溫補母而子金無濟必惟益水滋腎以膏潤純甘之品得水少充則火便少熄火熄金復仍爾相生矣而輕飄之枇杷葉從治肺之標得乎石斛草固云清肺健脾益腎矣此物果兼溫涼兩性乎夫肺待清必屬熱脾資健必本弱今母虛反為瀉子子實而又補母何相混也大凡氣之厚者主陽味之厚者主陰以輕虛之質嚼蠟之味謂能補腎得乎扁豆不過蔬饌中一物謂曰無傷脾胃可也乃云能益脾和胃抑何迂闊薏苡亦諸谷中一側谷耳昔伏波載歸以舟亦必經年久服或少見效而取以為方藥治病得乎沙參本草謂能補肺之陰人參益肺之陽試思肺之陰何由而虛乎病自有本金水相生肺之陰即腎之陰也滋苗者必固其根豈平淡升浮之沙參果可益陰乎而易老取以代人參殊不知體質既殊功能亦異安能代也惟葛稚川謂沙參主療卒得諸疝小腹及陰中相引痛如絞蓋疝及小腹引痛乃厥陰為患沙參金藏藥也得相制耳豫每用此與升麻以療疝症往往奇中愈信葛言不誣若夫芡實蓮鬚果可止遺固精乎汪石山曰經云腎屬水受五臟六腑之精而藏之又曰主蟄封藏之本腎之處也又曰陰陽之要陽密乃固故陽強不能密陰氣乃絶陰平陽祕精神乃治陰陽離決精神乃絶又曰陰陽總宗筋之會會於氣街靈樞曰厥氣客於陰器則夢接內蓋陰器者宗筋之所聚也而足太陰陽明少陰厥陰之筋皆結聚於陰器與衝任督三脈之所會然厥陰主筋故諸筋皆通於厥陰腎為陰主藏精肝為陽主疏泄陰器乃泄精之竅故腎之陰虛則精不藏肝之陽強則氣不固若陰客於其竅與所強之陽相感則精脫出而成夢陽強者非藏真之陽強乃肝臟所寄之相火強耳第病多端亦有不專在肝腎而在心肺脾胃之虛火反淩水土不制水金不勝木者然必傳於腎肝而致精之失也有自然相傳之理焉治法從肝腎本臟而得者獨治本臟從他髒得者則以他臟為主肝腎為標由陰陽離決水火不濟者則因而和之陽虛補氣陰虛補血陽強者瀉火陰實者益火本臟多主有餘他臟或兼不足有正治反治從多從少之異何世醫不辨陰陽水火或清之澀之溫之熱之非使真水耗竭則令真陽痿敗骨立脂枯神消氣陷不可復救矣前藥豈能奏效萬一哉燈草木通雖曰甘淡滲竅第病邪不一而傳於膀胱成淋者病自有本若以前藥之屬利胞之熱未全善也夫淋雖由熱生濕濕生則水液渾濁凝結為患又有服金丹入房致敗精流於竅中及飲食失宜七情過度虛實不調藏氣不和致腎虛而膀胱受熱又有肺痿而上源失通調之令有液枯而水道乾澀不潤又有膏石血氣沙勞冷七種之別又有小腸移熱而應於心者又有痰積而滲入胞者又有小便不通與溺數而短及溺血溲血淋血或失氣化之常或病脾而九竅不通仲景亦謂胃氣行則小便宣通而淋亦有因脾虛如太陰初作之氣病中熱脹而成者大抵病固多端不外虛實寒熱溯其源而治之斯中病情矣如浮小麥麻黃根氣味索然果可以療汗脫之重症乎即有他藥佐使亦屬贅龐耳夫人陰陽相維營衛運行無失常度血氣得灌溉護衛之用汗為心之液主於氣陽密乃固則氣不外泄衛氣虛為自汗陰氣虛為盜汗傷寒盜汗責在膽熱初症傷風而汗有傷濕傷暑勞役柔痓而汗者有陽虛冷汗者雖有陰陽寒熱之殊究竟皆元氣之脫越或虛憊不升耳當從此根蒂處察虛實治之倘未得其竅即參耆朮苓亦難為用矧茲二物乎香薷香薷氣香味辛諸家咸稱為治暑要藥但暑有不同而方法亦隨異設若乘涼飲冷致陽氣為陰寒所遏遂病頭痛發熱惡寒口燥或霍亂而成吐瀉固宜用此以升散風寒消水和脾古方亦有用大順散者蓋暑月之用香薷亦猶三冬之用麻黃若氣虛則不宜輕用也其有起居失宜飲食失節勞役斫喪之人中暑大汗燥渴喘促脈見芤虛或遲細或吐或瀉乃勞倦內傷不足之症須清暑益氣湯或人參白虎湯去石膏及苦寒之味而主以益氣清火之品則善矣又有傷暑而兼夾陰尤須舍時從症倘此而概投香薷耗泄真陽必變而為惕瞤亡陽之禍殊犯虛虛之戒若形氣俱實而傷暑者投以瓜水之屬無不愈也今人暑月不拘有無傷暑煎此代茶豈知氣香主竄味辛主散元氣虛者反以招暑取中亦如久飲川芎而得暴亡之害者也又有謂香薷善治諸水蓋水多主藏虛惟形氣未羸病在經腑者深師薷術丸用之可效但不得一例視也唯能明於氣化之義者斯可與語治水之方矣試思氣化之義云何桃葉許學士本事方云傷寒病醫者須顧表裡循次第昔範云為梁武帝屬官得時疫熱疾召徐文伯診之是時武帝有九錫之命期在旦夕云恐不預求速愈文伯曰此甚易但恐二年後不起云曰朝聞道夕死可矣況二年乎文伯乃以火煆地布桃柏葉於上令云臥之少頃汗出粉之翼日遂愈後二年云果卒取汗先期尚能促壽況不顧表裡時日便欲速愈乎夫桃葉發汗亦良法也尚有此戒可不慎歟愚按傷寒論汗吐下三法未始不善雖曰西北形氣病氣俱實者用之相宜但今亦須斟酌耳設若東南風氣巽弱稟賦不實者雖有可汗可吐可下之症宜從清解超繩墨規矩之外而獲不汗不吐不下之妙且以完其氤氳清純之元氣不至浪劑潛促天年保全綦大矣而人多不知也經曰邪氣盛則實精氣奪則虛大凡病之實者皆氣之虛也知治其實昧救其虛則虛者益虛致實者益實病斯殆矣故經曰不能治其虛安問其餘夫汗固以解表邪而表邪未甚輕汗之衛氣不幾虧歟吐固以宣中積而中積未滿輕吐之胃氣不幾虧歟下固以泄裡實而裡實未堅妄下之營氣不幾虧歟虧衛氣胃氣營氣便虧元氣矣元氣一傷老者絶少者不復矣然不特此也每見時師不拘何病概以麥芽山楂神麯橘紅半夏為健脾之物以青皮枳殼枳實厚朴檳榔香附為調氣之物乃曰脾得健則食進氣獲調則病瘥夫此輩之所謂健脾者政敗脾也所謂調氣者乃損氣也粗工既惜費而售賤藥愚人喜便宜而甘隱戮其失等耳此人亦多不知也豫因嘆範云之殉虛榮而喪實命若過赤松釣臺不識當作何如想乎天麻天麻氣微辛味甘平質堅潤而沉療諸風主足厥陰經而本經謂能益氣力長陰肥健大明子亦云補五癆七傷助陽氣鄧才雜興方取為益氣固精要藥羅天益曰眼黑頭眩風虛內作非天麻不能治據此則天麻何啻治風尚為足少陰腎經滋補之劑味此風虛內作四字可知本虧致病補助力優豈羌活防風獨活荊芥諸辛燥傷陰之物所能比擬萬一哉余每用以療産後諸虛劇症及遺精失血與挾虛傷寒頭痛往往奏奇世人奈何僅以風藥目之是未悉乎天地造化萬物得氣之粹者之蘊矣何首烏何首烏一名夜交藤一名九真藤一名地精性味淳和功能靈異真仙草也余夙服有驗敢悉精微與世同好焉按唐李翱傳云何首烏者順州南河縣人祖名能嗣子名延秀能嗣本名田兒生而閹弱年五十八無妻子常慕道術隨師在山一日醉臥山野忽見有藤二株相去三尺余苗蔓相交久而方解解而又交田兒驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之曰子既無嗣其藤乃異此是神仙之藥何不服之遂杵為末空心酒服一錢七日而思人道數月似強健因此常服至二錢經年舊疾皆痊發烏容少十年之內即生數男乃改名能嗣又與其子延秀服皆壽百六十歲發猶黑有李安期者與能嗣鄉里親善竊得方服其壽亦長遂敘其事傳之云何首烏味甘性溫無毒伏苓為使治五痔腰膝之病冷氣心痛積年癆瘦痰癖風虛敗劣長筋力益精髓壯氣駐顏黑髮延年婦人惡血痿黃産後諸疾赤白帶下毒氣入腹久痢不止其功不可盡述又云其根形大如拳連珠其有形如鳥獸山嶽之狀者珍也掘得去皮生吃得味甘甜可休糧贊曰神效勝道著在仙書雌雄相交夜合盡疏服之去谷日居月諸反老還童變安病軀有緣者遇最爾自如明州刺史李遠云何首烏者世之真仙草也五十年者如拳大號山奴服之一年發髭青黑一百年者如碗大號山哥服之一年顏色紅悅一百五十年者如盆大號山伯服之一年齒落更生二百年者如斗栲栳大號山翁服之一年顏如童子行及奔馬三百年者如三斗栲栳大號山精純陽之體久服成地仙也李瀕湖曰何首烏足厥陰少陰藥也白者入氣分赤者入血分腎主閉藏肝主疏泄此物氣溫味苦澀苦補腎溫補肝能收斂精氣所以能養血益肝固精益腎強筋骨烏髭發為滋補良藥不寒不燥功在地黃天門冬諸藥之上氣血泰和則風虛癰疽瘰癧諸疾可愈矣嘉靖初邵應節真人以七寶美髯丹方藥進世宗服餌有效連生皇嗣於是何首烏之方天下大行矣宋懷州知州李治與一武臣同官怪其年七十餘而輕健面如渥丹能飲食叩其術則服何首烏丸也乃傳其方後治得盛暑中半體無汗已二年竊自憂之造丸服至年餘汗遂浹體其活血治風之功大有補益七寶美髯丹主烏鬚髮壯筋骨固精氣續嗣延年其方用赤白何首烏各一斤如法制煉入赤白伏苓各一斤牛膝枸杞當歸菟絲子各八兩補骨脂四兩以蜜煉丸晨夕吞服為滋益上藥功能不可闡述此古成方也大都人有陰藏陽藏之不同其屬陰藏者宜與此丸為有骨脂溫暖真陽也若陽藏而臟腑燥熱素耐寒涼者則當去骨脂減當歸加熟地黃十兩酒蒸知母二兩可令水火兩平而免偏勝之患愚意又以赤苓性屬滲泄須禁之庶久餌而無隱耗之弊得全全善矣及遍閲方書亦有單服者各隨方法大要莫外此藥為君也憶余髫齡十四通精施泄無禁關門虛滑每少勞則病夢遺及歲十七從娶親後尤覺神氣不支虛焰侵膚時或盜汗皆少年不慎真藏為患也余伯父心宇封君素以儒醫擅名大較主治泥成法無外金鎖丹固精丸蓮鬚牡蠣金櫻鰾膠之屬時雖少止暫輟仍復沉疴數載幾無人理至二十二歲抵楚慈陽幸逢胡慎庵先生治法獨異常流令服參耆歸苓熟地升麻石棗阿膠知母麥冬等藥又以何首烏為君茯苓五味沙苑蒺藜蓯蓉仙茅當歸諸品為丸晨昏服丸午際啜湯甫兩旬前症減半越三月得全愈自是勤服不輟蒲柳柔資禁受風霜益信前哲非誣語也與世之造淫丹暗鑠真陰漸促天年者則大不侔矣特怪世人進鋭退速不勤久餌墮功半塗咎藥迂緩遂使完真善術絶響無聞耳抱朴子云上黨趙瞿病癩歷年垂死其家棄之送置山穴瞿怨泣經月有仙人見而哀之以一曩藥與之瞿服百餘日其瘡都愈顏色豐悅肌膚玉澤仙人再過之瞿謝活命之恩乞求其方仙人曰此是松脂山中便多此藥汝煉服之可以長生不死瞿乃歸家長服身體輕薄氣力百倍登危陡嶮終日不困年百餘歲齒不墜發不白夜臥忽見屋間有光大如鏡久而一室盡明如晝又見面上有采女一人戲於口鼻之間後入抱犢山成地仙於時人聞瞿服此脂皆競服之車運驢負積之盈室不過一月未覺大益皆輒止焉志之不堅如此松脂即松梅丸之君藥也附子肉桂附子生用則性奔竄而有毒熟用則質溫潤而無毒其大重一兩三四錢以上團坐平頂旁無多角者方稱附子性主沉補命門真火其小僅一兩以下者或挺尖或歪側或兩臍或多角皆為川烏性主驅風逐寒走散經絡而非熟附子溫補之比也若附子制以薑汁與乾薑生薑同用則為姜附湯主治足三陰驅散上下表里經絡臟腑之客寒為要藥其療真陽虛脫則當用童便制者君以人參其薑汁製者不可混用也蓋薑桂附子同為大熱第姜性兼辛主發散而桂味甘而辛可升可降若熟附則質重性沉主下行所以不同也若陽脫而誤用姜令陽愈脫矣何以言之立齊曰先兄體貌豐偉唾痰甚多脈洪有力殊不耐勞遇風頭暈欲僕口舌欲裂或至赤爛誤食姜蒜少許口瘡益甚服八味丸及補中益氣湯加附子錢許即愈停藥月餘諸症仍作此命門虛火不歸元也據此則姜附雖均稱熱藥何可混施乎虞搏曰附子稟雄壯之質有斬關奪門之功能引補氣藥行十二經以追復散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫暖藥達下焦以祛除在裡之冷濕吳綬曰附子乃陰症要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者急須用之有退陰回陽之力起死回生之功近世陰症傷寒往往疑似不敢用附子直待陰極陽竭而後用之已遲矣且夾陰傷寒內外皆陰是陽氣頓衰必須急用人參健脈以益其原佐以附子溫經散寒舍此不用將何以救之王氏究原方云凡用桂附藥並宜冷服者熱因寒用也蓋陰寒在下虛陽上浮治之以寒則陰氣益甚而病增治之以熱則拒格而不納熱藥冷飲下嗌之後冷體既消熱性便發而病氣隨愈不違其情而致大益此反治之道也昔仲景治寒疝內結用蜜煎烏頭近效方治喉痹用蜜煎附子含之咽汁丹溪治疝氣用烏頭梔子並熱因寒用也東垣治馮翰林侄陰盛格陽傷寒目赤煩渴引飲脈來七八至但按之則散用姜附湯加人參投半斤服之得汗而愈此神聖之妙也考昔荊府都昌王體瘦而冷無他病日以附子煎湯飲兼嚼硫黃如此數歲蘄州衛張百戶平生服鹿茸附子藥至八十餘康健倍常宋張杲醫說載趙知府耽酒色每日煎乾姜熟附湯吞硫黃金液丹百粒乃能健啖否則倦弱不支壽至九十他人服一粒即為害此數人者皆其臟腑賦稟之偏服之有益無害不可以常理論也愚以為此藥唯陰藏者宜之若陽藏而誤用受禍極速也凡用桂附須君以人參少佐甘草或大棗則無毒仲景八味丸亦為陰火不足者設故陽盛假寒不宜妄用也桂性甘辛大熱能宣導百藥通血脈有汗能止無汗能出桂枝主上行而散肉桂主下行而補驅風理寒定煩解渴與附子同補命門真火專益脾胃之母亦善利水通淋止虛脫破淤血功能不可盡闡又治喉痹失音陽虛失血內托癰疽痘瘡九種心痛脅疼痎瘧奔豚疝氣利肺抑肝冷痰霍亂喘脹諸症李瀕湖曰麻黃遍徹皮毛故專於發汗而散寒邪肺主皮毛辛走肺也桂枝透達營衛故能解肌而風邪除脾主營肺主衛甘走脾辛走肺也肉桂下行益火之源此東垣所謂腎苦燥急食辛以潤之開腠理致精液通其氣者也又醫余録云有人患赤眼腫痛脾虛不能飲食肝脈愈盛但於溫平藥中倍加肉桂殺肝而益脾故一治兩得經云木得桂而枯是也是桂又通治寒熱虛實內外上下而配合得宜隨試隨效者也竊謂桂附乃斬關奪門之將非良師莫敢輕用然立齊每用此以救真火不足及虛陽假熱之病疊奏殊效非時師所能方物也蓋立齊治法則歸本命門者也東垣則專主脾胃者也河澗丹溪則專主相火濕熱者也子和則專主攻擊者也節齊隱君則專主攻痰瀉火者也仲景則專主外感者也法有偏擅醫當全識若療命門則用立齊治脾胃則用東垣清濕熱則用劉朱習攻擊則用子和蠲實痰則用二王至傷寒雖宗長沙而三陰主治參朮歸附率多救里則又不專於外感也若用諸子而不為諸子所用機權在我法從人施一人而兼衆人之用衆人而資一人之識斯得矣至立齊先生則又集諸家之大成發前人所未發開將來之聾聵者也奈何時師視桂附如蛇蠍應用不用卒至誤人於死蓋亦因丹溪謂附子無人表其害人之禍故致有泥成說而坐失機宜者雖然使用非所當即參耆亦能為害何獨桂附乎醫學綱目有云黃耆能助三焦之火人參能補諸經之陽白朮能長五臟之氣此三者皆上藥是在人體悟而無失其氣宜可也余因續之曰桂附能救陰陽之脫麻黃麻黃性辛熱主散善發汗唯三冬正傷寒太陽症脈浮緊者宜之與夫三拗湯之治哮喘實症暫用無妨若余月而脈非浮緊不免致斑黃之患甚有真陽外脫純熱無汗誤投必死山漆山漆近代出自粵西南丹諸處唯治軍中金瘡及婦人血崩不止與男子暴吐失血而真元未虧者用之極有神效奏功頃刻若虛勞失血陰陽損竭便當尋源治本噓血歸經誤用此藥燥劫止塞反滋禍害也特舉一二言之丙子秋余蜀歸見猶子婦乃陳曲江公女也虛損吐血醫用此藥未及月而歿又余案內所開社友鄭去華季郎與庠生陳子貞皆以心腎虧損吐血亦用此藥致經旬腸結而死可不戒歟金銀鉛汞珍珠琥珀龍骨金星礞石陽起石丹砂石脂牡蠣滑石石膏雄黃輕粉消石白礬石英玄明粉一切金石性屬剽悍病者元氣未損腸胃壯實依本草主治暫用無妨若腸胃柔弱血液枯燥用之亦反滋患也每見一二妄醫輒療貴人病恙率用珍珠琥珀擅稱至寶往往遺患非小牛黃麝香冰片檀香安息皂角此數藥唯治初症風痰停膈昏迷不醒及惡氣暴染者宜之若藏氣虛者用之頓泄真陽陽散便死矣凡治病察新久虛實極是緊要沉香乳香木香蓽茇莎仁白豆蔻草豆蔻蓽澄茄大小茴香益智川椒沒藥血竭丁香檀羌活獨活防風荊芥白附石南紫蘇防已川烏白芷藁本蔓荊甘菊細辛薄荷蟬蛻馬兜補骨脂俗訛為破故紙本草稱治五癆七傷風虛冷痛骨髓傷敗腎冷精流及婦人血氣墜胎興陽事明耳目瀕湖曰治腎泄通命門暖丹田斂精神按白飛霞方外奇方云補骨脂屬火收斂精神使心包之火與命門之火相通故元陽堅固骨髓充實澀以治脫也胡桃屬木潤燥養血血屬陰惡燥故油以潤之佐骨脂有木火相生之妙許學士雲孫真人言補腎不若補脾豫曰補脾不若補腎腎氣虛弱則陽氣衰劣不能熏蒸脾胃脾胃氣塞令人胸膈痞塞不進飲食遲於運化或腹脅虛脹或嘔吐痰延或腸鳴泄瀉譬如鼎釜中之物無火力終日不熟何能消化濟生二神丸治脾胃虛寒泄瀉用補骨脂補腎肉豆蔻補脾二藥雖兼補但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩空虛則受物矣屢用見效不可不知昔唐太尉張壽知廣州服此得效有詩云三年時節向邊隅人信方知藥力殊奪得春光來在手青娥休笑白髭鬚愚以為此亦惟稟陰藏而命火不充下元虛冷一切症屬沉寒者宜之若陽藏而腸胃燥熱者則反為害耳是在人之有宜有不宜若以為燥毒則謬論也豫每用此與參附治元氣上脫脈浮沉無力者不拘陰陽屢驗可知其為納氣歸源溫補真陽之善藥也本草綱目雲氣味辛大溫無毒惡甘草忌蕓薹及諸血得胡桃胡麻良故語云補骨脂之無胡桃猶水母之無蝦也肉豆蔻肉豆蔻溫中消食止泄治積心腹冷痛霍亂嘔吐解酲下氣赤白虛痢為暖脾胃固大腸之要藥蓋脾喜暖惡寒喜香惡臭故肉蔻之溫香能治一切前症寇宗奭曰亦善下氣多服則泄氣得中則和平其氣朱丹溪曰屬金與土溫中補脾日華子稱其下氣以脾得補而善運化氣自下也非若陳皮香附之快泄寇氏不詳其實遂以為不可多服也誤矣大黃大黃性苦寒無毒一名將軍一名火參東垣曰推陳致新如戡定禍亂以致太平故有將軍之號主平胃下氣逐瘀血破癥瘕積聚留飲去痰實瀉諸實熱不通除三焦濕熱心下痞滿下痢赤白裡急腹痛小便淋瀝譫語黃疸火瘡諸症此藥乃足太陰手足陽明手足厥陰五經血分之藥若在氣分者用之是謂誅伐無過矣蘇頌曰古人用毒藥攻病必隨人之虛實寒熱而處置非一切輕用也梁武帝因發熱欲服大黃姚僧坦曰大黃乃是快藥至尊年高不可輕用帝弗從幾至委頓梁元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黃無瘥理帝從之遂愈以此言之今醫用一毒藥而攻衆病其偶中者便謂此方神奇其差誤則不言用藥之失可不戒哉薛氏醫案云判官汪天錫年六十餘患痢腹痛後重熱渴引飲飲食不進用芍藥湯內加大黃一兩四劑稍應仍用前藥大黃減半數劑而愈此等元氣百僅一二夫立齊治病固專主溫補第藥隨病施抑何曾廢攻伐不用乎葛可久武勇絶倫因挽百石大弓病內傷治用大黃八兩其子憚其峻厲陰減半病不盡蠲可久曲詢始知其故曰吾明年當死矣至期果歿此又病有輕重不得以毒藥衰其大半而論也崇禎戊寅歲余客汴梁為一郡王治宮人産後發厄症因言及其先生壯齡時患瘧痢翻胃遍治不瘥自料無生理一草醫亦精於脈者連投五劑用大黃七兩始能食再投十餘劑計大黃斤許前症漸愈後日服滾痰丸兩旬方得全痊越年餘連舉五嗣壽至九十三而薨如此賦稟是亦東南所不概見者甲申夏余表侄鍾仲章因為其先人營葬暑月汗泄勞力冒寒一醫投解表藥內加大黃一錢未終劑而神思困頓嘔逆不堪再延茅復陽投對症藥未嘗不善第胃氣已傷亦不見愈余以補中益氣湯加減數服漸愈稍勞便復淹延三月方瘥竊觀仲景傷寒承氣方旨必惟三陰里症燥滿實堅全具者始可用奈何三陽表症而遽混投之寧不犯陰盛陽虛汗之則愈下之則死之戒乎又況為勞力傷寒耶大凡藥稟偏寒偏熱而非中和上品者尤須經心酌用非可逞意輕率也常山愚按諸家本草皆稱常山苦寒有毒為截瘧要藥但此最敗真氣瘧邪未解遽用止截雖頓愈一時轉息復發或變生他症腫脹為患往往大命殉之目擊多矣然必惟元氣壯實山野頑夫或可暫用也汪石山曰本草於知母草果烏梅穿山甲皆言治瘧然知母性寒入治足陽明獨盛之火使其退就太陽也草果性溫燥治足太陰獨盛之寒使其退就陽明也二味合和則無陰陽交作之變故為君藥常山主寒熱瘧吐胸中痰結故用為臣甘草和諸藥烏梅去痰檳榔除痰癖破滯氣故用為佐穿山甲以其穿山而居遇水而入則是出陰入陽穿其經絡於榮分以破暑結之邪故用為使若脾胃鬱伏痰涎用之必效苟或無痰只是暑結榮分獨應足太陰血分熱者當發唇瘡此方無效丹溪曰常山性暴悍善驅逐能傷真氣病人稍近虛怯不可用也張通一曰余閲瘧門方劑多不分表裡先後俱用芩連知母及大黃石膏之類夫以表邪不解而得此寒涼則寒邪愈陷或任用常山草果及劫截峻厲等劑若正為邪傷而受此克伐則元氣愈虛故多致綿延不已輕者變重重者至危是皆不得其本耳得則易如反掌在察所由而已愚以為治瘧之法當操其要無越新久虛實標本六者而已若新病標多元氣實者即用仲景法察晝夜遲速治之劉宗厚云從卯至午發者宜大柴湯下之從午至酉發者宜大承氣湯下之從酉至子或至寅發者宜桃仁承氣湯下之更以小柴胡湯徹其餘邪其脈實長者先以大柴胡下之餘熱不盡再用白芷湯或甚寒微熱或但寒不熱名曰牝瘧用柴胡桂枝以解表凡此皆治實之道也若病久而標少元氣虛者或間日一發則用補中湯氣血俱虛三四日一發者此人里之深也用十全大補湯或因飲食所傷則以六君為主或勞傷中氣亦以補中為主至其日久不愈只用人參一二兩生薑減半煎濃湯於將發之先一二時不數劑頓止亦有病久而標尚在元氣未虛者又須攻補兼施又有新病暴虛急宜救本不得以病邪正熾難用峻補而論也大意有汗要無汗以扶正為主腠理開泄陽不能固必補斂之無汗要有汗以散邪為主腠理密緻邪不能解必發散之雖曰有汗宜補亦當兼散無汗宜散亦當兼補蓋邪氣盛則實不可不攻精氣奪則虛不可不補也故在陽分者淺而易治在陰分者深則難治在春夏易在秋冬難在上體易在下體難在少壯易在衰老難至婦人在胎前産後尤難其治也務必由陰而陽由晏及早由下及上或寒多熱少或隔日轉成一日一發此由臟及腑也汗必由頂至足為易愈立齊云凡病大熱燥渴以薑湯乘熱飲之此亦截瘧之良法也每見發時飲啖生冷物者病或少愈多致脾虛胃損往往不治又云余常以參朮各一兩生薑四兩煨熟煎服即止或以大劑補中益氣湯加煨姜尤效生薑一味亦效籲此法極妥何必別尋妄劑至清脾截瘧二飲斷不宜輕服蓋養正則邪自除可僥速效而喪生乎又有如瘧之症夫真瘧病在風寒暑濕之感而如瘧則為臟腑氣血之衰一由營衛之出入以為止作一由水火之爭勝以為盛衰一責在表一責在裡一攻在邪一扶在正有陽虛而寒熱如瘧有陰虛而寒熱如瘧蓋如瘧而非真瘧也是非之間便有邪正虛實之分治一少差生死反掌學者尤不可不知杏仁桑白皮款冬花馬兜鈴金沸草紫菀蘇子射干百合桔梗此數藥者與寒滑之天麥二冬栝蔞仁天花粉知母諸品時師皆執為治嗽通用之劑竟不分表裡虛實之殊往往誤人於死經曰五臟六腑皆令人咳又曰五臟各以其時受病非其時則傳以與之是非獨在肺矣咳即嗽也然嗽有內外之殊故自表而入者六淫邪氣先客於肺為外感宜從前藥辛溫以散之所謂從表而入者必令從表而出最忌苦寒斂澀之劑致邪氣留連不去久必變生他症是猶閉戶驅盜也至自里而見者七情勞欲臟腑虛損為內傷有因嗽而成癆者有因癆而致嗽者其原有四一左腎精傷水虧致火鑠金而嗽者則宜甘平靜劑以潤之一已土中虛不能生金夾痰而嗽者則宜辛甘溫劑以養之一心肺胃三經火鬱而嗽者則宜苦甘涼劑以清之一命門火衰元氣素虛肺金寡衛而得者則宜甘熱溫劑以補之所謂從內而得者雖必傳於外而非可以外治也最忌前藥辛散苦寒之品泄陽降陰招致外邪是猶啓戶揖盜也又有初屬外感因錯治而內外俱傷者則當補散兼行以扶中為主若專於驅散腠理開泄轉成汗脫益覺增劇耳又有老人痰嗽元氣既虛法難消伐亦必溫養為主或兼治標勢難全愈但無至困殆則得耳大抵六脈浮緩或兼洪滑形色如常飲食不減者可治若脈弦數細疾肌肉漸削便泄食少臥難著枕喘息日增者計期必死治病本難而治嗽尤難得其竄者十可愈半百合乃平潤之品亦無甚功特伴食中書耳桔梗性平質輕載藥上升乃舟楫之用也桃仁紅花澤蘭赤芍茜草五靈脂蒲黃苧麻根紅曲蘇木益母草續斷紫參牡丹皮川木槿紫荊桃仁蘇木諸藥乃破瘀行血之峻劑也但婦人經水不通有二一由風寒冷濕客摶衝任致血氣凝滯不通者則宜用前藥宣利之若血海乾枯無經可行者則當純補脾肝腎三經以滋生化之源此治虛之道也若益母續斷丹皮等藥性主生新消瘀猶屬補瀉兼行蓋丹皮白色者可涼血同熟地當歸參朮尚能生血其赤色者僅只清瘀而已無瘀則耗好血不可不知木槿紫荊兼解煩熱瘡癬有驗酸棗仁柏子仁郁李仁火麻仁蕤仁決明葵子以上皆滑利之品凡命門火衰滑泄及素患夢遺者忌用之棗仁治少陽膽熱不眠若風祕及熱客大腸閉結者則宜火麻郁李桃仁之屬若血涸津枯致大便乾澀者則宜滋陰之味但火麻性最峻利須酌之蕤仁決明佐治肝虛風熱目赤亦有效郁仁兼療眼痛及水腫病葵子利二便皆治實之物也生薑煨姜炮姜姜皮姜生者同蔥白主療外感初症發汗通經所必用也煨者主溫暖脾胃性主守炮者性卻平止嘔吐燥太陰之寒濕及治産後發熱有功但患陰虛咳嗽及病久陽虛者禁之誤用必致脫汗姜皮性平能引藥達表生梔子炒梔子炮梔子生梔性太寒古方用為吐藥療上膈之實熱經炒者性涼祛熱解煩保肺抑心其炮黑者性平除鬱滯理肝氣濟生逍遙散加之亦止血竅此一物而有三用也性寒涼平隨火變化耳殭蠶全蠍諸蛇釣藤天竺黃鈴羊角蜈蚣此藥方書謂療中風驚風諸風口眼喎邪咬牙閉齒四肢抽搐諸病為有功但中風主臟病多不治又有似中風而非真中風若河澗主於熱丹溪主於濕東垣主於氣者是也大都真中風實由元氣素虛故得乘虛召感所謂肝虛風自生者是也此須急投溫劑峻補真元庶可望蘇若誤用前藥辛竄耗散之物只速其死耳里人姜郢雪年六十餘素不謹酒色一日因積勞遠歸醉鼾當風遽病亡陽面色如妝閉目搖頭時醒時昏遺尿足冷絶無痰涎此真氣暴脫十有九死危症也余令亟投大劑參附等藥謂或救萬一遲則不治矣渠次郎即往市參許久未回余與王遂生辭歸未幾有一老醫至診之曰此病風痰何妨豫治之多矣奈何妄議參附燥毒助氣之劑少俟明日病愈用參調理未晚遂投驅風攻痰之藥至晚即歿其明驗也麋茸阿膠石棗麋膠龜膠枸杞肉蓯蓉巴戟天松子仁懷山藥杜仲覆盆龍眼蘿藦子酥酪金櫻子
