front:
  text: 序豫入閩停車參晉安每晨興翹望紫氣西浮知其下有異人隱焉因憶梓里十年來至今人殷尸祝稱蕭使君者非地此耶齋誠以謁造其廬則蕭蕭旋馬數椽也升其堂僅圖一幅敝榻二三耳圖為我西川父老子弟頌功德文也仰瞻屏聯一曰忠孝一曰廉節此使君長物也顧旁有小室顏曰拙勤軒架叢帙千半皆岐黃正典知為賢公子讀書處此又使君遺公子長物也叩問主人許久有蒼頭者荷鋤而進曰客誰吾主人已入山閲月矣初意典型在望方資南指莫測空反增悵素懷無何使君歿賢公子以行狀示行狀言使君楚蜀宦績皆余曩耳所稔聆目所稔睹者晤談之頃稜稜者公子貌也表表者公子才華也亹亹而玉塵風生者公子懸河之辨也因咨當世之務重如軍國禮樂慎如錢穀刑書宣陳利害洞中機宜慷慨有大略余勸公子何不圖科第進取功名公子曰吾久已懷術隱矣遂別未幾以所著軒岐救正論示展卷讀之三不置而頓覺有悟箇中妙解陰陽水火直探靈素玄機往往奇正相生經權互用洵豫耳所未聆目所未睹之奇書也豫於此有以窺是父是子於仕隱之際分殊而道則同也試約略言之我西蜀古天府國也二十年來逆奢構難民生悴矣守令者務繭絲使君官此惻然休養備至非即公子之治病首重元氣滋益本根也耶蜀又三面鄰邊最狡者吐番部落耳自使君至數載撫馭宣揚威德嘗為司儲者刻核月糈幾至內向使君單車往靖諸部落投戈輸款消釁已萌非即公子之治病於未病也耶蜀夙稱淳朴地也邇來叛寇土司潛萌叵測豪宗巨猾隱肆跋扈使君甫蒞便與當事預畫消弭孰急可憂孰緩無慮孰為陽從孰為陰應晰條逆順一一掌指非即公子之治病明虛實真假之殊施攻補反正之方也耶豫又維使君之八載治蜀歷十三符竹也優遊臥理恥事搏擊有觸網者辱蒲鞭真古循良也非即公子之治病動察本源誅伐無過而默全生命也耶使君任邊儲其職也適羌胡內犯奉命監紀翼謀帷幄而戰守咸宜剿撫隨機非即公子之治病當存亡呼吸意解刃遊不循成法輒奏殊效也耶李官為直指寄耳目成都三十一城與五直隸州邑吏賢否屬李官評考會闕員使君受攝是任孰明廉孰貪昧高之下之直指賴以黜陟稱衡平非即公子之洞明神農本草之蘊縷釋良毒宜忌之要也耶使君蓋麟經起家也論世嚴袞鉞之權司刑凜春秋之筆非即公子所云時醫者軒岐之亂臣賊子也懸諸醫貞邪之鑑醒病家從違之方罔惜知罪特勤筆舌也耶使君蒿目時艱補救心苦吏之墨者救以清懦者救以立民之貧者軫恤救之逋者寬徵救之弊政為厲者湔除救之非即公子之憫痛時師循標治病浪劑殺人故獨毅然紏高陽偽訣之妄駁諸家成法之謬朗揭虛實真假之辨乃力抒救正之熱腸也耶使君由益州郡丞遷遵義太守知蜀將亂即拂衣歸非即公子所云燭氣化於幾先不治病於五臟將絶陰陽俱脫之候為妄治之前醫受過也耶古人云仕不至於相雖其澤之所及不若醫之博也公子無乃怏怏曰昧搴鵬之遠圖工𨢘雞之纖業同流當世莫竟先猷可乎斯論一出俾術此者亟把上池靈水滌卻讀高訣王徑的聾聵耳目味此歸本宗談心心直溯淵源使聽還耳視還目靈素還彰化育還盛蒙休食庇流衍將來其為功德豈可量哉獨是使君之再造吾蜀也蜀知之閩未必知閩知之海內未必知之一時知之將來未必知之豫治氓也可令使君徑節孤標顯猷隱績淪沒不揚豫其何能已於言哉豫其何能已於言哉嗚呼使天下吏如使君之為吏則天下無不可起之恫瘝使天下醫如公子之為醫則天下無不可治之疲癃豫也蓴鱸入夢將謀歸隱矣奚囊挾此廣布鄉國湛恩所及在在春臺疇不欣然相慶曰公子竟使君未竟之仁造福並州無替先猷惟有遙祝容駟光大旋馬之廬而已羽言辨首使天下後世知世德承家如蕭氏父子者其盛矣乎若公子者仁人也孝子也隱君子也序昔賢所云達則為良相不達則為良醫此名言也非通論也世有才居然相而專任罕遭不可謂之達者亦有位不必相而隨方補救不可謂之不達者達不達之故存乎天醫之為道也達之事也非不達之事也不達於古聖百家之言可謂之醫學乎不達於虛實本標之辨可謂之醫識乎不達於存亡呼吸之頃經權意創奇正心生可謂之醫膽乎達於胸不達於筆不足以匡時達於舌不達於書不足以壽世可謂之醫仁乎孔子曰已欲達而達人又曰辭達而已矣審乎此者其於蕭君之醫之書思過半矣蕭君非他乃姻太翁鹿陽先生之蒙嗣萬輿君也先生宦履維楚與蜀氣養清風膏調甘雨憂民如有病視己若無官至今人能傳之及其兩袖歸而家四壁鳳麟耶山斗耶今稱吏隱昔謂達尊蓋達不於位而於德也今萬輿君復以醫隱自居若曰吾未遑為良相之事云爾漢廷良相首出蕭何儼然一國手也亦惟漢高能專任之不然奚功之足神乃今欲讀其書了不可得相術之荒也宜哉萬輿君非其苗裔歟世德繩繩儒風穆穆救濟苦心於醫是寓而天慧所迎駸駸乎登峰造極立論著書實發前人之所未發學也識也膽也一言以蔽之曰仁是以恫瘝在心不憚風雨則戶外之屨滿矣不曰新甫功臣即曰景嶽益友則四海之聲不脛走無翼飛矣往往於隱之徑不合吾故曰達之事也蕭君於時流少所許可每津津惟隱凡莊君不置口敢問其次則唐君禪一也伯之仲之德不孤矣以視漢相其殆提張而挈韓乎此良醫之與良相埒非無謂也蕭君亦自命通隱隱而通之誠哉其達之之事也自序夫醫之為道也總君父師相之權而其學也究天人性命之微故君子取其精以治身推其餘以濟世斯仁術也乃後世以方技目之縉紳名士多所弗講司馬公不云乎達則為良相不達則為良醫醫其可以賤簡為哉豫髫齡弱稟質鈍志勞窮獵簡編苦心誦著嬰疾夢遺百治莫瘳繼因從宦遊楚慈陽邀學博黃州胡慎庵先生於衙齋治之三月獲痊先生蓋明醫李瀕湖公甥孫也因授軒岐祕典脈旨病機藥性方法一一精詳先生又私淑於立齋者也嗣入蜀復參印群賢頗得肯綮沉酣於斯二十餘載矣歸里後有請診視者目擊時師治病昧本從標枉斃生靈莫勝悲怛此無他蓋以習醫之人半屬匪人而所習之法全非正法經書不識旁徑樂趨於是專傷寒者忽於雜病主脾胃者憚於攻伐明濕熱者暗乎溫補或執成方而昧通靈變或逞臆説而架言出奇或憑口給而諛諂售姦罔惜人命顛倒妄行不幾為軒岐之亂臣賊子耶嗟乎醫病實多安能先救醫得醫病愈而人之病無不愈也豫因是竭一得之愚悉靈素之蘊發揮真假胍旨闡明藥性宜忌昭揭病機虛實朗懸醫病兩鑑操要五氣歸本一元數月運腕始成篇帙計卷有六僅字九萬低徊久之而猶訝諸法未備也會二三同志偶見而讀之曰得乎一者可以通乎萬矣未備云乎令余亟梓以救世之醫病兩家復捐資鳩鋟將欲以公天下嘉惠學者而乃不覆瓿棄之豫維是書之作也闡農黃之奧義抒自苦念紏時師之謬妄激自熱腸萬一寸管招尤致使正道難明謗吠日騰將奈之何韓退之先生云其或間居修史不有人禍必有天刑昔越人世稱神醫不免為同官李醯嫉殺東垣云就令著述不已精力衰耗書成而死不愈於無益而生乎故從古豪傑作用逞逞以身殉道倘斯論可售刮斯世於壽域而余戇拙無似何惜一已之知罪乎後之君子抑亦諒余之所以為救為正也歟崇禎甲申春二月上浣之吉閩中通隱子蕭京萬輿甫撰
