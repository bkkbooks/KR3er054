body:
  text: 跋嗚呼先君子沒歲一再周震不孝倚廬伏苫不能讀父書童時初識字見先君子案多注書有莊列素問難經諸注又自著書曰軒岐救正論凡數易稿始鐫版震曰兒可學乎先君子曰是非汝所知也厥後鄰屋災藏書多散佚各注以無別本不復存獨救正論已行世多藏人家然版已亡今春震再授梓人氏既卒業乃屬辭告墓捧遺書痛哭恨百身之莫贖也書大者天地四時五行六氣小至飲食居寢咸醞藉焉蓋上世混沌既開天有愆伏則時有災癘人有夭札黃帝憂之始嘗百草教人醫以救人窮而內經作洎數千年秦越人張仲景孫思邈王太僕李東垣許叔微薛立齋李瀕湖張景嶽間代一生湛深厥術其書具在也乃猶有劉河間高陽生馬宗素王宗顯錯忤其間溺學者之心至於膠結牢錮而日益甚先君子救正論所由作也大指言醫人當先醫醫救一世醫醫在一世救後世醫醫在世世也學者曷反其學一歸於正以毒人且以自尉或曰無傳方何也曰太倉公有言病多相類不可知必審診起度量立規矩稱權衡合色脈表裡有餘不足順逆之法參其人動靜與息相應乃可以論先君子之言也是已一篇之中三致意焉且存方於無有方皆方也以待讀者之深思自得之毋刻舟而膠柱以為世病而猶不悟也噫難言之矣震吳落無似去初識字三十年雖搏心揖志終不得其蘊猶夫童子也則何能讀父書乎嗚呼不孝男震泣血題凡例一是編之作也以救正稱因痛念乎晚近醫流昧靈素之大義守一家之偏法執迷脈訣樂趨捷徑忘本從標棄繁就簡致今邪説縱橫竟使正道淪沒枉害生靈狂瀾莫挽是何以異於棄周孔而冒楊墨哉哀此無知急喚回頭一著是編悉探靈素奧義陰陽水火玄機措詞立論只從口頭明明白白説去間雖繁復無厭詳慎並不屑巧創幻談及構艱深文字以炫世眼即有引證名賢成語亦皆闡明正論治本要法政因習是術者率多庸流粗識字畫而可復難之以隱晦不彰之微辭乎即辱穎慧鑑及亦省一番思索一是編以救言者非專救人之病乃先救醫之病也以一醫而治千萬人不過千萬人計耳救一醫便救千萬人救千萬醫便救天下後世無量恆河沙數人矣奈何世之醫者不先自救只圖救人每見其救人者適所以害人耳政先哲云人之病病疾多醫之病病道少此論不容不著謂此論為醫醫可一高陽生之脈訣乃殺人之鋒刃王宗顯之捷徑乃系人之桎梏雖然馬乏騏驥人豈徒行醫無緩扁病當悉死耶但以世之習此法者徒知療實病昧救虛病知療正病昧救假病以故虛者益虛假者莫反是本非可死而虛實顛倒致喪其生特醫死之耳謂此而非殺人之鋒刃系人之桎梏可乎夫脈有內經正法越人仲景叔和相繼闡揚於後近代崔紫虛之脈訣滑伯仁之樞要李瀕湖之脈學亦皆精詳易曉奈何舍此不問而徒斤守高陽生之鄙妄乎第今風氣漸薄人情澆囂而病情亦隨變幻叵測每多有假熱混真極虛反實之診政此真假疑似關頭便見生死反掌之異豫也不敏僣識斯脈欲使世之醫者病者預嫺審辨庶臨機不至倉遑罔措耳一本草綱目著自瀕湖李先生中多正誤發明之妙解洵神農下一人矣第編帙繁多至六十餘卷初學之士豈能悉了唯是常用品味不外百十餘種豫復再為闡發詳別宜忌虛實之殊仍參合病機之可否較李更覺易曉一醫者固當首明四診之義次察運氣次稔藥性又次詳病機方法矣獨不思病之寒熱由乎脈脈之虛實由乎氣氣之盛衰由乎元氣元氣則命之生死所攸系也豫因著有命門水火圖説五氣圖説學者試於此處陰陽水火虛實真假原本上理會得透便識亂所由起病所從生何羡洞垣獨美於前乎一豫經治醫案悉皆治本扶原正法與時師見病治病者不同其病之輕者雖王侯不書病之重者即傭介亦録蓋以貧賤富貴固居處有殊然而父生母成官骸臟腑均稟命於大君無貴賤一也獨念貧賤罹病衣食難適藥餌何資生死莫必更賴德醫存心惻隱不可輕忽也一拙著醫案首紀年月示明天時也次録病者姓名寓址以便同患取印示識所主也書齒老弱詳診脈證示別虛實也揭前醫錯治示垂車鑑也隱前醫姓名示存厚道也有死必書示初病便當擇醫也案末參以余議或引證前賢正論使學者閲已往之治而為將來之式比異別類聞一知十也此案之所由作也一拙著醫鑑乃別醫者之貞邪淑慝又著病鑑更專為病者之當慎於自治求治也懸此兩鑑摘人隱痛極知孤撑之雞肋難當衆逞之尊拳獨是紏妄熱腸救正苦心只知有病人之性命不知有同類之包荒也知我罪我罔暇顧焉一著書立論垂訓千秋固為不朽事業第天人理微當以神解非悉言傳故許胤宗有云醫者意也思慮精則得之然此特為技擅遊刃者言也若初學之士非言無以取法非法無以會心費了多少參悟才得神超像外得到談景升化景即效殷參軍妙解經脈悉焚方書尚覺舉火費力回視成法不幾贅乎是在學者心體而解悟之而已一是書不列成方者不得謂有體無用而非全法也學者得悟天人運氣陰陽水火之微窮探靈素四診病機本草之蘊則千方萬方便在方寸指間何專簡篇上徒勤記誦哉若執方待病不免時師拘牽之見耳一古今醫書不啻汗牛充棟豫半生探究四方驅馳計得一百八十餘部三千七百餘卷率多濫套成方或創言詭幻皆非精一正傳每從舟車上非唾以與人則隨擲之叢濤疊浪中飄飄奚囊豈任此點汙也抵今猶翻悔與人者殊誤人耳大要初學之士便當博涉群書廣參益友必先後繁就簡庶得腳跟實地而余此篇之作總亦繇博歸約耳故善讀書者得古人一字一句用之無盡但能時時泳涵密密印證則即多為少豈在炫博乎一篇目稱愚按稱竊意及不稱愚按稱竊意者乃余拙論其引證內經及前賢成語即寫某某姓字庶無相混太極圖命門水火圖五氣圖
